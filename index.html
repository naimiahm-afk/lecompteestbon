const NAV_MAIN=[
  {id:'dashboard',  l:'Accueil',     ic:IC.home},
  {id:'budget',     l:'Budget',      ic:IC.cal},
  {id:'suivi',      l:'Suivi',       ic:IC.chart},
  {id:'epargne',    l:'Épargne',     ic:IC.piggy},
  {id:'credits',    l:'Crédits',     ic:IC.card},
];
const NAV_MORE=[
  {id:'periscolaire',l:'Périscolaire', ic:IC.school},
  {id:'vacances',   l:'Vacances',     ic:IC.beach},
  {id:'salaires',   l:'Salaires',     ic:IC.salary},
  {id:'indicateurs',l:'Indicateurs',  ic:IC.barChart},
  {id:'export',     l:'Export Excel',  ic:IC.export},
  {id:'parametrage',l:'Paramétrage',  ic:IC.gear},
  {id:'aide',       l:'Aide',         ic:IC.help},
];
const ALL_NAV=[...NAV_MAIN,...NAV_MORE];

const AppShell=({appData,setAppData,onSync,syncing,lastSync})=>{
  const[mod,setMod]=useState('dashboard');
  const[toast,setToast]=useState(null);
  const[showMore,setShowMore]=useState(false);
  const w=useWindowWidth();
  const isDesk=w>=1024;
  const s=appData.settings;
  const cur=ALL_NAV.find(x=>x.id===mod)||NAV_MAIN[0];
  const showToast=(msg,type='success')=>setToast({msg,type});
  const theme=s.theme||'dark';

  const toggleTheme=()=>setAppData(p=>({...p,settings:{...p.settings,theme:p.settings.theme==='dark'?'light':'dark'}}));

  const props={D:appData,setD:setAppData,settings:s,showToast};

  const renderMod=()=>{
    switch(mod){
      case 'dashboard':    return <Dashboard {...props} onNav={n=>{setMod(n);setShowMore(false);}} lastSync={lastSync}/>;
      case 'budget':       return <BudgetMensuel {...props}/>;
      case 'suivi':        return <SuiviMois {...props}/>;
      case 'epargne':      return <Epargne {...props}/>;
      case 'credits':      return <Credits {...props}/>;
      case 'periscolaire': return <Periscolaire {...props}/>;
      case 'vacances':     return <Vacances {...props}/>;
      case 'salaires':     return <Salaires {...props}/>;
      case 'indicateurs':  return <Indicateurs {...props}/>;
      case 'export':       return <ExportModule {...props}/>;
      case 'parametrage':  return <Parametrage {...props}/>;
      case 'aide':         return <Aide settings={s}/>;
      default:             return null;
    }
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* ── Sidebar desktop ── */}
      {isDesk&&(
        <div style={{width:242,background:theme==='dark'?'#0A1220':'#FAFCFF',borderRight:'1.5px solid var(--brd)',display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{padding:'20px 16px 16px',background:'var(--sidebar-grad)',borderBottom:'1px solid var(--brd2)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#1a3a6e,#0d1f3c)',border:'1px solid var(--accentBrd)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--accent)'}}>LCB</span>
              </div>
              <div>
                <p style={{fontSize:13,fontWeight:800,letterSpacing:'-.03em',lineHeight:1.1}}>Le Compte</p>
                <p style={{fontSize:11,fontWeight:600,color:'var(--accent)',letterSpacing:'-.01em'}}>Est Bon</p>
              </div>
              <button className="btn btn-g btn-icon" style={{marginLeft:'auto',padding:6}} onClick={toggleTheme}>
                <Ico d={theme==='dark'?IC.sun:IC.moon} s={15}/>
              </button>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'12px 8px'}}>
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',padding:'4px 12px',marginBottom:6}}>Principal</p>
            {NAV_MAIN.map(x=>(
              <div key={x.id} className={`pill ${mod===x.id?'nav-active':''}`} style={{color:mod===x.id?'var(--accent)':'var(--tx2)',marginBottom:2}} onClick={()=>setMod(x.id)}>
                <Ico d={x.ic} s={16} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                <span style={{fontSize:14,fontWeight:mod===x.id?700:500}}>{x.l}</span>
              </div>
            ))}
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',padding:'12px 12px 6px',marginTop:4}}>Plus</p>
            {NAV_MORE.map(x=>(
              <div key={x.id} className={`pill ${mod===x.id?'nav-active':''}`} style={{color:mod===x.id?'var(--accent)':'var(--tx2)',marginBottom:2}} onClick={()=>setMod(x.id)}>
                <Ico d={x.ic} s={16} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                <span style={{fontSize:14,fontWeight:mod===x.id?700:500}}>{x.l}</span>
              </div>
            ))}
          </div>
          <div style={{padding:'12px 8px',borderTop:'1px solid var(--brd2)'}}>
            {lastSync&&(
              <div style={{padding:'6px 12px',marginBottom:6}}>
                <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>Dernière synchro</p>
                <p style={{fontSize:11,color:'var(--tx3)'}}>{new Date(lastSync).toLocaleString('fr-FR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'})}</p>
              </div>
            )}
            <button className="btn btn-g" style={{width:'100%',justifyContent:'flex-start',gap:8}} onClick={onSync} disabled={syncing}>
              {syncing?<Spin s={14}/>:<Ico d={IC.ref} s={14}/>}
              <span style={{fontSize:13,fontWeight:600}}>{syncing?'Synchro...':'Synchroniser Drive'}</span>
            </button>
          </div>
        </div>
      )}

      {/* ── Main ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Top bar */}
        <div style={{background:'var(--surf)',borderBottom:'1.5px solid var(--brd)',padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,height:'max(52px,calc(52px + env(safe-area-inset-top)))',paddingTop:'env(safe-area-inset-top)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {!isDesk&&(
              <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#1a3a6e,#0d1f3c)',border:'1px solid var(--accentBrd)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--accent)'}}>LCB</span>
              </div>
            )}
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {!isDesk&&<Ico d={cur.ic} s={16} c="var(--accent)"/>}
              <h1 style={{fontSize:16,fontWeight:700,letterSpacing:'-.02em'}}>{cur.l}</h1>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <button className="btn btn-g btn-icon" onClick={toggleTheme}><Ico d={theme==='dark'?IC.sun:IC.moon} s={15}/></button>
            <button className="btn btn-g btn-icon" onClick={onSync} disabled={syncing}>
              {syncing?<Spin s={14}/>:<Ico d={IC.ref} s={14}/>}
            </button>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:'auto'}}>{renderMod()}</div>

        {/* Bottom nav mobile */}
        {!isDesk&&(
          <div style={{background:'var(--surf)',borderTop:'1.5px solid var(--brd)',display:'flex',justifyContent:'space-around',alignItems:'center',paddingBottom:'max(8px,env(safe-area-inset-bottom))',paddingTop:4,flexShrink:0}}>
            {NAV_MAIN.map(x=>(
              <button key={x.id} onClick={()=>{setMod(x.id);setShowMore(false);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:mod===x.id?'var(--accent)':'var(--tx3)',fontFamily:'var(--font)',minWidth:52,transition:'color var(--tr)',position:'relative'}}>
                {mod===x.id&&<div style={{position:'absolute',top:-4,width:4,height:4,borderRadius:'50%',background:'var(--accent)'}}/>}
                <Ico d={x.ic} s={20} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                <span style={{fontSize:10,fontWeight:mod===x.id?700:400}}>{x.l}</span>
              </button>
            ))}
            <button onClick={()=>setShowMore(v=>!v)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:NAV_MORE.some(x=>x.id===mod)?'var(--accent)':'var(--tx3)',fontFamily:'var(--font)',minWidth:52,position:'relative'}}>
              {NAV_MORE.some(x=>x.id===mod)&&<div style={{position:'absolute',top:-4,width:4,height:4,borderRadius:'50%',background:'var(--accent)'}}/>}
              <Ico d={IC.dots} s={20} c={NAV_MORE.some(x=>x.id===mod)?'var(--accent)':'var(--tx3)'}/>
              <span style={{fontSize:10,fontWeight:NAV_MORE.some(x=>x.id===mod)?700:400}}>Plus</span>
            </button>
          </div>
        )}
      </div>

      {/* Bottom sheet — Plus menu */}
      {!isDesk&&showMore&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)',zIndex:60}} onClick={()=>setShowMore(false)}>
          <div style={{position:'absolute',bottom:0,left:0,right:0,background:'var(--surf)',borderRadius:'20px 20px 0 0',padding:'16px 16px calc(16px + env(safe-area-inset-bottom))',animation:'sheetIn .25s cubic-bezier(.4,0,.2,1)'}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,background:'var(--brd)',borderRadius:2,margin:'0 auto 20px'}}/>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
              {NAV_MORE.map(x=>(
                <button key={x.id} onClick={()=>{setMod(x.id);setShowMore(false);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 8px',borderRadius:14,background:mod===x.id?'var(--accentBg)':'var(--surf2)',color:mod===x.id?'var(--accent)':'var(--tx2)',border:`1.5px solid ${mod===x.id?'var(--accentBrd)':'var(--brd)'}`,cursor:'pointer',fontFamily:'var(--font)',transition:'all var(--tr)'}}>
                  <Ico d={x.ic} s={22} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                  <span style={{fontSize:11,fontWeight:600}}>{x.l}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type} close={()=>setToast(null)}/>}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
const App=()=>{
  const[auth,setAuth]=useState('loading');
  const[appData,setAppDataRaw]=useState(DEF_DATA);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const saveTimer=useRef(null);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',appData.settings.theme||'dark');
  },[appData.settings.theme]);

  const setAppData=useCallback(fn=>{
    setAppDataRaw(prev=>{
      const next=typeof fn==='function'?fn(prev):fn;
      if(gToken){
        if(saveTimer.current)clearTimeout(saveTimer.current);
        saveTimer.current=setTimeout(()=>gSave(next).then(()=>setLastSync(new Date().toISOString())).catch(console.error),2000);
      }
      return next;
    });
  },[]);

  const loadData=async()=>{
    setSyncing(true);
    try{
      const raw=await gLoad();
      if(raw){
        const data=migrateData(raw);
        setAppDataRaw(prev=>({
          ...DEF_DATA,...data,
          settings:{...DEF_SETTINGS,...data.settings,
            maison_items:data.settings.maison_items||DEF_SETTINGS.maison_items,
            savings:data.settings.savings||DEF_SETTINGS.savings,
            credits:data.settings.credits||DEF_SETTINGS.credits,
            vacances:data.settings.vacances||[],
            theme:data.settings.theme||'dark',
            loyerAnnexe:data.settings.loyerAnnexe!=null?data.settings.loyerAnnexe:400,
            periSavingsId:data.settings.periSavingsId||null,
            defCourses1:data.settings.defCourses1!=null?data.settings.defCourses1:250,
            defCourses2:data.settings.defCourses2!=null?data.settings.defCourses2:250,
            defSavings1:data.settings.defSavings1!=null?data.settings.defSavings1:0,
            defSavings2:data.settings.defSavings2!=null?data.settings.defSavings2:0,
          },
          balances:{...prev.balances,...(data.balances||{})},
          txs:data.txs||[],
          vacancesTxs:data.vacancesTxs||[],
          balanceAdjusts:data.balanceAdjusts||[],
        }));
      }else{await gSave(DEF_DATA);}
      setAuth('authed');
      setLastSync(new Date().toISOString());
    }catch(e){console.error(e);setAuth('authed');}
    finally{setSyncing(false);}
  };

  useEffect(()=>{
    initGIS(ready=>{
      if(ready===null) setAuth('ready');
      else if(ready===true) loadData();
    });
  },[]);

  const handleAuth=()=>{
    if(!gClient)return;
    gClient.callback=async r=>{if(r.access_token){gToken=r.access_token;await loadData();}};
    gClient.requestAccessToken();
    setSyncing(true);
  };

  const handleSync=async()=>{
    if(!gToken)return;
    setSyncing(true);
    try{await gSave(appData);setLastSync(new Date().toISOString());}catch(e){console.error(e);}
    finally{setSyncing(false);}
  };

  if(auth==='loading')return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12,color:'var(--tx3)',flexDirection:'column'}}>
      <div style={{width:48,height:48,borderRadius:14,background:'linear-gradient(135deg,#1a3a6e,#0d1f3c)',border:'1px solid var(--accentBrd)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:17,fontWeight:700,color:'var(--accent)'}}>LCB</span>
      </div>
      <Spin s={20}/>
    </div>
  );
  if(auth==='ready')return <LoginScreen onAuth={handleAuth} loading={syncing}/>;
  return <AppShell appData={appData} setAppData={setAppData} onSync={handleSync} syncing={syncing} lastSync={lastSync}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
