      <Modal open={newPot} close={()=>setNewPot(false)} title="Nouveau pot vacances">
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Nom du pot</label>
            <input className="ifield" value={pForm.name} placeholder="Ex: Grèce 2026" onChange={e=>setPForm(p=>({...p,name:e.target.value}))}/></div>
          <div style={{display:'flex',gap:12}}>
            <div style={{flex:1}}><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Emoji</label>
              <input className="ifield" value={pForm.emoji} style={{width:70}} onChange={e=>setPForm(p=>({...p,emoji:e.target.value}))}/></div>
            <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Couleur</label>
              <input type="color" value={pForm.color} onChange={e=>setPForm(p=>({...p,color:e.target.value}))} style={{width:48,height:38,borderRadius:8,border:'none',cursor:'pointer',display:'block'}}/></div>
          </div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Objectif (€)</label>
            <NI val={pForm.objectif} onChange={v=>setPForm(p=>({...p,objectif:v}))}/></div>
          <button className="btn btn-p" style={{justifyContent:'center',marginTop:6}} onClick={addPot} disabled={!pForm.name}>Créer le pot</button>
        </div>
      </Modal>
      <Modal open={!!txPot} close={()=>setTxPot(null)} title="Ajouter une transaction">
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{display:'flex',gap:8}}>
            {[{id:'epargne',l:'💰 Épargne'},{id:'depense',l:'💸 Dépense'}].map(t=>(
              <button key={t.id} onClick={()=>setTxF(f=>({...f,cat:t.id}))} className={`tabbtn ${txF.cat===t.id?'tabbtn-a':'tabbtn-i'}`}>{t.l}</button>
            ))}
          </div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Libellé</label>
            <input className="ifield" value={txF.label} onChange={e=>setTxF(f=>({...f,label:e.target.value}))} placeholder="Ex: Virement Grèce..."/></div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Montant (€)</label>
            <NI val={txF.montant} onChange={v=>setTxF(f=>({...f,montant:v}))}/></div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Date</label>
            <input type="date" className="ifield" value={txF.date} onChange={e=>setTxF(f=>({...f,date:e.target.value}))}/></div>
          <button className="btn btn-p" style={{justifyContent:'center',marginTop:6}} onClick={addTx} disabled={!txF.montant}>Ajouter</button>
        </div>
      </Modal>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   PÉRISCOLAIRE STANDALONE
═══════════════════════════════════════════════════════ */
const Periscolaire=({D:appData,settings})=>{
  const mois=Object.entries(appData.months||{})
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([ym,m])=>{const total=calcPeri(m.peri,settings.peri_rates);return{ym,total,status:m.peri.status||'estimation',facture:m.peri.facture,peri:m.peri};})
    .filter(x=>x.total>0||x.facture>0);

  if(!mois.length)return(
    <div style={{textAlign:'center',padding:'64px 24px'}}>
      <div style={{fontSize:64,marginBottom:16}}>🎒</div>
      <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucune donnée périscolaire</p>
      <p style={{fontSize:13,color:'var(--tx3)'}}>Les données apparaissent après avoir rempli l'onglet Périscolaire dans le Budget</p>
    </div>
  );

  const annee=new Date().getFullYear();
  const moisAnnee=mois.filter(m=>m.ym.startsWith(String(annee)));
  const totAnnee=moisAnnee.reduce((a,m)=>a+(m.facture||m.total),0);
  const totEstim=mois.reduce((a,m)=>a+m.total,0);
  const ST={estimation:{l:'Estimation',cl:'ba'},facture:{l:'Facturé',cl:'bb'},ecart:{l:'Écart',cl:'ba'},paye:{l:'Payé ✓',cl:'bg'}};

  return(
    <div style={{padding:'16px 16px 32px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <div className="card card-sm">
          <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Total {annee}</p>
          <p className="mono" style={{fontSize:22,fontWeight:700,color:'var(--am)'}}>{eur(totAnnee)}</p>
          <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{moisAnnee.length} mois</p>
        </div>
        <div className="card card-sm">
          <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Tarifs actuels</p>
          {Object.entries(settings.peri_rates).map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
              <span style={{fontSize:11,color:'var(--tx3)',textTransform:'capitalize'}}>{k}</span>
              <span className="mono" style={{fontSize:11,color:'var(--am)',fontWeight:600}}>{v}€</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <p style={{fontSize:13,fontWeight:700,letterSpacing:'-.02em',marginBottom:12}}>Historique mensuel</p>
        {[...mois].reverse().map(m=>{
          const st=ST[m.status]||ST.estimation;
          const diff=m.facture?(m.facture-m.total):null;
          return(
            <div key={m.ym} style={{padding:'12px 14px',background:'var(--surf2)',borderRadius:12,marginBottom:6}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:diff&&Math.abs(diff)>0.5?8:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:14,fontWeight:700}}>{mFull(m.ym)}</span>
                  <span className={`badge ${st.cl}`}>{st.l}</span>
                </div>
                <div style={{textAlign:'right'}}>
                  <p className="mono" style={{fontSize:15,fontWeight:700,color:'var(--am)'}}>{m.facture?eur(m.facture):eur(m.total)}</p>
                  {m.facture&&<p style={{fontSize:11,color:'var(--tx3)'}}>estimé: {eur(m.total)}</p>}
                </div>
              </div>
              {diff!==null&&Math.abs(diff)>0.5&&(
                <div style={{padding:'5px 10px',borderRadius:8,background:Math.abs(diff)<3?'var(--grBg)':'var(--amBg)',fontSize:12,color:Math.abs(diff)<3?'var(--grB)':'var(--am)',fontWeight:600}}>
                  Écart : {diff>=0?'+':''}{eurD(diff)}
                </div>
              )}
              <div style={{display:'flex',gap:12,marginTop:m.facture?8:6,flexWrap:'wrap'}}>
                {[['matin',m.peri.matin||0],['midi',m.peri.midi||0],['soir',m.peri.soir||0],['journée',m.peri.journee||0]].filter(([,n])=>n>0).map(([l,n])=>(
                  <span key={l} style={{fontSize:11,color:'var(--tx3)',background:'var(--surf)',padding:'2px 8px',borderRadius:6}}>{l}: {n}×</span>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   IMPORT / EXPORT
═══════════════════════════════════════════════════════ */
const ImportExport=({D:appData,setD:setAppData,settings,showToast})=>{
  const[tab,setTab]=useState('export');
  const[preview,setPreview]=useState(null);
  const[importing,setImporting]=useState(false);
  const[exporting,setExporting]=useState(false);
  const[expYm,setExpYm]=useState(curYM());
  const fileRef=useRef();

  const handleFile=async e=>{
    const file=e.target.files[0];if(!file)return;
    setImporting(true);
    try{
      const data=await file.arrayBuffer();
      const XLSX_LIB=window.XLSX;
      if(!XLSX_LIB){showToast('SheetJS non chargé','error');return;}
      const wb=XLSX_LIB.read(data);
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX_LIB.utils.sheet_to_json(ws,{header:1});
      setPreview({rows,filename:file.name});
    }catch(ex){console.error(ex);showToast('Erreur lecture fichier','error');}
    setImporting(false);e.target.value='';
  };

  const importHistorical=()=>{
    if(!preview)return;
    const detected={};
    preview.rows.forEach(row=>{
      if(!row||row.length<2)return;
      const cell=row[0];let ym=null;
      if(typeof cell==='number'){try{const XLSX_LIB=window.XLSX;if(XLSX_LIB){const d=XLSX_LIB.SSF.parse_date_code(cell);if(d&&d.y&&d.m)ym=d.y+'-'+String(d.m).padStart(2,'0');}}catch(_){}}
      else if(typeof cell==='string'){
        const m1=cell.match(/(\d{4})[/-](\d{1,2})/);if(m1)ym=m1[1]+'-'+String(+m1[2]).padStart(2,'0');
        const m2=cell.match(/(\d{1,2})[/-](\d{4})/);if(m2)ym=m2[2]+'-'+String(+m2[1]).padStart(2,'0');
        const mFr=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
        mFr.forEach((mn,mi)=>{if(cell.toLowerCase().includes(mn)){const yr=cell.match(/(\d{4})/);if(yr)ym=yr[1]+'-'+String(mi+1).padStart(2,'0');}});
      }
      if(ym)detected[ym]=true;
    });
    const yms=Object.keys(detected);
    if(!yms.length){showToast('Aucun mois détecté — vérifiez le format du fichier','warn');return;}
    let imported=0;
    setAppData(p=>{
      const nm={...p.months};
      yms.forEach(ym=>{if(!nm[ym]){nm[ym]={...mkMonth(ym,settings),statut:'cloture',imported:true};imported++;}});
      return{...p,months:nm};
    });
    setPreview(null);
    showToast(`${imported} mois importé${imported>1?'s':''} ✓`,'success');
  };

  const exportPDF=async()=>{
    const m=appData.months[expYm];
    if(!m){showToast('Aucun budget pour ce mois','warn');return;}
    const jspdfLib=window.jspdf;
    if(!jspdfLib){showToast('jsPDF non chargé — vérifiez la connexion réseau','error');return;}
    setExporting(true);
    try{
      const{jsPDF}=jspdfLib;
      const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const calc=calcMonth(m,settings);
      const p1=settings.identity.person1,p2=settings.identity.person2;
      // En-tête
      doc.setFillColor(13,19,32);doc.rect(0,0,210,28,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
      doc.text('Le Compte Est Bon',14,17);
      doc.setFontSize(12);doc.setFont('helvetica','normal');
      doc.text(mFull(expYm),196,17,{align:'right'});
      doc.setTextColor(0,0,0);
      let y=36;
      const ln=(lbl,val,indent=0,bold=false)=>{
        doc.setFontSize(9.5);doc.setFont('helvetica',bold?'bold':'normal');
        doc.text(lbl,14+indent,y);doc.text(val,196,y,{align:'right'});y+=5.5;
      };
      const sep=()=>{doc.setDrawColor(220,220,220);doc.line(14,y,196,y);y+=4;};
      const hd=(t,col)=>{doc.setFillColor(...(col||[240,245,255]));doc.rect(14,y-4,182,8,'F');doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(...(col?[79,142,247]:[50,80,140]));doc.text(t,16,y+0.5);doc.setTextColor(0,0,0);y+=9;};

      hd('Charges maison');
      m.maison.items.forEach(it=>{if(!it.calc&&(it.val||0)+(it.ass||0)>0)ln(it.label,eur((it.val||0)+(it.ass||0)),4);});
      if(calc.periTotal>0)ln('Périscolaire',eur(calc.periTotal),4);
      sep();ln('TOTAL CHARGES',eur(calc.maisonTotal),0,true);y+=4;

      hd('Répartition');
      ln(`Écart de rééquilibrage (delta)`,eur(calc.delta));
      ln(`Part ${p1} (½ + delta)`,eur(calc.aShare));
      ln(`Part ${p2} (½ − delta)`,eur(calc.sShare));
      y+=4;

      hd('Virements à effectuer');
      ln(`${p1} → Compte commun`,eur(calc.vAhmed));
      ln(`${p2} → Compte commun`,eur(calc.vSophieCommun));
      if(calc.vSophiePeri>0)ln(`${p2} → Périscolaire`,eur(calc.vSophiePeri));
      if(calc.vSophieCam>0)ln(`${p2} → Livret A ${settings.identity.child}`,eur(calc.vSophieCam));
      y+=4;

      hd('Argent de poche restant');
      doc.setFontSize(11);doc.setFont('helvetica','bold');
      doc.setTextColor(calc.aReste>=(settings.targetReste||550)?16:220,calc.aReste>=(settings.targetReste||550)?185:31,calc.aReste>=(settings.targetReste||550)?129:72);
      doc.text(`${p1} : ${eur(calc.aReste)}`,16,y);
      doc.setTextColor(calc.sReste>=(settings.targetReste||550)?16:220,calc.sReste>=(settings.targetReste||550)?185:31,calc.sReste>=(settings.targetReste||550)?129:72);
      doc.text(`${p2} : ${eur(calc.sReste)}`,196,y,{align:'right'});
      doc.setTextColor(0,0,0);y+=12;

      doc.setFontSize(7.5);doc.setTextColor(160,160,160);
      doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')} — Le Compte Est Bon v2`,105,287,{align:'center'});
      doc.save('LCB_'+expYm+'.pdf');
      showToast('PDF exporté ✓','success');
    }catch(ex){console.error(ex);showToast('Erreur export PDF','error');}
    setExporting(false);
  };

  return(
    <div style={{paddingBottom:32}}>
      <div style={{overflowX:'auto',padding:'16px 16px 14px',display:'flex',gap:6}}>
        {[{id:'export',l:'📤 Exporter PDF'},{id:'import',l:'📥 Importer historique'}].map(t=>(
          <button key={t.id} className={`tabbtn ${tab===t.id?'tabbtn-a':'tabbtn-i'}`} onClick={()=>setTab(t.id)}>{t.l}</button>
        ))}
      </div>
      <div style={{padding:'0 16px'}}>
        {tab==='export'&&(
          <div className="fade">
            <div className="card" style={{marginBottom:12}}>
              <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:14}}>Exporter un mois en PDF</p>
              <div style={{marginBottom:16}}>
                <label style={{fontSize:13,color:'var(--tx2)',display:'block',marginBottom:8,fontWeight:600}}>Mois à exporter</label>
                <select className="ifield" value={expYm} onChange={e=>setExpYm(e.target.value)} style={{fontFamily:'var(--font)'}}>
                  {Object.keys(appData.months||{}).length===0&&<option value={curYM()}>{mFull(curYM())}</option>}
                  {Object.keys(appData.months||{}).sort().reverse().map(ym=><option key={ym} value={ym}>{mFull(ym)}</option>)}
                </select>
              </div>
              {appData.months[expYm]&&(()=>{
                const c=calcMonth(appData.months[expYm],settings);
                return(
                  <div style={{padding:'12px 14px',background:'var(--surf2)',borderRadius:10,marginBottom:16}}>
                    <p style={{fontSize:12,color:'var(--tx2)',marginBottom:4}}>Maison : <strong>{eur(c.maisonTotal)}</strong> · Delta : <strong>{eur(c.delta)}</strong></p>
                    <p style={{fontSize:12,color:'var(--tx2)'}}>Virement {settings.identity.person1} : <strong>{eur(c.vAhmed)}</strong> · Sophie : <strong>{eur(c.vSophie)}</strong></p>
                  </div>
                );
              })()}
              <button className="btn btn-p" style={{justifyContent:'center',width:'100%'}} onClick={exportPDF} disabled={exporting||!appData.months[expYm]}>
                {exporting?<><Spin s={14}/> Génération...</>:<><Ico d={IC.export} s={14}/> Exporter en PDF</>}
              </button>
            </div>
            <div className="card" style={{background:'var(--accentBg)',border:'1.5px solid var(--accentBrd)'}}>
              <p style={{fontSize:12,color:'var(--accent)',lineHeight:1.7}}>📄 Le PDF inclut les charges maison, la répartition, les virements à effectuer et l'argent de poche de chacun.</p>
            </div>
          </div>
        )}
        {tab==='import'&&(
          <div className="fade">
            <div className="card" style={{textAlign:'center',padding:'28px 20px',marginBottom:12,cursor:'pointer',border:'2px dashed var(--brd)'}} onClick={()=>fileRef.current&&fileRef.current.click()}>
              <div style={{fontSize:48,marginBottom:12}}>📊</div>
              <p style={{fontSize:15,fontWeight:700,marginBottom:6}}>Importer un fichier Excel / Numbers</p>
              <p style={{fontSize:13,color:'var(--tx3)',marginBottom:16}}>Format .xlsx — exporté depuis Numbers ou Excel</p>
              <button className="btn btn-p btn-sm" onClick={e=>{e.stopPropagation();fileRef.current&&fileRef.current.click();}}>
                {importing?<><Spin s={14}/> Lecture...</>:<><Ico d={IC.import} s={14}/> Choisir le fichier</>}
              </button>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleFile}/>
            </div>
            {preview&&(
              <div className="card fade" style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                  <div><p style={{fontSize:14,fontWeight:700}}>{preview.filename}</p><p style={{fontSize:12,color:'var(--tx3)'}}>{preview.rows.length} lignes</p></div>
                  <button className="btn btn-g btn-icon" onClick={()=>setPreview(null)}><Ico d={IC.x} s={15}/></button>
                </div>
                <div style={{overflowX:'auto',marginBottom:16}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                    <tbody>
                      {preview.rows.slice(0,7).map((row,i)=>(
                        <tr key={i} style={{borderBottom:'1px solid var(--brd2)'}}>
                          {(row||[]).slice(0,5).map((c,j)=>(
                            <td key={j} style={{padding:'5px 8px',color:i===0?'var(--accent)':'var(--tx2)',fontWeight:i===0?700:400,whiteSpace:'nowrap',fontFamily:typeof c==='number'?'var(--mono)':'var(--font)'}}>{c!=null?String(c):''}</td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{padding:'10px 14px',background:'var(--amBg)',borderRadius:10,border:'1px solid var(--amBrd)',marginBottom:14}}>
                  <p style={{fontSize:12,color:'var(--am)',lineHeight:1.6}}>⚠ L'import crée des entrées clôturées pour les mois détectés. Les mois déjà existants ne sont pas écrasés.</p>
                </div>
                <button className="btn btn-p" style={{justifyContent:'center',width:'100%'}} onClick={importHistorical}>
                  <Ico d={IC.import} s={14}/> Importer l'historique détecté
                </button>
              </div>
            )}
            <div className="card" style={{background:'var(--surf2)'}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:10}}>Mois importés</p>
              {Object.entries(appData.months||{}).filter(([,m])=>m.imported).length===0
                ?<p style={{fontSize:13,color:'var(--tx3)'}}>Aucun mois importé</p>
                :Object.entries(appData.months||{}).filter(([,m])=>m.imported).sort(([a],[b])=>b.localeCompare(a)).map(([ym])=>(
                  <div key={ym} style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'var(--surf)',borderRadius:8,marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:600}}>{mFull(ym)}</span>
                    <span className="badge bg">Importé ✓</span>
                  </div>
                ))
              }
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

   AIDE INTERACTIVE

  const GUIDES={
    budget:{l:'📅 Budget mensuel',steps:[
      {t:'Créer le mois',d:'Dans Budget, naviguez jusqu\'au mois en cours et cliquez "Créer le budget". Toutes les valeurs par défaut issues du Paramétrage sont pré-remplies.',i:'📅'},

      {t:`Onglets ${p1} / ${p2}`,d:`Renseignez vos salaires nets. Ajustez l'épargne personnelle de chacun jusqu'à ce que le "Reste" affiché soit ≥ ${tgt}. C'est la variable d'ajustement.`,i:'👤'},
      {t:'Compte Commun',d:`Si le loyer annexe a été reçu, activez "Reçu" — un rappel "→ Livret A ${p1}" apparaît dans les virements. Vous pouvez aussi saisir le solde réel ici.`,i:'🏦'},
      {t:'Périscolaire',d:`Saisissez le nombre de prestations par type (matin, midi, soir, journée). Le total est calculé automatiquement et intégré dans la part de ${p2}.`,i:'🎒'},
      {t:'Virements',d:`Vérifiez les 2 virements d'Ahmed et les 3 virements de ${p2} (commun + périscolaire + Livret A ${ch}). Ces montants sont prêts à être saisis dans votre banque.`,i:'💸'},
      {t:'Sauvegarder',d:'Cliquez "Sauvegarder" pour créer un snapshot horodaté. Le bouton Sync Drive (🔄) persiste tout sur Google Drive avec un délai de 2 s.',i:'💾'},
    ]},
    suivi:{l:'📊 Suivi en cours de mois',steps:[
      {t:'Ouvrir le Suivi',d:'Dans Suivi, sélectionnez le mois en cours. Toutes les charges du budget apparaissent organisées par catégorie (maison, courses, épargne...).',i:'📊'},
      {t:'Pointer les dépenses',d:'Cochez chaque dépense au fil du mois. La barre de progression et le compteur se mettent à jour. Un mois à 100% indique que tout est soldé.',i:'✅'},
      {t:'Acquittements épargne',d:`Cocher un item épargne (Épargne ${ch}, ${p1}, ${p2}) crédite automatiquement le bon compte dans le module Épargne et enregistre un mouvement.`,i:'🏦'},
      {t:'Solde compte commun',d:'Saisissez le solde réel de votre compte commun observé dans votre app bancaire. L\'écart vs le solde théorique s\'affiche immédiatement.',i:'💰'},

    ]},
    epargne:{l:'🏦 Gérer l\'épargne',steps:[
      {t:'Soldes de référence',d:`Les soldes saisis dans Paramétrage → Épargne correspondent à la situation de ${mShort(FROZEN_MONTH)} (référence figée). Les mouvements s'accumulent par-dessus.`,i:'📌'},

      {t:'Mouvements automatiques',d:'Chaque acquittement dans le Suivi génère un mouvement visible dans l\'historique du compte concerné. Vous voyez toujours l\'origine de chaque variation.',i:'🔄'},
      {t:'Pots Vacances',d:'Créez des pots par destination. Ajoutez des versements d\'épargne (vert) ou des dépenses (rouge) au fil du temps. La barre de progression vous indique où vous en êtes.',i:'🌴'},
    ]},
    setup:{l:'⚙️ Premier paramétrage',steps:[
      {t:'Identité du foyer',d:`Commencez par Paramétrage → Identité pour renseigner vos prénoms (${p1}, ${p2}, ${ch}). Ces noms apparaissent partout dans l'app.`,i:'👥'},
      {t:'Delta de rééquilibrage',d:`Le delta compense les écarts de salaires. Avec ${eur(settings.delta||800)} : ${p1} paie ½+${eur(settings.delta||800)} et ${p2} paie ½−${eur(settings.delta||800)} des charges communes.`,i:'⚖️'},
      {t:'Objectif de poche',d:`L'objectif d'argent de poche (${tgt}) est votre seuil cible. L'app affiche rouge si l'un de vous est en-dessous après toutes les charges.`,i:'💰'},
      {t:'Charges maison',d:'Vérifiez les montants par défaut dans Paramétrage → Maison. Toutes les mensualités sont pré-remplies avec vos valeurs réelles.',i:'🏠'},
      {t:'Comptes épargne',d:`Dans Paramétrage → Épargne, ajustez les soldes initiaux de ${mShort(FROZEN_MONTH)}. Ce sont vos soldes de référence figés.`,i:'🏦'},
    ]},
  };
  const g=GUIDES[guide];
  const sd=g.steps[step];
  return(
    <div style={{padding:'16px 16px 32px'}}>
      <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Guides pratiques</p>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
        {Object.entries(GUIDES).map(([id,g])=>(
          <button key={id} onClick={()=>{setGuide(id);setStep(0);}} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderRadius:14,background:guide===id?'var(--accentBg)':'var(--surf)',border:`1.5px solid ${guide===id?'var(--accentBrd)':'var(--brd)'}`,color:guide===id?'var(--accent)':'var(--tx)',cursor:'pointer',fontFamily:'var(--font)',transition:'all var(--tr)',textAlign:'left'}}>
            <span style={{fontSize:20}}>{g.steps[0].i}</span>
            <span style={{fontSize:14,fontWeight:guide===id?700:500}}>{g.l}</span>
            <span style={{marginLeft:'auto',fontSize:11,color:guide===id?'var(--accent)':'var(--tx3)'}}>{g.steps.length} étapes</span>
          </button>
        ))}
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:12,fontWeight:700,color:'var(--tx3)'}}>Étape {step+1}/{g.steps.length}</span>
          <div className="pbar" style={{flex:1,margin:'0 12px'}}>
            <div className="pbar-fill" style={{width:`${((step+1)/g.steps.length)*100}%`,background:'var(--accent)'}}/>
          </div>
          <span style={{fontSize:12,color:'var(--accent)',fontWeight:700}}>{Math.round(((step+1)/g.steps.length)*100)}%</span>
        </div>
        <div style={{textAlign:'center',padding:'14px 0'}}>
          <div style={{fontSize:52,marginBottom:14}}>{sd.i}</div>
          <h3 style={{fontSize:17,fontWeight:700,letterSpacing:'-.03em',marginBottom:12}}>{sd.t}</h3>
          <p style={{fontSize:14,color:'var(--tx2)',lineHeight:1.75,textAlign:'left'}}>{sd.d}</p>
        </div>
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}><Ico d={IC.chL} s={14}/> Précédent</button>
          <button className="btn btn-p" style={{flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>Math.min(g.steps.length-1,s+1))} disabled={step===g.steps.length-1}>Suivant <Ico d={IC.chR} s={14}/></button>
        </div>
      </div>
      {g.steps.map((st,i)=>(
        <div key={i} onClick={()=>setStep(i)} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,marginBottom:6,cursor:'pointer',background:i===step?'var(--accentBg)':'var(--surf)',border:`1.5px solid ${i===step?'var(--accentBrd)':'var(--brd)'}`,transition:'all var(--tr)'}}>
          <div style={{width:24,height:24,borderRadius:'50%',background:i<step?'var(--gr)':i===step?'var(--accent)':'var(--surf3)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
            {i<step?<Ico d={IC.chk} s={11} c="#fff" sw={2.5}/>:i+1}
          </div>
          <span style={{fontSize:13,fontWeight:i===step?700:400,color:i===step?'var(--accent)':'var(--tx2)'}}>{st.t}</span>
        </div>
      ))}
    </div>
  );
};

                <span style={{fontSize:17,lineHeight:1}}>{x.i}</span>
                <span style={{fontSize:14,fontWeight:mod===x.id?700:500}}>{x.l}</span>

            <button className="btn btn-g btn-icon" onClick={onSync} disabled={syncing}>

        {/* Content */}
        <div style={{flex:1,overflowY:'auto'}}>{renderMod()}</div>

        {!isDesk&&(

            {NAV_MAIN.map(x=>(
              <button key={x.id} onClick={()=>{setMod(x.id);setShowMore(false);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:mod===x.id?'var(--accent)':'var(--tx3)',fontFamily:'var(--font)',minWidth:52,transition:'color var(--tr)',position:'relative'}}>

                <span style={{fontSize:21}}>{x.i}</span>
                <span style={{fontSize:10,fontWeight:mod===x.id?700:400}}>{x.l}</span>
              </button>
            ))}
            <button onClick={()=>setShowMore(v=>!v)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:NAV_MORE.some(x=>x.id===mod)?'var(--accent)':'var(--tx3)',fontFamily:'var(--font)',minWidth:52,position:'relative'}}>
              {NAV_MORE.some(x=>x.id===mod)&&<div style={{position:'absolute',top:-4,width:4,height:4,borderRadius:'50%',background:'var(--accent)'}}/>}
              <span style={{fontSize:21}}>⋯</span>
              <span style={{fontSize:10,fontWeight:NAV_MORE.some(x=>x.id===mod)?700:400}}>Plus</span>
            </button>
          </div>
        )}
      </div>

      {/* Bottom sheet mobile — Plus menu */}
      {!isDesk&&showMore&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)',zIndex:60}} onClick={()=>setShowMore(false)}>
          <div style={{position:'absolute',bottom:0,left:0,right:0,background:'var(--surf)',borderRadius:'20px 20px 0 0',padding:'16px 16px calc(16px + env(safe-area-inset-bottom))',animation:'sheetIn .25s cubic-bezier(.4,0,.2,1)'}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,background:'var(--brd)',borderRadius:2,margin:'0 auto 20px'}}/>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {NAV_MORE.map(x=>(
                <button key={x.id} onClick={()=>{setMod(x.id);setShowMore(false);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 8px',borderRadius:14,background:mod===x.id?'var(--accentBg)':'var(--surf2)',color:mod===x.id?'var(--accent)':'var(--tx2)',border:`1.5px solid ${mod===x.id?'var(--accentBrd)':'var(--brd)'}`,cursor:'pointer',fontFamily:'var(--font)',transition:'all var(--tr)'}}>
                  <span style={{fontSize:26}}>{x.i}</span>
                  <span style={{fontSize:12,fontWeight:600}}>{x.l}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type} close={()=>setToast(null)}/>}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
const App=()=>{
  const[auth,setAuth]=useState('loading');
  const[appData,setAppDataRaw]=useState(DEF_DATA);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const saveTimer=useRef(null);

  // Sync theme to DOM
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',appData.settings.theme||'dark');
  },[appData.settings.theme]);

  const setAppData=useCallback(fn=>{
    setAppDataRaw(prev=>{
      const next=typeof fn==='function'?fn(prev):fn;
      if(gToken){
        if(saveTimer.current)clearTimeout(saveTimer.current);
        saveTimer.current=setTimeout(()=>gSave(next).then(()=>setLastSync(new Date().toISOString())).catch(console.error),2000);
      }
      return next;
    });
  },[]);

  const loadData=async()=>{
    setSyncing(true);
    try{
      const raw=await gLoad();
      if(raw){
        const data=migrateData(raw);
        setAppDataRaw(prev=>({
          ...DEF_DATA,...data,
          settings:{...DEF_SETTINGS,...data.settings,
            maison_items:data.settings.maison_items||DEF_SETTINGS.maison_items,
            savings:data.settings.savings||DEF_SETTINGS.savings,
            credits:data.settings.credits||DEF_SETTINGS.credits,
            vacances:data.settings.vacances||[],
            theme:data.settings.theme||'dark',
          },
          balances:{...prev.balances,...(data.balances||{})},
          txs:data.txs||[],
          vacancesTxs:data.vacancesTxs||[],
          balanceAdjusts:data.balanceAdjusts||[],
        }));
      }else{await gSave(DEF_DATA);}
      setAuth('authed');
      setLastSync(new Date().toISOString());
    }catch(e){console.error(e);setAuth('authed');}
    finally{setSyncing(false);}
  };

  useEffect(()=>{
    initGIS(ready=>{
      if(ready===null) setAuth('ready');
      else if(ready===true) loadData();
    });
  },[]);

  const handleAuth=()=>{
    if(!gClient)return;
    gClient.callback=async r=>{if(r.access_token){gToken=r.access_token;await loadData();}};
    gClient.requestAccessToken();
    setSyncing(true);
  };

  const handleSync=async()=>{
    if(!gToken)return;
    setSyncing(true);
    try{await gSave(appData);setLastSync(new Date().toISOString());}catch(e){console.error(e);}
    finally{setSyncing(false);}
  };

  if(auth==='loading')return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12,color:'var(--tx3)',flexDirection:'column'}}>
      <div style={{width:48,height:48,borderRadius:14,background:'linear-gradient(135deg,#1a3a6e,#0d1f3c)',border:'1px solid var(--accentBrd)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:17,fontWeight:700,color:'var(--accent)'}}>LCB</span>
      </div>
      <Spin s={20}/>
    </div>
  );
  if(auth==='ready')return <LoginScreen onAuth={handleAuth} loading={syncing}/>;
  return <AppShell appData={appData} setAppData={setAppData} onSync={handleSync} syncing={syncing} lastSync={lastSync}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
