<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --radius-xs:6px;--radius-sm:8px;--radius:12px;--radius-lg:16px;--radius-xl:20px;
  --tr:.15s ease;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}

/* ── DARK THEME ── */
html[data-theme="dark"]{
  --bg:#07090F;--surf:#0D1320;--surf2:#111B2E;--surf3:#172035;
  --brd:#1E2D45;--brd2:#14203A;
  --tx:#EEF4FF;--tx2:#7A99C2;--tx3:#3D5470;
  --accent:#4F8EF7;--accentB:#6BA3F9;--accentBg:rgba(79,142,247,.1);--accentBrd:rgba(79,142,247,.22);
  --gr:#10B981;--grB:#34D399;--grBg:rgba(16,185,129,.1);--grBrd:rgba(16,185,129,.22);
  --rd:#F43F5E;--rdBg:rgba(244,63,94,.1);--rdBrd:rgba(244,63,94,.22);
  --am:#F59E0B;--amBg:rgba(245,158,11,.1);--amBrd:rgba(245,158,11,.22);
  --pu:#A78BFA;--puBg:rgba(167,139,250,.1);--puBrd:rgba(167,139,250,.22);
  --or:#FB923C;--orBg:rgba(251,146,60,.1);
  --shadow:0 8px 32px rgba(0,0,0,.55);--shadow-sm:0 2px 12px rgba(0,0,0,.4);
  --sidebar-grad:linear-gradient(180deg,#0D1A30 0%,#0D1320 100%);
}
/* ── LIGHT THEME ── */
html[data-theme="light"]{
  --bg:#EEF3FA;--surf:#FFFFFF;--surf2:#F5F8FD;--surf3:#EBF0F8;
  --brd:#CAD5E8;--brd2:#DDE6F2;
  --tx:#0A1628;--tx2:#4A6080;--tx3:#90A8C4;
  --accent:#3B7EF6;--accentB:#2563EB;--accentBg:rgba(59,126,246,.08);--accentBrd:rgba(59,126,246,.2);
  --gr:#059669;--grB:#047857;--grBg:rgba(5,150,105,.08);--grBrd:rgba(5,150,105,.2);
  --rd:#E11D48;--rdBg:rgba(225,29,72,.08);--rdBrd:rgba(225,29,72,.2);
  --am:#D97706;--amBg:rgba(217,119,6,.08);--amBrd:rgba(217,119,6,.2);
  --pu:#7C3AED;--puBg:rgba(124,58,237,.08);--puBrd:rgba(124,58,237,.2);
  --or:#EA580C;--orBg:rgba(234,88,12,.08);
  --shadow:0 8px 32px rgba(10,22,40,.1);--shadow-sm:0 2px 12px rgba(10,22,40,.07);
  --sidebar-grad:linear-gradient(180deg,#F0F6FF 0%,#FFFFFF 100%);
}

body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.mono{font-family:var(--mono)}
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── INPUTS ── */
.ifield{background:var(--surf2);border:1.5px solid var(--brd);border-radius:var(--radius-sm);color:var(--tx);padding:9px 13px;font-family:var(--font);font-size:14px;outline:none;transition:border-color var(--tr),box-shadow var(--tr);width:100%}
.ifield:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentBg)}
.ifield::placeholder{color:var(--tx3)}
.inum{background:var(--surf2);border:1.5px solid var(--brd);border-radius:var(--radius-sm);color:var(--tx);padding:7px 11px;font-family:var(--mono);font-size:14px;outline:none;transition:border-color var(--tr),box-shadow var(--tr);text-align:right;width:110px}
.inum:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentBg)}
input[type=date].ifield{width:auto;color-scheme:dark}
html[data-theme="light"] input[type=date].ifield{color-scheme:light}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all var(--tr);font-family:var(--font);white-space:nowrap;letter-spacing:-.01em}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(79,142,247,.35)}
.btn-p:hover:not(:disabled){background:var(--accentB);box-shadow:0 4px 18px rgba(79,142,247,.45);transform:translateY(-1px)}
.btn-s{background:var(--surf2);color:var(--tx);border:1.5px solid var(--brd)}
.btn-s:hover:not(:disabled){border-color:var(--tx3);background:var(--surf3)}
.btn-d{background:var(--rdBg);color:var(--rd);border:1.5px solid var(--rdBrd)}
.btn-d:hover:not(:disabled){background:rgba(244,63,94,.18)}
.btn-g{background:transparent;color:var(--tx2);border:none;padding:7px 11px}
.btn-g:hover:not(:disabled){background:var(--surf3);color:var(--tx)}
.btn-sm{padding:6px 13px;font-size:13px}
.btn-xs{padding:4px 10px;font-size:12px}
.btn-icon{padding:7px;border-radius:var(--radius-sm)}

/* ── CARDS ── */
.card{background:var(--surf);border:1.5px solid var(--brd);border-radius:var(--radius-lg);padding:18px}
.card-sm{padding:14px}
.card-accent{border-color:var(--accentBrd);background:var(--accentBg)}
.card-success{border-color:var(--grBrd);background:var(--grBg)}
.card-danger{border-color:var(--rdBrd);background:var(--rdBg)}
.card-warning{border-color:var(--amBrd);background:var(--amBg)}
.card-purple{border-color:var(--puBrd);background:var(--puBg)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em}
.bg{background:var(--grBg);color:var(--grB);border:1px solid var(--grBrd)}
.br{background:var(--rdBg);color:var(--rd);border:1px solid var(--rdBrd)}
.ba{background:var(--amBg);color:var(--am);border:1px solid var(--amBrd)}
.bb{background:var(--accentBg);color:var(--accent);border:1px solid var(--accentBrd)}
.bp{background:var(--puBg);color:var(--pu);border:1px solid var(--puBrd)}
.bw{background:var(--surf3);color:var(--tx2);border:1px solid var(--brd)}

/* ── MISC ── */
.sep{height:1px;background:var(--brd2);margin:10px 0}
.pill{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;transition:all var(--tr)}
.pill:hover{background:var(--surf3)}
.tabbtn{padding:7px 15px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0;transition:all var(--tr);letter-spacing:-.01em}
.tabbtn-a{background:var(--accentBg);color:var(--accent);border:1.5px solid var(--accentBrd)}
.tabbtn-i{background:var(--surf);color:var(--tx2);border:1.5px solid var(--brd)}
.tabbtn-i:hover{background:var(--surf3);color:var(--tx)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surf);border:1.5px solid var(--brd);border-radius:var(--radius-xl);padding:24px;max-width:500px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);animation:slideUp .22s ease}

/* ── PROGRESS ── */
.pbar{height:5px;background:var(--surf3);border-radius:10px;overflow:hidden}
.pbar-fill{height:100%;border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── NAV ACTIVE ── */
.nav-active{background:var(--accentBg);color:var(--accent);position:relative}
.nav-active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}

/* ── KPI ── */
.kpi{background:var(--surf);border:1.5px solid var(--brd);border-radius:var(--radius-lg);padding:16px 18px;flex-shrink:0}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none}

/* ── LOGIN ── */
.login-glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(80px);pointer-events:none;top:-80px;left:50%;transform:translateX(-50%)}
</style>
</head>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

/* ═══════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════ */
const CLIENT_ID   = '513501796130-68m295si4jcklt653n0rg1k51lhkomn0.apps.googleusercontent.com';
const SCOPES      = 'https://www.googleapis.com/auth/drive.file';
const FILE_NAME   = 'LeCompteEstBon_data.json';
const FROZEN_MONTH= '2026-04';
const APP_VER     = '2.0';

/* ═══════════════════════════════════════════════════════
   DEFAULT SETTINGS V2
═══════════════════════════════════════════════════════ */
const DEF_SETTINGS = {
  identity:{person1:'Ahmed',person2:'Sophie',child:'Camélia'},
  delta:800, deltaAuto:false, targetReste:550,
  theme:'dark',
  maison_items:[
    {id:'ass_immo',  label:'Assurance prêt IMMO',   def:76,   ass:0,  calc:false,variable:false},
    {id:'free',      label:'Free + Spotify + Cloud', def:106,  ass:0,  calc:false,variable:false},
    {id:'cred_trav', label:'Crédit Travaux',         def:1014, ass:15, calc:false,variable:false},
    {id:'navigo',    label:'Navigo',                 def:182,  ass:0,  calc:false,variable:false},
    {id:'cred_immo', label:'Prêt Immobilier',        def:1868, ass:0,  calc:false,variable:false},
    {id:'cred_conso',label:'Crédit Conso',           def:316,  ass:0,  calc:false,variable:false},
    {id:'imp_fonc',  label:'Impôts Foncier',         def:162,  ass:0,  calc:false,variable:false},
    {id:'cred_phone',label:'Prêt iPhone',            def:77,   ass:0,  calc:false,variable:false},
    {id:'ass_conso', label:'Assurance prêt Conso',   def:15,   ass:0,  calc:false,variable:false},

    {id:'eparg_cam', label:'Épargne Camélia',        def:50,   ass:0,  calc:false,variable:false},
    {id:'sport',     label:'Sport',                  def:50,   ass:0,  calc:false,variable:false},
    {id:'menage',    label:'Ménage',                 def:30,   ass:0,  calc:false,variable:false},
    {id:'eau',       label:'Eau',                    def:92,   ass:0,  calc:false,variable:true},
    {id:'edf',       label:'EDF',                    def:306,  ass:0,  calc:false,variable:false},
    {id:'essence',   label:'Essence',                def:130,  ass:0,  calc:false,variable:false},
    {id:'ass_auto',  label:'Assurance auto',         def:231,  ass:0,  calc:false,variable:false},
    {id:'amex',      label:'Débit différé AMEX',     def:0,    ass:0,  calc:false,variable:true},
  ],
  savings:[
    {id:'lv_ahmed', name:'Livret Ahmed',    bal:10,      monthly:0,  color:'#4F8EF7'},
    {id:'la_ahmed', name:'Livret A Ahmed',  bal:1489.20, monthly:0,  color:'#10B981'},
    {id:'lv_sophie',name:'Livret Sophie',   bal:299,     monthly:0,  color:'#A78BFA'},
    {id:'la_sophie',name:'Livret A Sophie', bal:404,     monthly:0,  color:'#FB923C'},
    {id:'la_cam',   name:'Livret A Camélia',bal:816.50,  monthly:50, color:'#F59E0B'},
  ],
  credits:[
    {id:'immo', name:'Crédit Immobilier',org:'Crédit du Nord',init:450000,mens:1868,   ass:76,debut:'2021-07-15',fin:'2043-07-05',cap:358481},
    {id:'trav', name:'Crédit Travaux',   org:'CréditLift',   init:110456,mens:1014.87, ass:15,debut:'2025-06-05',fin:'2040-05-05',cap:107979},
    {id:'conso',name:'Crédit Conso',     org:'BoursoBank',   init:17000, mens:316.24,  ass:0, debut:'2025-08-29',fin:'2030-08-29',cap:14943},
    {id:'phone',name:'Crédit iPhone',    org:'Cetelem',      init:1843,  mens:76.79,   ass:0, debut:'2025-11-22',fin:'2027-12-05',cap:1536},
  ],
  peri_rates:{matin:3.71,midi:5.81,soir:7.65,journee:22.93},
  vacances:[],
};

const mkDefaultBalances = () => DEF_SETTINGS.savings.reduce((a,s)=>({...a,[s.id]:s.bal}),{});

const DEF_DATA = {
  version:APP_VER,
  settings:DEF_SETTINGS,
  months:{},
  txs:[],
  balances:mkDefaultBalances(),
  vacancesTxs:[],
  balanceAdjusts:[],
};

/* ═══════════════════════════════════════════════════════
   CALCULATION ENGINE V2
═══════════════════════════════════════════════════════ */
const calcPeri = (p,r) => {
  if(!p||!r) return 0;
  return Math.round(((p.matin||0)*r.matin+(p.midi||0)*r.midi+(p.soir||0)*r.soir+(p.journee||0)*r.journee)*100)/100;
};

const calcMonth = (m,s) => {
  const periTotal = calcPeri(m.peri, s.peri_rates);
  const epargCam  = (m.maison.items.find(it=>it.id==='eparg_cam')||{}).val||0;
  const maisonTotal = Math.round(m.maison.items.reduce((sum,it)=>{
    if(it.calc) return sum+periTotal;
    return sum+(it.val||0)+(it.ass||0);
  },0));
  const half = Math.round(maisonTotal/2);
  const delta = s.deltaAuto&&m.ahmed.sal&&m.sophie.sal
    ? Math.round((m.ahmed.sal-m.sophie.sal)/2) : (s.delta||800);
  const aShare = half+delta;
  const sShare = half-delta;
  const aReste  = (m.ahmed.sal||0)-aShare-(m.ahmed.courses||0)-(m.ahmed.savings||0);
  const sReste  = (m.sophie.sal||0)-sShare-(m.sophie.courses||0)-(m.sophie.savings||0);
  const vAhmed  = aShare+(m.ahmed.courses||0)+(m.ahmed.savings||0);
  const vSophieTot = sShare+(m.sophie.courses||0)+(m.sophie.savings||0);
  // V2 : Sophie 3 virements
  const vSophieCommun = vSophieTot-periTotal-epargCam;
  return {
    maisonTotal,half,periTotal,epargCam,delta,aShare,sShare,aReste,sReste,
    vAhmed, vSophie:vSophieTot, vSophieCommun,
    vSophiePeri:periTotal, vSophieCam:epargCam,
  };
};

const mkMonth = (ym,s) => ({
  id:ym, createdAt:new Date().toISOString(), statut:'en_cours', versions:[],
  maison:{items:s.maison_items.map(it=>({...it,val:it.def}))},
  ahmed: {sal:0, courses:250, savings:0},
  sophie:{sal:0, courses:250, savings:0},
  compteCommun:{loyer:null, loyerOk:false, soldeReel:null},
  peri: {matin:0,midi:0,soir:0,journee:0,status:'estimation',facture:null},
  track:{items:[]},
});

/* ═══════════════════════════════════════════════════════
   DATA MIGRATION V1 → V2
═══════════════════════════════════════════════════════ */
const migrateData = (data) => {
  if(!data||data.version===APP_VER) return data;
  const months = {};
  Object.entries(data.months||{}).forEach(([ym,m])=>{
    const cc = {loyer:null,loyerOk:false,soldeReel:null};
    const ahmed = {...(m.ahmed||{})};
    if(ahmed.loyer!==undefined){ cc.loyer=ahmed.loyer; delete ahmed.loyer; }
    if(ahmed.loyerOk!==undefined){ cc.loyerOk=ahmed.loyerOk; delete ahmed.loyerOk; }
    months[ym]={...m, ahmed, compteCommun:m.compteCommun||cc, statut:m.statut||'en_cours', versions:m.versions||[]};
  });
  return {
    ...data, version:APP_VER, months,
    settings:{
      ...DEF_SETTINGS,...(data.settings||{}),
      maison_items:(data.settings||{}).maison_items||DEF_SETTINGS.maison_items,
      savings:(data.settings||{}).savings||DEF_SETTINGS.savings,
      credits:(data.settings||{}).credits||DEF_SETTINGS.credits,
      vacances:(data.settings||{}).vacances||[],
      theme:(data.settings||{}).theme||'dark',
    },
    vacancesTxs:data.vacancesTxs||[],
    balanceAdjusts:data.balanceAdjusts||[],
  };
};

/* ═══════════════════════════════════════════════════════
   GOOGLE DRIVE
═══════════════════════════════════════════════════════ */
let gClient=null, gToken=null, gFileId=null;

const initGIS = cb => {
  const t=setInterval(()=>{
    if(window.google&&window.google.accounts){
      clearInterval(t);
      gClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID, scope:SCOPES,
        callback:r=>{ if(r.access_token){gToken=r.access_token;cb(true);}else cb(false); }
      });
      cb(null);
    }
  },250);
};

const gReq=(url,opts={})=>fetch(url,{...opts,headers:{Authorization:'Bearer '+gToken,...(opts.headers||{})}});

const gLoad=async()=>{
  const r=await gReq(`https://www.googleapis.com/drive/v3/files?q=name%3D'${FILE_NAME}'%20and%20trashed%3Dfalse&fields=files(id)`);
  const d=await r.json();
  if(d.files&&d.files.length){
    gFileId=d.files[0].id;
    const res=await gReq(`https://www.googleapis.com/drive/v3/files/${gFileId}?alt=media`);
    return res.json();
  }
  return null;
};

const gSave=async data=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME,mimeType:'application/json'})],{type:'application/json'}));
  form.append('file',blob);
  if(gFileId){
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gFileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+gToken},body:form});
  }else{
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+gToken},body:form});
    gFileId=(await r.json()).id;
  }
};

/* ═══════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════ */
const eur  = n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const eurD = n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);
const pN   = s=>parseFloat(String(s).replace(',','.'))||0;
const MO   = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MS   = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const mFull  = ym=>{ const[y,m]=ym.split('-'); return MO[+m-1]+' '+y; };
const mShort = ym=>{ const[y,m]=ym.split('-'); return MS[+m-1]+' '+y; };
const curYM  = ()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const mLeft  = fin=>{ const f=new Date(fin+'T00:00:00'),n=new Date(); return Math.max(0,(f.getFullYear()-n.getFullYear())*12+f.getMonth()-n.getMonth()); };
const pctOf  = (init,rem)=>init>0?Math.round(((init-rem)/init)*100):0;
const prevYM = ym=>{ const[y,m]=ym.split('-').map(Number); const d=new Date(y,m-2,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };

/* ═══════════════════════════════════════════════════════
   HOOKS
═══════════════════════════════════════════════════════ */
const useWindowWidth=()=>{
  const[w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);
  return w;
};

const NI=({val,onChange,step='1',min,max,disabled,w,placeholder})=>(
  <input type="number" step={step} min={min} max={max} disabled={disabled}
    className="inum" style={w?{width:w}:{}}
    value={val===0?'':val} placeholder={placeholder||'0'}
    onChange={e=>onChange(pN(e.target.value))}
    onFocus={e=>e.target.select()}/>
);

const Tog=({on,set,label,size='md'})=>{
  const w=size==='sm'?30:36, h=size==='sm'?17:20, r=size==='sm'?7:9, k=size==='sm'?12:14;
  return(
    <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',userSelect:'none'}}>
      <div onClick={()=>set(!on)} style={{width:w,height:h,borderRadius:r,background:on?'var(--accent)':'var(--surf3)',border:`1.5px solid ${on?'var(--accent)':'var(--brd)'}`,position:'relative',transition:'all var(--tr)',flexShrink:0,cursor:'pointer'}}>
        <div style={{position:'absolute',top:2,left:on?w-k-2:2,width:k,height:k,borderRadius:'50%',background:'#fff',transition:'left .15s',boxShadow:'0 1px 4px rgba(0,0,0,.3)'}}/>
      </div>
      {label&&<span style={{fontSize:13,color:'var(--tx2)'}}>{label}</span>}
    </label>
  );
};

const Modal=({open,close,title,children,w})=>{
  if(!open)return null;
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&close()}>
      <div className="modal fade" style={w?{maxWidth:w}:{}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h3 style={{fontSize:16,fontWeight:700,letterSpacing:'-.02em'}}>{title}</h3>
          <button className="btn btn-g btn-icon" onClick={close}><Ico d={IC.x} s={16}/></button>
        </div>
        {children}
      </div>
    </div>
  );
};

const Toast=({msg,type,close})=>{
  useEffect(()=>{const t=setTimeout(close,3200);return()=>clearTimeout(t);},[]);
  const colors={success:'var(--gr)',error:'var(--rd)',info:'var(--accent)',warn:'var(--am)'};
  const c=colors[type]||colors.success;
  return(
    <div className="toast-wrap">
      <div style={{background:'var(--surf)',border:`1.5px solid ${c}`,borderRadius:12,padding:'11px 20px',display:'flex',alignItems:'center',gap:10,fontSize:14,fontWeight:600,boxShadow:'var(--shadow)',whiteSpace:'nowrap',animation:'slideUp .2s ease',color:'var(--tx)'}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:c,flexShrink:0}}/>
        {msg}
      </div>
    </div>
  );
};

/* ── Generic Row (label + value) ── */
const Row=({l,v,c,bold,sub})=>(
  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',background:'var(--surf2)',borderRadius:10,marginBottom:4}}>
    <div>
      <span style={{fontSize:13,color:bold?'var(--tx)':'var(--tx2)',fontWeight:bold?600:400}}>{l}</span>
      {sub&&<p style={{fontSize:11,color:'var(--tx3)',marginTop:1}}>{sub}</p>}
    </div>
    <span className="mono" style={{fontSize:14,fontWeight:bold?700:600,color:c||'var(--tx)'}}>{v}</span>
  </div>
);

/* ═══════════════════════════════════════════════════════
   MONTH NAVIGATOR
═══════════════════════════════════════════════════════ */
const MNav=({ym,setYm})=>{
  const go=dir=>{
    const[y,m]=ym.split('-').map(Number);
    const d=new Date(y,m-1+dir,1);
    setYm(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  };
  return(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <button className="btn btn-s btn-icon" onClick={()=>go(-1)}><Ico d={IC.chL} s={15}/></button>
      <div style={{flex:1,textAlign:'center'}}>
        <p style={{fontSize:17,fontWeight:700,letterSpacing:'-.03em'}}>{mFull(ym)}</p>
      </div>
      <button className="btn btn-s btn-icon" onClick={()=>go(1)}><Ico d={IC.chR} s={15}/></button>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   SUMMARY BAR (Budget KPIs)
═══════════════════════════════════════════════════════ */
const SummaryBar=({calc,s})=>{
  if(!calc)return null;
  const {maisonTotal,aShare,sShare,aReste,sReste,periTotal}=calc;
  const tgt=s.targetReste||550;
  const KPI=({label,value,color,sub,subOk})=>(
    <div className="kpi" style={{minWidth:140}}>
      <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>{label}</p>
      <p className="mono" style={{fontSize:22,fontWeight:700,color:color||'var(--tx)',letterSpacing:'-.03em'}}>{value}</p>
      {sub&&<p style={{fontSize:11,fontWeight:600,color:subOk?'var(--grB)':'var(--rd)',marginTop:5}}>{sub}</p>}
    </div>
  );
  return(
    <div style={{overflowX:'auto',padding:'12px 16px 0',display:'flex',gap:8}}>
      <KPI label="Maison" value={eur(maisonTotal)}/>
      <KPI label={`Part ${s.identity.person1}`} value={eur(aShare)} color="var(--accent)"
        sub={`Reste ${eur(aReste)}`} subOk={aReste>=tgt}/>
      <KPI label={`Part ${s.identity.person2}`} value={eur(sShare)} color="var(--pu)"
        sub={`Reste ${eur(sReste)}`} subOk={sReste>=tgt}/>
      {periTotal>0&&<KPI label="Périscolaire" value={eur(periTotal)} color="var(--am)"/>}
    </div>
  );
};

const TabMaison=({m,calc,updM,s})=>{
  const updItem=(id,field,val)=>updM(mo=>({...mo,maison:{items:mo.maison.items.map(it=>it.id===id?{...it,[field]:val}:it)}}));
  const periTotal=calc?calc.periTotal:0;
  return(
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:10}}>
      {m.maison.items.map(it=>{
        const total=it.calc?periTotal:(it.val||0)+(it.ass||0);
        return(
          <div key={it.id} style={{display:'flex',alignItems:'center',padding:'11px 14px',background:'var(--surf)',border:'1.5px solid var(--brd)',borderRadius:12,gap:12,opacity:it.calc?.85:1}}>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:14,fontWeight:500,marginBottom:it.variable?3:0,color:it.calc?'var(--tx2)':'var(--tx)'}}>{it.label}</p>
              {it.variable&&<span className="badge ba" style={{fontSize:10}}>variable</span>}
              {it.calc&&<span className="badge ba" style={{fontSize:10}}>auto périscolaire</span>}
            </div>
            {it.calc
              ? <span className="mono" style={{fontSize:15,fontWeight:700,color:'var(--am)'}}>{eur(periTotal)}</span>
              : <div style={{display:'flex',alignItems:'center',gap:8}}>
                  {it.ass>0&&<span style={{fontSize:11,color:'var(--tx3)'}}>+{it.ass}€ ass.</span>}
                  <NI val={it.val||0} onChange={v=>updItem(it.id,'val',v)} w="90px"/>
                </div>
            }
            {!it.calc&&<span className="mono" style={{fontSize:13,fontWeight:600,color:'var(--tx2)',minWidth:56,textAlign:'right'}}>{eur(total)}</span>}
          </div>
        );
      })}
      {calc&&(
        <div style={{padding:'14px 16px',background:'var(--accentBg)',border:'1.5px solid var(--accentBrd)',borderRadius:12,display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
          <span style={{fontSize:14,fontWeight:600,color:'var(--tx2)'}}>Total charges maison</span>
          <span className="mono" style={{fontSize:20,fontWeight:700,color:'var(--accent)'}}>{eur(calc.maisonTotal)}</span>
        </div>
      )}
    </div>
  );
};

  const upd=(f,v)=>updM(mo=>({...mo,[who]:{...mo[who],[f]:v}}));
  const name=who==='ahmed'?s.identity.person1:s.identity.person2;
  const share=calc?(who==='ahmed'?calc.aShare:calc.sShare):0;
  const reste=calc?(who==='ahmed'?calc.aReste:calc.sReste):0;
  const tgt=s.targetReste||550;
  const resteOk=reste>=tgt;
  return(
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="card">
        <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:16}}>Salaire net mensuel</p>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:14,color:'var(--tx2)'}}>{name}</span>
          <NI val={p.sal||0} onChange={v=>upd('sal',v)} step="1" w="130px"/>

      </div>
      <div className="card">
        <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:16}}>Dépenses personnelles</p>

            <NI val={p.courses||0} onChange={v=>upd('courses',v)} w="100px"/>
          </div>
        </div>
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <label style={{fontSize:14,color:'var(--tx2)'}}>Épargne personnelle</label>

          </div>
          <p style={{fontSize:11,color:'var(--tx3)',marginTop:6}}>Ajustez pour atteindre l'objectif de poche</p>

      </div>
      {calc&&(
        <div style={{padding:'16px',background:resteOk?'var(--grBg)':'var(--rdBg)',border:`1.5px solid ${resteOk?'var(--grBrd)':'var(--rdBrd)'}`,borderRadius:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>

              <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:resteOk?'var(--grB)':'var(--rd)',marginBottom:4}}>Argent de poche</p>

            <span>Part maison : {eur(share)}</span>
            <span>Objectif : {eur(tgt)}</span>

const TabVirements=({calc,m,s})=>{
  if(!calc)return null;
  const cc=m.compteCommun||{loyer:null,loyerOk:false};
  const p1=s.identity.person1, p2=s.identity.person2;
  const entrants=[
    {l:`${p1} → Compte commun`,v:calc.vAhmed,c:'var(--accent)',dir:'↗'},
    {l:`${p2} → Compte commun`,v:calc.vSophieCommun,c:'var(--pu)',dir:'↗'},
  ];
  const directs=[
    {l:`${p2} → Compte périscolaire`,v:calc.vSophiePeri,c:'var(--am)',dir:'↙',hide:calc.vSophiePeri<=0},
    {l:`${p2} → Livret A ${s.identity.child}`,v:calc.vSophieCam,c:'var(--or)',dir:'↙',hide:calc.vSophieCam<=0},
  ].filter(r=>!r.hide);
  const hasLoyer=cc.loyerOk&&(cc.loyer||0)>0;
  return(
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="card">
        <p style={{fontSize:13,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:14}}>Virements → Compte commun</p>
        {entrants.map((r,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 14px',background:'var(--surf2)',borderRadius:10,marginBottom:6}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:18,color:r.c,fontWeight:700,lineHeight:1}}>{r.dir}</span>
              <span style={{fontSize:13,color:'var(--tx2)'}}>{r.l}</span>
            </div>
            <span className="mono" style={{fontSize:15,fontWeight:700,color:r.c}}>{eur(r.v)}</span>
          </div>
        ))}
        <div className="sep"/>
        <div style={{display:'flex',justifyContent:'space-between',padding:'6px 12px'}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--tx2)'}}>Total entrants</span>
          <span className="mono" style={{fontWeight:700,color:'var(--grB)',fontSize:16}}>{eur(calc.vAhmed+calc.vSophieCommun)}</span>
        </div>
      </div>

      {directs.length>0&&(
        <div className="card">
          <p style={{fontSize:13,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:14}}>Virements directs {p2}</p>
          {directs.map((r,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 14px',background:'var(--surf2)',borderRadius:10,marginBottom:6}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:18,color:r.c,fontWeight:700,lineHeight:1}}>{r.dir}</span>
                <span style={{fontSize:13,color:'var(--tx2)'}}>{r.l}</span>
              </div>
              <span className="mono" style={{fontSize:15,fontWeight:700,color:r.c}}>{eur(r.v)}</span>
            </div>
          ))}
        </div>
      )}

      {hasLoyer&&(
        <div className="card-success card" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <p style={{fontSize:14,fontWeight:700,color:'var(--grB)',marginBottom:2}}>Loyer annexe reçu ✓</p>
            <p style={{fontSize:12,color:'var(--tx3)'}}>→ À virer sur Livret A {p1}</p>
          </div>
          <span className="mono" style={{fontSize:18,fontWeight:700,color:'var(--grB)'}}>{eur(cc.loyer||0)}</span>
        </div>
      )}

      <div className="card" style={{background:'var(--surf2)',border:'1.5px solid var(--brd2)'}}>
        <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:12}}>Récapitulatif {p2} — 3 virements</p>
        <Row l={`→ Compte commun`} v={eur(calc.vSophieCommun)} c="var(--pu)"/>
        {calc.vSophiePeri>0&&<Row l={`→ Compte périscolaire`} v={eur(calc.vSophiePeri)} c="var(--am)"/>}
        {calc.vSophieCam>0&&<Row l={`→ Livret A ${s.identity.child}`} v={eur(calc.vSophieCam)} c="var(--or)"/>}
        <div className="sep"/>
        <Row l="Total {p2}" v={eur(calc.vSophie)} c="var(--pu)" bold/>
      </div>
    </div>
  );
};

const TabCompteCommun=({m,updM,calc,s})=>{
  const cc=m.compteCommun||{loyer:null,loyerOk:false,soldeReel:null};
  const updCC=(f,v)=>updM(mo=>({...mo,compteCommun:{...(mo.compteCommun||{}), [f]:v}}));
  const totalEntrants=calc?(calc.vAhmed+calc.vSophieCommun+(cc.loyerOk?(cc.loyer||0):0)):0;
  const delta=cc.soldeReel!=null&&calc?cc.soldeReel-calc.maisonTotal:null;
  return(
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="card">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:3}}>Loyer annexe</p>
            <p style={{fontSize:12,color:'var(--tx3)'}}>Revenu locatif — à affecter sur Livret A {s.identity.person1}</p>
          </div>
          <Tog on={cc.loyerOk} set={v=>updCC('loyerOk',v)}/>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:cc.loyerOk&&(cc.loyer||0)>0?14:0}}>
          <label style={{fontSize:14,color:'var(--tx2)'}}>Montant attendu</label>
          <NI val={cc.loyer||0} onChange={v=>updCC('loyer',v)} step="1" w="120px"/>
        </div>
        {cc.loyerOk&&(cc.loyer||0)>0&&(
          <div style={{padding:'12px 14px',background:'var(--grBg)',borderRadius:10,border:'1px solid var(--grBrd)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <Ico d={IC.chk} s={14} c="var(--grB)"/>
              <p style={{fontSize:13,color:'var(--grB)',fontWeight:600}}>Reçu — virement vers Livret A {s.identity.person1}</p>
            </div>
            <span className="mono" style={{fontSize:15,fontWeight:700,color:'var(--grB)'}}>{eur(cc.loyer)}</span>
          </div>
        )}
      </div>

      {calc&&(
        <div className="card">
          <p style={{fontSize:13,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:14}}>Flux théoriques</p>
          <Row l={`Virement ${s.identity.person1}`} v={'+'+eur(calc.vAhmed)} c="var(--accent)"/>
          <Row l={`Virement ${s.identity.person2}`} v={'+'+eur(calc.vSophieCommun)} c="var(--pu)"/>
          {cc.loyerOk&&(cc.loyer||0)>0&&<Row l="Loyer annexe" v={'+'+eur(cc.loyer)} c="var(--grB)"/>}
          <div className="sep"/>
          <Row l="Total entrants" v={eur(totalEntrants)} bold/>
          <Row l="Charges maison" v={'−'+eur(calc.maisonTotal)} c="var(--rd)"/>
          <div className="sep"/>
          <Row l="Solde théorique" v={eur(totalEntrants-calc.maisonTotal)} c={totalEntrants>=calc.maisonTotal?'var(--grB)':'var(--rd)'} bold/>
        </div>
      )}

      <div className="card">
        <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:4}}>Solde réel constaté</p>
        <p style={{fontSize:12,color:'var(--tx3)',marginBottom:14}}>Module Suivi → pointage en cours de mois</p>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <label style={{fontSize:14,color:'var(--tx2)'}}>Montant sur le compte</label>
          <NI val={cc.soldeReel||0} onChange={v=>updCC('soldeReel',v||null)} step="1" w="120px"/>
        </div>
        {delta!=null&&(
          <div style={{marginTop:12,padding:'10px 14px',background:Math.abs(delta)<50?'var(--grBg)':'var(--amBg)',borderRadius:10,border:`1px solid ${Math.abs(delta)<50?'var(--grBrd)':'var(--amBrd)'}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,color:'var(--tx2)'}}>Écart réel / théorique</span>
            <span className="mono" style={{fontWeight:700,color:Math.abs(delta)<50?'var(--grB)':'var(--am)',fontSize:15}}>{delta>=0?'+':''}{eur(delta)}</span>
          </div>
        )}
      </div>
    </div>
  );
};

const TabPeri=({m,updM,s})=>{
  const r=s.peri_rates, p=m.peri;
  const total=calcPeri(p,r);
  const updP=(f,v)=>updM(mo=>({...mo,peri:{...mo.peri,[f]:v}}));
  const statuses=[{id:'estimation',l:'Estimé',c:'var(--am)'},{id:'facture',l:'Facturé',c:'var(--accent)'},{id:'ecart',l:'Écart',c:'var(--or)'},{id:'paye',l:'Payé ✓',c:'var(--grB)'}];
  const rows=[{k:'matin',l:'Matin'},{k:'midi',l:'Midi'},{k:'soir',l:'Soir'},{k:'journee',l:'Journée'}];
  return(
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="card">
        <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Statut de la facture</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {statuses.map(st=>(
            <button key={st.id} onClick={()=>updP('status',st.id)} style={{padding:'7px 16px',borderRadius:20,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'var(--font)',background:p.status===st.id?st.c+'22':'var(--surf2)',color:p.status===st.id?st.c:'var(--tx3)',border:`1.5px solid ${p.status===st.id?st.c+'55':'var(--brd)'}`,transition:'all var(--tr)'}}>
              {st.l}
            </button>
          ))}
        </div>
      </div>
      <div className="card">
        <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:14}}>Prestations du mois</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px',gap:6,padding:'4px 10px',marginBottom:6}}>
          {['Prestation','Nb.','Tarif','Total'].map(h=><span key={h} style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',textAlign:h==='Prestation'?'left':'right'}}>{h}</span>)}
        </div>
        {rows.map(row=>(
          <div key={row.k} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px',gap:6,alignItems:'center',padding:'9px 10px',borderRadius:10,background:'var(--surf2)',marginBottom:4}}>
            <span style={{fontSize:14,fontWeight:500}}>{row.l}</span>
            <NI val={p[row.k]||0} onChange={v=>updP(row.k,v)} min={0} max={31} w="68px"/>
            <span className="mono" style={{fontSize:12,color:'var(--tx3)',textAlign:'right'}}>{eurD(r[row.k])}</span>
            <span className="mono" style={{fontSize:13,fontWeight:700,textAlign:'right',color:(p[row.k]||0)>0?'var(--tx)':'var(--tx3)'}}>{eurD((p[row.k]||0)*r[row.k])}</span>
          </div>
        ))}
        <div className="sep"/>
        <div style={{display:'flex',justifyContent:'space-between',padding:'8px 10px'}}>
          <span style={{fontWeight:700,letterSpacing:'-.01em'}}>Total estimé</span>
          <span className="mono" style={{fontWeight:700,fontSize:18,color:'var(--am)'}}>{eurD(total)}</span>
        </div>
      </div>
      {(p.status==='facture'||p.status==='ecart'||p.status==='paye')&&(
        <div className="card">
          <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:14}}>Facture réelle</p>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <label style={{fontSize:14,color:'var(--tx2)'}}>Montant facturé</label>
            <NI val={p.facture||0} onChange={v=>updP('facture',v)} step="0.01"/>
          </div>
          {(p.facture||0)>0&&(
            <div style={{padding:'11px 14px',borderRadius:10,background:Math.abs(total-(p.facture||0))>2?'var(--amBg)':'var(--grBg)',border:`1px solid ${Math.abs(total-(p.facture||0))>2?'var(--amBrd)':'var(--grBrd)'}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,color:'var(--tx2)'}}>Écart estimation / facture</span>
              <span className="mono" style={{fontWeight:700,color:Math.abs(total-(p.facture||0))>2?'var(--am)':'var(--grB)'}}>{eurD((p.facture||0)-total)}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   BUDGET MENSUEL
═══════════════════════════════════════════════════════ */
const BudgetMensuel=({D:appData,setD:setAppData,settings,showToast})=>{
  const[ym,setYm]=useState(curYM());
  const[tab,setTab]=useState('maison');
  const[showVer,setShowVer]=useState(false);
  const[verLbl,setVerLbl]=useState('');
  const m=appData.months[ym];
  const calc=useMemo(()=>m?calcMonth(m,settings):null,[m,settings]);
  const createM=()=>setAppData(p=>({...p,months:{...p.months,[ym]:mkMonth(ym,settings)}}));
  const updM=fn=>setAppData(p=>({...p,months:{...p.months,[ym]:fn(p.months[ym])}}));

  const saveVer=lbl=>{
    updM(mo=>{
      const{versions:_,...rest}=mo;
      return{...mo,versions:[...mo.versions,{
        id:Date.now()+'', savedAt:new Date().toISOString(),
        label:lbl||('Sauvegarde '+new Date().toLocaleString('fr-FR')),
        snapshot:{...rest}
      }]};
    });
    setShowVer(false);setVerLbl('');
    showToast('Version sauvegardée ✓','success');
  };

  const cloture=()=>{
    updM(mo=>({...mo,statut:mo.statut==='cloture'?'en_cours':'cloture'}));
    showToast(m.statut==='cloture'?'Mois réouvert':'Mois clôturé ✓','success');
  };

  const TABS=[
    {id:'maison',l:'🏠 Maison'},
    {id:'ahmed',l:`👤 ${settings.identity.person1}`},
    {id:'sophie',l:`👤 ${settings.identity.person2}`},
    {id:'commun',l:'🏦 Compte commun'},
    {id:'virements',l:'💸 Virements'},
    {id:'peri',l:'🎒 Périscolaire'},
  ];

  if(!m)return(
    <div style={{padding:'16px 16px 24px'}}>
      <MNav ym={ym} setYm={setYm}/>
      <div style={{textAlign:'center',padding:'64px 20px'}}>
        <div style={{fontSize:64,marginBottom:20}}>📅</div>
        <h3 style={{fontSize:20,fontWeight:700,letterSpacing:'-.03em',marginBottom:8}}>{mFull(ym)}</h3>
        <p style={{color:'var(--tx2)',marginBottom:28,fontSize:14}}>Aucun budget créé pour ce mois</p>
        <button className="btn btn-p" onClick={createM}><Ico d={IC.plus} s={15}/> Créer le budget</button>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:32}}>
      <div style={{padding:'16px 16px 0'}}>
        <MNav ym={ym} setYm={setYm}/>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:14,flexWrap:'wrap'}}>
          <span className={m.statut==='cloture'?'badge bg':'badge bb'}>
            {m.statut==='cloture'?'✓ Clôturé':'En cours'}
          </span>
          <span className="badge bw">{m.versions.length} version{m.versions.length>1?'s':''}</span>
          <div style={{flex:1}}/>
          <button className="btn btn-s btn-sm" onClick={()=>saveVer('')}><Ico d={IC.save} s={13}/> Sauvegarder</button>
          <button className="btn btn-g btn-sm" onClick={()=>setShowVer(true)}><Ico d={IC.eye} s={13}/></button>
          <button className={`btn btn-sm ${m.statut==='cloture'?'btn-s':'btn-s'}`} onClick={cloture} style={{borderColor:m.statut==='cloture'?'var(--am)':'var(--brd)',color:m.statut==='cloture'?'var(--am)':'var(--tx2)'}}>
            {m.statut==='cloture'?'Réouvrir':'Clôturer'}
          </button>
        </div>
      </div>
      <SummaryBar calc={calc} s={settings}/>
      <div style={{overflowX:'auto',padding:'12px 16px 0',display:'flex',gap:6}}>
        {TABS.map(t=><button key={t.id} className={`tabbtn ${tab===t.id?'tabbtn-a':'tabbtn-i'}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
      </div>
      <div style={{padding:'14px 16px 0'}}>
        {tab==='maison'&&<TabMaison m={m} calc={calc} updM={updM} s={settings}/>}
        {tab==='ahmed'&&<TabPersonne who="ahmed" m={m} calc={calc} updM={updM} s={settings}/>}
        {tab==='sophie'&&<TabPersonne who="sophie" m={m} calc={calc} updM={updM} s={settings}/>}
        {tab==='commun'&&<TabCompteCommun m={m} updM={updM} calc={calc} s={settings}/>}
        {tab==='virements'&&<TabVirements calc={calc} m={m} s={settings}/>}
        {tab==='peri'&&<TabPeri m={m} updM={updM} s={settings}/>}
      </div>
      <Modal open={showVer} close={()=>setShowVer(false)} title="Historique des versions">
        {m.versions.length===0
          ?<p style={{color:'var(--tx2)',textAlign:'center',padding:'24px 0',fontSize:14}}>Aucune version sauvegardée</p>
          :[...m.versions].reverse().map(v=>(
            <div key={v.id} style={{padding:'12px 14px',background:'var(--surf2)',borderRadius:10,border:'1.5px solid var(--brd2)',marginBottom:8}}>
              <p style={{fontSize:14,fontWeight:600,marginBottom:4}}>{v.label}</p>
              <p style={{fontSize:12,color:'var(--tx3)'}}>{new Date(v.savedAt).toLocaleString('fr-FR')}</p>
            </div>
          ))
        }
        <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8}}>
          <input className="ifield" placeholder="Nom de la version (optionnel)" value={verLbl} onChange={e=>setVerLbl(e.target.value)}/>
          <button className="btn btn-p" style={{justifyContent:'center'}} onClick={()=>saveVer(verLbl)}><Ico d={IC.save} s={14}/> Sauvegarder</button>
        </div>
      </Modal>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
const Dashboard=({D:appData,setD:setAppData,settings,onNav,lastSync,showToast})=>{
  const ym=curYM();
  const m=appData.months[ym];
  const calc=useMemo(()=>m?calcMonth(m,settings):null,[m,settings]);
  const prev=prevYM(ym);
  const mPrev=appData.months[prev];
  const tgt=settings.targetReste||550;

  // Alerte mois précédent
  const prevTracks=mPrev?(mPrev.track&&mPrev.track.items?mPrev.track.items:[]):[];
  const prevAllItems=mPrev?[
    ...mPrev.maison.items.filter(it=>!it.calc).map(it=>({id:it.id,planned:(it.val||0)+(it.ass||0)})),
    {id:'courses_a',planned:mPrev.ahmed.courses||0},
    {id:'courses_s',planned:mPrev.sophie.courses||0},
  ].filter(x=>x.planned>0):[];
  const prevNonPointed=prevAllItems.filter(x=>{
    const t=prevTracks.find(tt=>tt.id===x.id);
    return !t||t.status!=='done';
  }).length;

  // Épargne total
  const totEpargne=(appData.settings.savings||[]).reduce((a,s)=>a+((appData.balances||{})[s.id]||s.bal),0);
  // Crédits total
  const totCap=(appData.settings.credits||[]).reduce((a,c)=>a+(c.cap||0),0);
  const totMens=(appData.settings.credits||[]).reduce((a,c)=>a+c.mens+(c.ass||0),0);

  return(
    <div style={{padding:'16px 16px 32px',display:'flex',flexDirection:'column',gap:14}}>

      {/* Header mois */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Tableau de bord</p>
          <h2 style={{fontSize:22,fontWeight:800,letterSpacing:'-.04em'}}>{mFull(ym)}</h2>
        </div>
        {lastSync&&(
          <div style={{textAlign:'right'}}>
            <p style={{fontSize:10,color:'var(--tx3)',marginBottom:2}}>Dernière synchro</p>
            <p style={{fontSize:11,fontWeight:600,color:'var(--tx3)'}}>
              {new Date(lastSync).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
            </p>
          </div>
        )}
      </div>

      {/* Alerte mois précédent */}
      {mPrev&&prevNonPointed>0&&(
        <div className="card-warning card card-sm" style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}} onClick={()=>onNav('suivi')}>
          <Ico d={IC.alert} s={18} c="var(--am)"/>
          <div style={{flex:1}}>
            <p style={{fontSize:13,fontWeight:700,color:'var(--am)',marginBottom:2}}>{prevNonPointed} dépense{prevNonPointed>1?'s':''} non pointée{prevNonPointed>1?'s':''} en {mShort(prev)}</p>
            <p style={{fontSize:11,color:'var(--tx3)'}}>Vérifiez le suivi avant de continuer ce mois</p>
          </div>
          <Ico d={IC.chR} s={14} c="var(--am)"/>
        </div>
      )}

      {/* Budget mois en cours */}
      {m&&calc?(
        <>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="card card-sm">
              <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Budget maison</p>
              <p className="mono" style={{fontSize:24,fontWeight:700,letterSpacing:'-.03em'}}>{eur(calc.maisonTotal)}</p>
              <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>dont {eur(calc.periTotal)} périscolaire</p>
            </div>
            <div className="card card-sm">
              <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Delta</p>
              <p className="mono" style={{fontSize:24,fontWeight:700,color:'var(--accent)',letterSpacing:'-.03em'}}>{eur(calc.delta)}</p>
              <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{settings.deltaAuto?'Auto (salaires)':'Fixe configuré'}</p>
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="card card-sm" style={{borderColor:calc.aReste>=tgt?'var(--grBrd)':'var(--rdBrd)'}}>
              <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,color:'var(--accent)'}}>Reste {settings.identity.person1}</p>
              <p className="mono" style={{fontSize:22,fontWeight:700,color:calc.aReste>=tgt?'var(--grB)':'var(--rd)',letterSpacing:'-.03em'}}>{eur(calc.aReste)}</p>
              <div className="pbar" style={{marginTop:8}}>
                <div className="pbar-fill" style={{width:`${Math.min(100,(calc.aReste/tgt)*100)}%`,background:calc.aReste>=tgt?'var(--gr)':'var(--rd)'}}/>
              </div>
            </div>
            <div className="card card-sm" style={{borderColor:calc.sReste>=tgt?'var(--grBrd)':'var(--rdBrd)'}}>
              <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,color:'var(--pu)'}}>Reste {settings.identity.person2}</p>
              <p className="mono" style={{fontSize:22,fontWeight:700,color:calc.sReste>=tgt?'var(--grB)':'var(--rd)',letterSpacing:'-.03em'}}>{eur(calc.sReste)}</p>
              <div className="pbar" style={{marginTop:8}}>
                <div className="pbar-fill" style={{width:`${Math.min(100,(calc.sReste/tgt)*100)}%`,background:calc.sReste>=tgt?'var(--gr)':'var(--rd)'}}/>
              </div>
            </div>
          </div>

          {/* Périscolaire status */}
          <div className="card card-sm" style={{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}} onClick={()=>onNav('budget')}>
            <div>
              <p style={{fontSize:13,fontWeight:600,marginBottom:3}}>Périscolaire {mShort(ym)}</p>
              <span className={
                m.peri.status==='paye'?'badge bg':
                m.peri.status==='facture'?'badge bb':
                m.peri.status==='ecart'?'badge ba':'badge ba'
              }>{
                m.peri.status==='paye'?'✓ Payé':
                m.peri.status==='facture'?'Facturé':
                m.peri.status==='ecart'?'Écart':'Estimation'
              }</span>
            </div>
            <div style={{textAlign:'right'}}>
              <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--am)'}}>{eur(calc.periTotal)}</p>
              {m.peri.facture&&<p style={{fontSize:11,color:'var(--tx3)'}}>réel: {eur(m.peri.facture)}</p>}
            </div>
          </div>
        </>
      ):(
        <div className="card" style={{textAlign:'center',padding:'32px 16px'}}>
          <div style={{fontSize:48,marginBottom:12}}>📅</div>
          <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun budget pour {mShort(ym)}</p>
          <p style={{fontSize:13,color:'var(--tx2)',marginBottom:20}}>Créez le budget du mois pour commencer</p>
          <button className="btn btn-p" onClick={()=>onNav('budget')}><Ico d={IC.plus} s={14}/> Créer le budget</button>
        </div>
      )}

      {/* Épargne & Crédits */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="card card-sm" style={{cursor:'pointer'}} onClick={()=>onNav('epargne')}>
          <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Épargne totale</p>
          <p className="mono" style={{fontSize:20,fontWeight:700,color:'var(--grB)',letterSpacing:'-.03em'}}>{eur(totEpargne)}</p>
          <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{settings.savings.length} compte{settings.savings.length>1?'s':''}</p>
        </div>
        <div className="card card-sm" style={{cursor:'pointer'}} onClick={()=>onNav('credits')}>
          <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Capital restant</p>
          <p className="mono" style={{fontSize:20,fontWeight:700,color:'var(--rd)',letterSpacing:'-.03em'}}>{eur(totCap)}</p>
          <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{eur(totMens)}/mois</p>
        </div>
      </div>

      {/* Accès rapides */}
      <div className="card card-sm">
        <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Accès rapides</p>

const CAT_COL={maison:'var(--accent)',peri:'var(--am)',courses:'var(--pu)',savings:'var(--gr)',income:'var(--grB)'};
const CAT_LBL={maison:'Charges maison',peri:'Périscolaire',courses:'Courses alimentaires',savings:'Épargne',income:'Revenus locatifs'};

const getTrackItems=(m,s)=>{
  const peri=calcPeri(m.peri,s.peri_rates);
  const it=[];
  m.maison.items.forEach(x=>{
    if(!x.calc&&(x.val||0)+(x.ass||0)>0)
      it.push({id:'m_'+x.id,label:x.label,planned:(x.val||0)+(x.ass||0),cat:'maison'});
  });
  if(peri>0)it.push({id:'peri',label:'Périscolaire',planned:peri,cat:'peri'});
  if((m.ahmed.courses||0)>0)it.push({id:'crs_a',label:`Courses ${s.identity.person1}`,planned:m.ahmed.courses||0,cat:'courses'});
  if((m.sophie.courses||0)>0)it.push({id:'crs_s',label:`Courses ${s.identity.person2}`,planned:m.sophie.courses||0,cat:'courses'});
  if((m.ahmed.savings||0)>0)it.push({id:'sav_a',label:`Épargne ${s.identity.person1}`,planned:m.ahmed.savings||0,cat:'savings',savingsId:'lv_ahmed'});
  if((m.sophie.savings||0)>0)it.push({id:'sav_s',label:`Épargne ${s.identity.person2}`,planned:m.sophie.savings||0,cat:'savings',savingsId:'lv_sophie'});
  const ec=m.maison.items.find(x=>x.id==='eparg_cam');
  if(ec&&(ec.val||0)>0)it.push({id:'sav_cam',label:`Épargne ${s.identity.child}`,planned:ec.val||0,cat:'savings',savingsId:'la_cam'});
  const cc=m.compteCommun||{};
  if(cc.loyerOk&&(cc.loyer||0)>0)it.push({id:'loyer_in',label:`Loyer → Livret A ${s.identity.person1}`,planned:cc.loyer||0,cat:'income',savingsId:'la_ahmed'});
  return it;
};

/* ═══════════════════════════════════════════════════════
   SUIVI MOIS
═══════════════════════════════════════════════════════ */
const SuiviMois=({D:appData,setD:setAppData,settings,showToast})=>{
  const[ym,setYm]=useState(curYM());
  const[confirmReset,setConfirmReset]=useState(false);
  const m=appData.months[ym];
  const calc=useMemo(()=>m?calcMonth(m,settings):null,[m,settings]);
  const trackItems=useMemo(()=>m?getTrackItems(m,settings):[],[m,settings]);
  const states=m?(m.track&&m.track.states?m.track.states:{}):{};

  const toggleItem=useCallback(item=>{
    const isDone=(states[item.id]||{status:'pending'}).status==='done';
    const txId=ym+'_'+item.id;
    setAppData(p=>{
      const mo=p.months[ym];
      if(!mo)return p;
      const newSt={...(mo.track&&mo.track.states?mo.track.states:{}),[item.id]:isDone?{status:'pending',actual:null}:{status:'done',actual:item.planned}};
      const newMo={...mo,track:{...mo.track,states:newSt}};
      let newBal={...p.balances};
      let newTxs=[...p.txs];
      if(item.savingsId){
        const delta=isDone?-(item.planned||0):(item.planned||0);
        newBal[item.savingsId]=(newBal[item.savingsId]||0)+delta;
        newTxs=newTxs.filter(t=>t.id!==txId);
        if(!isDone)newTxs.push({id:txId,ym,date:new Date().toISOString().split('T')[0],accId:item.savingsId,montant:item.planned,label:item.label,type:'acquittement'});
      }
      return{...p,months:{...p.months,[ym]:newMo},balances:newBal,txs:newTxs};
    });
  },[ym,states,setAppData]);

  const doReset=()=>{
    const rev={},rmTxs=[];
    trackItems.forEach(item=>{
      const st=states[item.id]||{status:'pending'};
      if(st.status==='done'&&item.savingsId){
        rev[item.savingsId]=(rev[item.savingsId]||0)-(item.planned||0);
        rmTxs.push(ym+'_'+item.id);
      }
    });
    setAppData(p=>{
      const mo=p.months[ym];if(!mo)return p;
      const newBal={...p.balances};
      Object.entries(rev).forEach(([k,v])=>{newBal[k]=(newBal[k]||0)+v;});
      return{...p,months:{...p.months,[ym]:{...mo,track:{states:{},extras:[]}}},balances:newBal,txs:p.txs.filter(t=>!rmTxs.includes(t.id))};
    });
    setConfirmReset(false);
    showToast('Suivi réinitialisé','info');
  };

  if(!m)return(
    <div style={{padding:'16px 16px 24px'}}>
      <MNav ym={ym} setYm={setYm}/>
      <div style={{textAlign:'center',padding:'64px 20px'}}>
        <div style={{fontSize:60,marginBottom:16}}>📊</div>
        <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun budget pour {mFull(ym)}</p>
        <p style={{fontSize:13,color:'var(--tx3)'}}>Créez d'abord le budget dans l'onglet Budget</p>
      </div>
    </div>
  );

  const cats=[...new Set(trackItems.map(x=>x.cat))];
  const doneItems=trackItems.filter(x=>(states[x.id]||{status:'pending'}).status==='done');
  const totalPointe=doneItems.reduce((a,x)=>a+(x.planned||0),0);
  const totalPrevu=trackItems.reduce((a,x)=>a+(x.planned||0),0);
  const pct=totalPrevu>0?Math.round((totalPointe/totalPrevu)*100):0;
  const cc=m.compteCommun||{};
  const soldeTheo=calc?calc.maisonTotal:0;
  const soldeDelta=(cc.soldeReel!=null&&calc)?cc.soldeReel-soldeTheo:null;

  return(
    <div style={{paddingBottom:32}}>
      <div style={{padding:'16px 16px 14px'}}>
        <MNav ym={ym} setYm={setYm}/>
        {/* Barre de progression */}
        <div style={{marginTop:14,padding:'14px 16px',background:'var(--surf)',border:'1.5px solid var(--brd)',borderRadius:14,display:'flex',alignItems:'center',gap:14}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:700,color:'var(--tx2)'}}>{doneItems.length}/{trackItems.length} pointés</span>
              <span style={{fontSize:12,fontWeight:700,color:pct===100?'var(--grB)':'var(--accent)'}}>{pct}%</span>
            </div>
            <div className="pbar" style={{height:7}}>
              <div className="pbar-fill" style={{width:`${pct}%`,background:pct===100?'var(--gr)':'var(--accent)'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
              <span style={{fontSize:11,color:'var(--tx3)'}}>Pointé : {eur(totalPointe)}</span>
              <span style={{fontSize:11,color:'var(--tx3)'}}>Prévu : {eur(totalPrevu)}</span>
            </div>
          </div>
          {pct===100&&<span style={{fontSize:28}}>✅</span>}
        </div>
      </div>

      {/* Solde compte commun */}
      {calc&&(
        <div style={{padding:'0 16px',marginBottom:14}}>
          <div className="card card-sm">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <p style={{fontSize:13,fontWeight:700,marginBottom:2}}>Compte commun — solde réel</p>
                <p style={{fontSize:11,color:'var(--tx3)'}}>Comparez avec le solde théorique</p>
              </div>
              {soldeDelta!=null&&(
                <span className={Math.abs(soldeDelta)<20?'badge bg':Math.abs(soldeDelta)<100?'badge ba':'badge br'}>
                  {soldeDelta>=0?'+':''}{eur(soldeDelta)}
                </span>
              )}
            </div>
            <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-end'}}>
              <div>
                <p style={{fontSize:10,color:'var(--tx3)',marginBottom:4,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}>Théorique</p>
                <p className="mono" style={{fontSize:20,fontWeight:700,color:'var(--accent)'}}>{eur(soldeTheo)}</p>
              </div>
              <div>
                <p style={{fontSize:10,color:'var(--tx3)',marginBottom:4,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}>Réel constaté</p>
                <NI val={cc.soldeReel||0} onChange={v=>{
                  setAppData(p=>{const mo=p.months[ym];return{...p,months:{...p.months,[ym]:{...mo,compteCommun:{...(mo.compteCommun||{}),soldeReel:v||null}}}};});
                }} step="1" w="120px"/>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Items par catégorie */}
      <div style={{padding:'0 16px'}}>
        {cats.map(cat=>{
          const catItems=trackItems.filter(x=>x.cat===cat);
          const catColor=CAT_COL[cat]||'var(--accent)';
          const catLabel=CAT_LBL[cat]||cat;
          const catDone=catItems.filter(x=>(states[x.id]||{status:'pending'}).status==='done').length;
          return(
            <div key={cat} style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 2px',marginBottom:8}}>
                <p style={{fontSize:11,fontWeight:700,color:catColor,textTransform:'uppercase',letterSpacing:'.07em'}}>{catLabel}</p>
                <span style={{fontSize:11,color:'var(--tx3)',fontWeight:600}}>{catDone}/{catItems.length} ✓</span>
              </div>
              {catItems.map(item=>{
                const isDone=(states[item.id]||{status:'pending'}).status==='done';
                return(
                  <div key={item.id} onClick={()=>toggleItem(item)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--surf)',border:`1.5px solid ${isDone?catColor+'55':'var(--brd)'}`,borderRadius:12,marginBottom:6,cursor:'pointer',transition:'all var(--tr)',borderLeftWidth:4,borderLeftColor:isDone?catColor:'var(--brd2)'}}>
                    <div style={{width:22,height:22,borderRadius:7,border:`2px solid ${isDone?catColor:'var(--brd)'}`,background:isDone?catColor:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all var(--tr)'}}>
                      {isDone&&<Ico d={IC.chk} s={12} c="#fff" sw={2.5}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:14,fontWeight:isDone?600:500,color:isDone?'var(--tx)':'var(--tx2)',textDecoration:isDone?'line-through':'none'}}>{item.label}</p>
                      {item.savingsId&&<p style={{fontSize:11,color:isDone?catColor:'var(--tx3)',marginTop:2}}>{isDone?'✓ Épargne créditée':'Impact épargne'}</p>}
                    </div>
                    <span className="mono" style={{fontSize:14,fontWeight:700,color:isDone?catColor:'var(--tx3)',flexShrink:0}}>{eur(item.planned)}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* Reset */}
      <div style={{padding:'4px 16px 0',display:'flex',justifyContent:'center'}}>
        <button className="btn btn-d btn-sm" onClick={()=>setConfirmReset(true)}>
          <Ico d={IC.ref} s={13}/> Réinitialiser le suivi
        </button>
      </div>

      <Modal open={confirmReset} close={()=>setConfirmReset(false)} title="Réinitialiser le suivi ?">
        <p style={{color:'var(--tx2)',marginBottom:20,fontSize:14,lineHeight:1.7}}>
          Tous les pointages de <strong>{mFull(ym)}</strong> seront effacés et les mouvements d'épargne associés annulés.
        </p>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setConfirmReset(false)}>Annuler</button>
          <button className="btn btn-d" style={{flex:1,justifyContent:'center'}} onClick={doReset}>Réinitialiser</button>
        </div>
      </Modal>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   ÉPARGNE
═══════════════════════════════════════════════════════ */
const Epargne=({D:appData,setD:setAppData,settings,showToast})=>{
  const[adjAcc,setAdjAcc]=useState(null);
  const[adjVal,setAdjVal]=useState('');
  const[adjNote,setAdjNote]=useState('');
  const s=settings;
  const accs=s.savings||[];
  const bals=appData.balances||{};
  const totEpargne=accs.reduce((a,acc)=>a+(bals[acc.id]!=null?bals[acc.id]:acc.bal),0);

  const openAdj=acc=>{
    setAdjAcc(acc);
    setAdjVal(String(bals[acc.id]!=null?bals[acc.id]:acc.bal));
    setAdjNote('');
  };

  const doAdj=()=>{
    const v=parseFloat(adjVal);
    if(isNaN(v)||!adjAcc)return;
    const old=bals[adjAcc.id]||0;
    const delta=v-old;
    setAppData(p=>({
      ...p,
      balances:{...p.balances,[adjAcc.id]:v},
      balanceAdjusts:[...(p.balanceAdjusts||[]),{
        id:'adj_'+Date.now(),accId:adjAcc.id,montant:delta,soldeResultat:v,
        date:new Date().toISOString().split('T')[0],note:adjNote||'Ajustement manuel'
      }],
      txs:[...(p.txs||[]),{
        id:'adj_tx_'+Date.now(),accId:adjAcc.id,montant:delta,
        label:'Ajustement manuel'+(adjNote?' — '+adjNote:''),
        date:new Date().toISOString().split('T')[0],type:'ajustement'
      }]
    }));
    showToast('Solde mis à jour ✓','success');
    setAdjAcc(null);
  };

  return(
    <div style={{padding:'16px 16px 32px'}}>
      {/* Total */}
      <div style={{padding:'22px 20px',background:'var(--surf)',border:'1.5px solid var(--brd)',borderRadius:18,marginBottom:16,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-30,right:-30,width:140,height:140,borderRadius:'50%',background:'var(--grBg)',filter:'blur(30px)',pointerEvents:'none'}}/>
        <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Épargne totale</p>
        <p className="mono" style={{fontSize:38,fontWeight:800,color:'var(--grB)',letterSpacing:'-.05em',lineHeight:1}}>{eur(totEpargne)}</p>
        <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
          <span className="badge bg">{accs.length} compte{accs.length>1?'s':''}</span>
          <span className="badge bw">Référence : {mShort(FROZEN_MONTH)}</span>
        </div>
      </div>

      {/* Par compte */}
      {accs.map(acc=>{
        const bal=bals[acc.id]!=null?bals[acc.id]:acc.bal;
        const accTxs=(appData.txs||[]).filter(t=>t.accId===acc.id).slice(-5).reverse();
        const adjCnt=(appData.balanceAdjusts||[]).filter(a=>a.accId===acc.id).length;
        return(
          <div key={acc.id} className="card" style={{marginBottom:12,borderLeft:`4px solid ${acc.color||'var(--accent)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
              <div>
                <p style={{fontSize:16,fontWeight:700,letterSpacing:'-.02em',marginBottom:3}}>{acc.name}</p>
                {acc.monthly>0&&<p style={{fontSize:12,color:'var(--tx3)'}}>Versement mensuel : {eur(acc.monthly)}</p>}
                {adjCnt>0&&<p style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>{adjCnt} ajustement{adjCnt>1?'s':''} manuel{adjCnt>1?'s':''}</p>}
              </div>
              <button className="btn btn-s btn-sm" onClick={()=>openAdj(acc)}>
                <Ico d={IC.pen} s={13}/> Ajuster
              </button>
            </div>
            <div style={{padding:'16px',background:'var(--surf2)',borderRadius:12,marginBottom:accTxs.length>0?12:0}}>
              <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Solde actuel</p>
              <p className="mono" style={{fontSize:30,fontWeight:800,color:acc.color||'var(--grB)',letterSpacing:'-.04em'}}>{eur(bal)}</p>
              {acc.monthly>0&&(
                <div className="pbar" style={{marginTop:10}}>
                  <div className="pbar-fill" style={{width:`${Math.min(100,(bal/Math.max(bal,acc.monthly*12))*100)}%`,background:acc.color||'var(--gr)'}}/>
                </div>
              )}
            </div>
            {accTxs.length>0&&(
              <div>
                <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Derniers mouvements</p>
                {accTxs.map(t=>(
                  <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'var(--surf2)',borderRadius:9,marginBottom:4}}>
                    <div>
                      <p style={{fontSize:13,fontWeight:500}}>{t.label}</p>
                      <p style={{fontSize:11,color:'var(--tx3)'}}>{t.date} — <span style={{textTransform:'capitalize'}}>{t.type||'mouvement'}</span></p>
                    </div>
                    <span className="mono" style={{fontSize:13,fontWeight:700,color:(t.montant||0)>=0?'var(--grB)':'var(--rd)'}}>{(t.montant||0)>=0?'+':''}{eur(t.montant)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      {/* Modal ajustement */}
      <Modal open={!!adjAcc} close={()=>setAdjAcc(null)} title={adjAcc?`Ajuster — ${adjAcc.name}`:''}>
        {adjAcc&&(
          <>
            <div style={{display:'flex',justifyContent:'space-between',padding:'14px 16px',background:'var(--surf2)',borderRadius:12,marginBottom:18}}>
              <span style={{fontSize:13,color:'var(--tx2)'}}>Solde actuel</span>
              <span className="mono" style={{fontWeight:700,color:adjAcc.color||'var(--accent)',fontSize:17}}>{eur(bals[adjAcc.id]!=null?bals[adjAcc.id]:adjAcc.bal)}</span>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:8}}>Nouveau solde (€)</label>
              <input type="number" className="ifield" value={adjVal} step="0.01"
                onChange={e=>setAdjVal(e.target.value)}
                style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,textAlign:'right'}}/>
              {adjVal&&!isNaN(parseFloat(adjVal))&&(()=>{
                const delta=parseFloat(adjVal)-(bals[adjAcc.id]||0);
                return<p style={{fontSize:12,marginTop:6,fontWeight:600,color:delta>=0?'var(--grB)':'var(--rd)'}}>Variation : {delta>=0?'+':''}{eur(delta)}</p>;
              })()}
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:8}}>Motif (optionnel)</label>
              <input className="ifield" value={adjNote} onChange={e=>setAdjNote(e.target.value)} placeholder="Virement reçu, retrait, correction..."/>
            </div>
            <div style={{padding:'10px 14px',background:'var(--amBg)',borderRadius:10,border:'1px solid var(--amBrd)',marginBottom:18}}>
              <p style={{fontSize:12,color:'var(--am)',lineHeight:1.6}}>⚠ Les soldes initiaux de {mShort(FROZEN_MONTH)} sont figés. Cet ajustement affecte le solde affiché uniquement.</p>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setAdjAcc(null)}>Annuler</button>
              <button className="btn btn-p" style={{flex:1,justifyContent:'center'}} onClick={doAdj} disabled={!adjVal||isNaN(parseFloat(adjVal))}>Confirmer</button>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   COMING SOON STUB
═══════════════════════════════════════════════════════ */
const ComingSoon=({icon,label,desc})=>(
  <div style={{textAlign:'center',padding:'72px 24px'}}>
    <div style={{fontSize:64,marginBottom:20,filter:'grayscale(.3)'}}>{icon}</div>
    <h3 style={{fontSize:20,fontWeight:700,letterSpacing:'-.03em',marginBottom:8}}>{label}</h3>

);

/* ═══════════════════════════════════════════════════════
   SALAIRES
═══════════════════════════════════════════════════════ */
const Salaires=({D:appData,settings})=>{
  const months=Object.entries(appData.months||{})
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([ym,m])=>({ym,a:m.ahmed&&m.ahmed.sal?m.ahmed.sal:0,s:m.sophie&&m.sophie.sal?m.sophie.sal:0}))
    .filter(x=>x.a>0||x.s>0);

  if(!months.length)return(
    <div style={{textAlign:'center',padding:'64px 24px'}}>
      <div style={{fontSize:64,marginBottom:16}}>📈</div>
      <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun salaire enregistré</p>
      <p style={{fontSize:13,color:'var(--tx3)'}}>Renseignez les salaires dans le Budget de chaque mois</p>
    </div>
  );

  const maxSal=Math.max(...months.flatMap(x=>[x.a,x.s]),1);
  const withA=months.filter(x=>x.a>0);
  const withS=months.filter(x=>x.s>0);
  const avgA=withA.length?Math.round(withA.reduce((s,x)=>s+x.a,0)/withA.length):0;
  const avgS=withS.length?Math.round(withS.reduce((s,x)=>s+x.s,0)/withS.length):0;
  const p1=settings.identity.person1,p2=settings.identity.person2;

  return(
    <div style={{padding:'16px 16px 32px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[{l:`Moy. ${p1}`,v:eur(avgA),c:'var(--accent)'},{l:`Moy. ${p2}`,v:eur(avgS),c:'var(--pu)'}].map((k,i)=>(
          <div key={i} className="card card-sm">
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>{k.l}</p>
            <p className="mono" style={{fontSize:22,fontWeight:700,color:k.c}}>{k.v}</p>
            <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{i===0?withA.length:withS.length} mois</p>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:16}}>
        <p style={{fontSize:13,fontWeight:700,letterSpacing:'-.02em',marginBottom:16}}>Évolution des salaires</p>
        <div style={{display:'flex',gap:5,alignItems:'flex-end',overflowX:'auto',paddingBottom:8,minHeight:110}}>
          {months.slice(-12).map(m=>(
            <div key={m.ym} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flexShrink:0,minWidth:46}}>
              <div style={{display:'flex',gap:3,alignItems:'flex-end',height:80}}>
                {m.a>0&&<div style={{width:16,borderRadius:'4px 4px 0 0',background:'var(--accent)',height:`${Math.round((m.a/maxSal)*78)}px`,transition:'height .4s ease'}} title={`${p1}: ${eur(m.a)}`}/>}
                {m.s>0&&<div style={{width:16,borderRadius:'4px 4px 0 0',background:'var(--pu)',height:`${Math.round((m.s/maxSal)*78)}px`,transition:'height .4s ease'}} title={`${p2}: ${eur(m.s)}`}/>}
              </div>
              <p style={{fontSize:9,color:'var(--tx3)',fontWeight:600,textAlign:'center',lineHeight:1.1}}>{mShort(m.ym)}</p>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:16,marginTop:10}}>
          {[{l:p1,c:'var(--accent)'},{l:p2,c:'var(--pu)'}].map((x,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:x.c}}/>
              <span style={{fontSize:11,color:'var(--tx3)'}}>{x.l}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <p style={{fontSize:13,fontWeight:700,letterSpacing:'-.02em',marginBottom:12}}>Détail par mois</p>
        {[...months].reverse().map(m=>(
          <div key={m.ym} style={{display:'flex',alignItems:'center',padding:'10px 12px',background:'var(--surf2)',borderRadius:10,marginBottom:6,gap:12}}>
            <span style={{fontSize:13,fontWeight:600,flex:1}}>{mShort(m.ym)}</span>
            <div style={{display:'flex',gap:14}}>
              {[[p1,m.a,'var(--accent)'],[p2,m.s,'var(--pu)'],['Total',m.a+m.s,'var(--tx)']].map(([l,v,c],i)=>(
                <div key={i} style={{textAlign:'right'}}>
                  <p style={{fontSize:9,color:c,fontWeight:700,marginBottom:1,textTransform:'uppercase'}}>{l}</p>
                  <p className="mono" style={{fontSize:12,fontWeight:700}}>{eur(v)}</p>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   VACANCES
═══════════════════════════════════════════════════════ */
const Vacances=({D:appData,setD:setAppData,settings,showToast})=>{
  const[newPot,setNewPot]=useState(false);
  const[pForm,setPForm]=useState({name:'',objectif:1000,color:'#4F8EF7',emoji:'🌴'});
  const[txPot,setTxPot]=useState(null);
  const[txF,setTxF]=useState({label:'',montant:0,date:new Date().toISOString().split('T')[0],cat:'epargne'});
  const pots=settings.vacances||[];
  const txs=appData.vacancesTxs||[];
  const totAll=pots.reduce((a,p)=>{const pt=txs.filter(t=>t.potId===p.id);return a+pt.reduce((s,t)=>s+(t.cat==='depense'?-t.montant:t.montant),0);},0);

  const addPot=()=>{
    if(!pForm.name)return;
    const id='pot_'+Date.now();
    setAppData(p=>({...p,settings:{...p.settings,vacances:[...(p.settings.vacances||[]),{...pForm,id}]}}));
    setNewPot(false);setPForm({name:'',objectif:1000,color:'#4F8EF7',emoji:'🌴'});
    showToast('Pot créé ✓','success');
  };
  const delPot=id=>{
    setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).filter(x=>x.id!==id)},vacancesTxs:(p.vacancesTxs||[]).filter(t=>t.potId!==id)}));
    showToast('Pot supprimé','info');
  };
  const addTx=()=>{
    if(!txF.montant||!txPot)return;
    setAppData(p=>({...p,vacancesTxs:[...(p.vacancesTxs||[]),{id:'vtx_'+Date.now(),potId:txPot,...txF,montant:parseFloat(txF.montant)||0}]}));
    setTxPot(null);setTxF({label:'',montant:0,date:new Date().toISOString().split('T')[0],cat:'epargne'});
    showToast('Transaction ajoutée ✓','success');
  };

  return(
    <div style={{padding:'16px 16px 32px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Pots Vacances</p>
          <p className="mono" style={{fontSize:28,fontWeight:800,color:'var(--or)',letterSpacing:'-.04em'}}>{eur(totAll)}</p>
        </div>
        <button className="btn btn-p" onClick={()=>setNewPot(true)}><Ico d={IC.plus} s={14}/> Nouveau pot</button>
      </div>
      {pots.length===0&&(
        <div style={{textAlign:'center',padding:'40px 24px',background:'var(--surf)',border:'2px dashed var(--brd)',borderRadius:16}}>
          <div style={{fontSize:56,marginBottom:12}}>🌴</div>
          <p style={{fontSize:14,fontWeight:700,marginBottom:8}}>Aucun pot vacances</p>
          <p style={{fontSize:13,color:'var(--tx3)'}}>Créez des pots par destination ou projet</p>
        </div>
      )}
      {pots.map(pot=>{
        const ptxs=txs.filter(t=>t.potId===pot.id).sort((a,b)=>b.date.localeCompare(a.date));
        const total=ptxs.reduce((s,t)=>s+(t.cat==='depense'?-t.montant:t.montant),0);
        const pct=pot.objectif>0?Math.min(100,Math.round((total/pot.objectif)*100)):0;
        return(
          <div key={pot.id} className="card" style={{marginBottom:12,borderLeft:`4px solid ${pot.color}`}}>

              <div className="pbar">

              <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--surf2)',borderRadius:8,marginBottom:4}}>
                <div><p style={{fontSize:13,fontWeight:500}}>{t.label||'Transaction'}</p><p style={{fontSize:11,color:'var(--tx3)'}}>{t.date}</p></div>
                <span className="mono" style={{fontSize:13,fontWeight:700,color:t.cat==='depense'?'var(--rd)':'var(--grB)'}}>{t.cat==='depense'?'−':'+' }{eur(t.montant)}</span>
