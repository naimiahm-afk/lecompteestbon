*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0D1117;color:#E6EDF3;min-height:100vh;overflow-x:hidden}
:root{
  --bg:#0D1117;--surf:#161B22;--surf2:#1C2333;--surf3:#21262D;
  --brd:#30363D;--brd2:#21262D;
  --tx:#E6EDF3;--tx2:#8B949E;--tx3:#6E7681;
  --gr:#2EA043;--grB:#3FB950;--grBg:rgba(46,160,67,.12);
  --rd:#F85149;--rdBg:rgba(248,81,73,.12);
  --am:#D29922;--amBg:rgba(210,153,34,.12);
  --bl:#58A6FF;--blBg:rgba(88,166,255,.12);
  --pu:#A371F7;--puBg:rgba(163,113,247,.12);
  --or:#F0883E;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.mono{font-family:'DM Mono',monospace}
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Inputs */
.ifield{background:var(--surf3);border:1px solid var(--brd);border-radius:8px;color:var(--tx);padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .15s;width:100%}
.ifield:focus{border-color:var(--bl)}
.inum{background:var(--surf3);border:1px solid var(--brd);border-radius:8px;color:var(--tx);padding:6px 10px;font-family:'DM Mono',monospace;font-size:14px;outline:none;transition:border .15s;text-align:right;width:110px}
.inum:focus{border-color:var(--bl)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-p{background:var(--gr);color:#fff}.btn-p:hover:not(:disabled){background:var(--grB)}
.btn-s{background:var(--surf3);color:var(--tx);border:1px solid var(--brd)}.btn-s:hover:not(:disabled){border-color:var(--tx3)}
.btn-d{background:var(--rdBg);color:var(--rd);border:1px solid rgba(248,81,73,.3)}
.btn-g{background:transparent;color:var(--tx2);border:none;padding:6px 10px}.btn-g:hover:not(:disabled){background:var(--surf3);color:var(--tx)}
.btn-sm{padding:5px 12px;font-size:13px}

/* Cards & layout */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:500}
.bg{background:var(--grBg);color:var(--grB)}.br{background:var(--rdBg);color:var(--rd)}
.ba{background:var(--amBg);color:var(--am)}.bb{background:var(--blBg);color:var(--bl)}
.sep{height:1px;background:var(--brd2);margin:8px 0}
.pill{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:background .15s}
.pill:hover{background:var(--surf3)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}

/* Tab button */
.tabbtn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:all .15s}
.tabbtn-a{background:var(--blBg);color:var(--bl);border:1px solid rgba(88,166,255,.3)}
.tabbtn-i{background:var(--surf);color:var(--tx2);border:1px solid var(--brd)}
</style>

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
const eur  = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const eurD = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);
const pN   = s => parseFloat(String(s).replace(',','.'))||0;
const MO = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const mFull  = ym => { const[y,m]=ym.split('-'); return MO[+m-1]+' '+y; };
const mShort = ym => { const[y,m]=ym.split('-'); return MS[+m-1]+' '+y; };
const curYM  = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const toYM   = d  => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
const mLeft  = fin => { const f=new Date(fin+'T00:00:00'),n=new Date(); return Math.max(0,(f.getFullYear()-n.getFullYear())*12+f.getMonth()-n.getMonth()); };
const pctOf  = (init,rem) => init>0?Math.round(((init-rem)/init)*100):0;

/* ═══════════════════════════════════════
   CALCULATION ENGINE
═══════════════════════════════════════ */
const calcPeri = (p,r) => {
  if(!p||!r) return 0;
  return Math.round(((p.matin||0)*r.matin+(p.midi||0)*r.midi+(p.soir||0)*r.soir+(p.journee||0)*r.journee)*100)/100;
};

const calcMonth = (m,s) => {
  const periTotal = calcPeri(m.peri, s.peri_rates);
  const maisonTotal = Math.round(m.maison.items.reduce((sum,it)=>{
    if(it.calc) return sum+periTotal;
    return sum+(it.val||0)+(it.ass||0);
  },0));
  const half = Math.round(maisonTotal/2);
  const delta = s.deltaAuto&&m.ahmed.sal&&m.sophie.sal
    ? Math.round((m.ahmed.sal-m.sophie.sal)/2) : (s.delta||800);
  const aShare = half+delta;
  const sShare = half-delta;
  const aReste = (m.ahmed.sal||0)-aShare-(m.ahmed.courses||0)-(m.ahmed.savings||0);
  const sReste = (m.sophie.sal||0)-sShare-(m.sophie.courses||0)-(m.sophie.savings||0);
  return {maisonTotal,half,periTotal,delta,aShare,sShare,aReste,sReste,
    vAhmed:aShare+(m.ahmed.courses||0)+(m.ahmed.savings||0),
    vSophie:sShare+(m.sophie.courses||0)+(m.sophie.savings||0)};
};

const mkMonth = (ym,s) => ({
  id:ym, createdAt:new Date().toISOString(), versions:[],
  maison:{items:s.maison_items.map(it=>({...it,val:it.def}))},
  ahmed:{sal:0,loyer:null,loyerOk:false,courses:250,savings:0},
  sophie:{sal:0,courses:250,savings:0},
  peri:{matin:0,midi:0,soir:0,journee:0,status:'estimation',facture:null},
  track:{items:[]},
});

/* ═══════════════════════════════════════
   GOOGLE DRIVE SERVICE
═══════════════════════════════════════ */
let gClient=null, gToken=null, gFileId=null;

const initGIS = cb => {
  const t=setInterval(()=>{
    if(window.google?.accounts){
      clearInterval(t);
      gClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,scope:SCOPES,
        callback:r=>{if(r.access_token){gToken=r.access_token;cb(true);}else cb(false);}
      });
      cb(null);
    }
  },250);
};

const gReq=(url,opts={})=>fetch(url,{...opts,headers:{Authorization:'Bearer '+gToken,...(opts.headers||{})}});

const gLoad=async()=>{
  const r=await gReq(`https://www.googleapis.com/drive/v3/files?q=name%3D'${FILE_NAME}'%20and%20trashed%3Dfalse&fields=files(id)`);
  const d=await r.json();
  if(d.files?.length){gFileId=d.files[0].id;return(await gReq(`https://www.googleapis.com/drive/v3/files/${gFileId}?alt=media`)).json();}
  return null;
};

const gSave=async data=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME,mimeType:'application/json'})],{type:'application/json'}));
  form.append('file',blob);
  if(gFileId){
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gFileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+gToken},body:form});
  }else{
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+gToken},body:form});
    gFileId=(await r.json()).id;
  }
};

/* BUDGET MENSUEL MAIN */
const BudgetMensuel=({D:appData,setD:setAppData,settings,showToast})=>{
  const[ym,setYm]=useState(curYM());
  const[tab,setTab]=useState('maison');
  const[showVer,setShowVer]=useState(false);
  const[verLbl,setVerLbl]=useState('');
  const m=appData.months[ym];
  const calc=useMemo(()=>m?calcMonth(m,settings):null,[m,settings]);
  const createM=()=>setAppData(p=>({...p,months:{...p.months,[ym]:mkMonth(ym,settings)}}));
  const updM=fn=>setAppData(p=>{const nm=fn(p.months[ym]);return{...p,months:{...p.months,[ym]:nm}};});
  const saveVer=lbl=>{
    updM(mo=>({...mo,versions:[...mo.versions,{id:Date.now()+'',savedAt:new Date().toISOString(),label:lbl||('Sauvegarde '+new Date().toLocaleString('fr-FR'))}]}));
    setShowVer(false);setVerLbl('');showToast('Version sauvegardée ✓','success');
  };
  const TABS=[{id:'maison',l:'🏠 Maison'},{id:'ahmed',l:`👤 ${settings.identity.person1}`},{id:'sophie',l:`👤 ${settings.identity.person2}`},{id:'virements',l:'💸 Virements'},{id:'peri',l:'🎒 Périscolaire'}];

  if(!m) return(
    <div style={{padding:'16px 16px 24px'}}>
      <MNav ym={ym} setYm={setYm}/>
      <div style={{textAlign:'center',padding:'60px 20px'}}>
        <div style={{fontSize:56,marginBottom:16}}>📅</div>
        <h3 style={{fontSize:18,fontWeight:600,marginBottom:8}}>{mFull(ym)}</h3>
        <p style={{color:'var(--tx2)',marginBottom:24}}>Aucun budget pour ce mois</p>
        <button className="btn btn-p" onClick={createM}><Ico d={IC.plus} s={15}/> Créer le budget</button>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:24}}>
      <div style={{padding:'16px 16px 0'}}>
        <MNav ym={ym} setYm={setYm}/>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:12}}>
          <span className="badge bb">{m.versions.length} version{m.versions.length>1?'s':''}</span>
          <button className="btn btn-s btn-sm" onClick={()=>saveVer('')}><Ico d={IC.save} s={13}/> Sauvegarder</button>
          <button className="btn btn-g btn-sm" onClick={()=>setShowVer(true)}><Ico d={IC.eye} s={13}/> Historique</button>
        </div>
      </div>
      <SummaryBar calc={calc} s={settings}/>
      <div style={{overflowX:'auto',padding:'12px 16px 0',display:'flex',gap:6}}>
        {TABS.map(t=><button key={t.id} className={`tabbtn ${tab===t.id?'tabbtn-a':'tabbtn-i'}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
      </div>
      <div style={{padding:'12px 16px 0'}}>
        {tab==='maison'&&<TabMaison m={m} calc={calc} updM={updM} s={settings}/>}
        {tab==='ahmed'&&<TabPersonne who="ahmed" m={m} calc={calc} updM={updM} s={settings}/>}
        {tab==='sophie'&&<TabPersonne who="sophie" m={m} calc={calc} updM={updM} s={settings}/>}

/* ═══════════════════════════════════════
   SUIVI DU MOIS
═══════════════════════════════════════ */
const SuiviMois=({D:appData,setD:setAppData,settings,showToast})=>{
  const ym=curYM(), m=appData.months[ym];
  if(!m) return(
    <div style={{textAlign:'center',padding:'60px 24px'}}>
      <div style={{fontSize:48,marginBottom:12}}>📊</div>
      <p style={{color:'var(--tx2)'}}>Créez d'abord le budget du mois</p>
    </div>
  );
  const calc=calcMonth(m,settings);
  const allItems=[
    ...m.maison.items.filter(it=>!it.calc).map(it=>({id:it.id,l:it.label,planned:(it.val||0)+(it.ass||0),cat:'maison'})),
    {id:'courses_a',l:`Courses ${settings.identity.person1}`,planned:m.ahmed.courses,cat:'perso'},
    {id:'courses_s',l:`Courses ${settings.identity.person2}`,planned:m.sophie.courses,cat:'perso'},
    {id:'savings_a',l:`Épargne ${settings.identity.person1}`,planned:m.ahmed.savings,cat:'épargne'},
    {id:'savings_s',l:`Épargne ${settings.identity.person2}`,planned:m.sophie.savings,cat:'épargne'},
    {id:'peri_item',l:'Périscolaire',planned:calc.periTotal,cat:'enfant'},
  ].filter(x=>x.planned>0);

  const tracks=m.track?.items||[];
  const getT=id=>tracks.find(t=>t.id===id)||{id,status:'pending',actual:null};
  const updT=(id,upd)=>setAppData(p=>{
    const mo=p.months[ym];
    const items=(mo.track?.items||[]).filter(t=>t.id!==id);
    return{...p,months:{...p.months,[ym]:{...mo,track:{...mo.track,items:[...items,{...getT(id),...upd}]}}}};
  });

  const done=allItems.filter(x=>getT(x.id).status==='done');
  const totPlanned=allItems.reduce((a,x)=>a+x.planned,0);
  const totDone=done.reduce((a,x)=>{const t=getT(x.id);return a+(t.actual??x.planned);},0);
  const pct=totPlanned>0?Math.round((totDone/totPlanned)*100):0;

  return(
    <div style={{padding:'16px 16px 24px'}}>
      <div className="card" style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div>
            <p style={{fontSize:11,color:'var(--tx3)',fontWeight:500,textTransform:'uppercase',marginBottom:3}}>Pointage {mShort(ym)}</p>
            <p style={{fontSize:24,fontWeight:700}}>{pct}%</p>
          </div>
          <span className="badge bb">{done.length}/{allItems.length} pointés</span>
        </div>
        <div style={{height:6,background:'var(--surf3)',borderRadius:3,overflow:'hidden',marginBottom:8}}>
          <div style={{height:'100%',width:`${pct}%`,background:'var(--gr)',borderRadius:3,transition:'width .3s'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'var(--tx3)'}}>Prélevé : <span className="mono" style={{color:'var(--tx)'}}>{eur(totDone)}</span></span>
          <span style={{fontSize:12,color:'var(--tx3)'}}>Total : <span className="mono" style={{color:'var(--tx)'}}>{eur(totPlanned)}</span></span>
        </div>
      </div>
      {allItems.map(item=>{
        const t=getT(item.id);
        const isDone=t.status==='done';
        return(
          <div key={item.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--surf)',border:`1px solid ${isDone?'rgba(46,160,67,.3)':'var(--brd)'}`,borderRadius:10,marginBottom:8,transition:'all .15s'}}>
            <button onClick={()=>updT(item.id,{status:isDone?'pending':'done'})} style={{width:24,height:24,borderRadius:6,border:`2px solid ${isDone?'var(--gr)':'var(--brd)'}`,background:isDone?'var(--gr)':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>
              {isDone&&<Ico d={IC.chk} s={12} c="#fff"/>}
            </button>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:14,fontWeight:500,color:isDone?'var(--tx3)':'var(--tx)',textDecoration:isDone?'line-through':'none',marginBottom:1}}>{item.l}</p>
              <p style={{fontSize:11,color:'var(--tx3)'}}>{item.cat}</p>
            </div>
            <div style={{textAlign:'right'}}>
              <p className="mono" style={{fontSize:14,fontWeight:600,marginBottom:1}}>{eur(item.planned)}</p>
              {isDone&&t.actual!=null&&t.actual!==item.planned&&(
                <p className="mono" style={{fontSize:11,color:t.actual>item.planned?'var(--rd)':'var(--grB)'}}>réel: {eur(t.actual)}</p>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
};

/* ═══════════════════════════════════════
   ÉPARGNE
═══════════════════════════════════════ */
const Epargne=({D:appData,setD:setAppData,settings,showToast})=>{
  const[modal,setModal]=useState(null);
  const[txAmt,setTxAmt]=useState(0);
  const[txLbl,setTxLbl]=useState('');
  const bal=appData.balances||{};
  const accounts=settings.savings.map(a=>({...a,cur:bal[a.id]??a.bal}));
  const total=accounts.reduce((a,x)=>a+x.cur,0);
  const getTxs=id=>(appData.txs||[]).filter(t=>t.accId===id).slice(-5).reverse();

  const doTx=()=>{
    if(!txAmt||!modal)return;
    const amt=modal.type==='debit'?-txAmt:txAmt;
    const newBal=((bal[modal.id]??accounts.find(a=>a.id===modal.id)?.cur)||0)+amt;
    setAppData(p=>({...p,
      balances:{...p.balances,[modal.id]:newBal},
      txs:[...(p.txs||[]),{id:Date.now()+'',accId:modal.id,amt,label:txLbl||(modal.type==='debit'?'Dépense':'Versement'),date:new Date().toISOString()}]
    }));
    setModal(null);setTxAmt(0);setTxLbl('');
    showToast((modal.type==='debit'?'Débit':'Crédit')+' enregistré ✓','success');
  };

  return(
    <div style={{padding:'16px 16px 24px'}}>
      <div className="card" style={{marginBottom:16,background:'linear-gradient(135deg,var(--surf),rgba(46,160,67,.07))'}}>
        <p style={{fontSize:12,color:'var(--tx3)',marginBottom:4}}>Épargne totale</p>
        <p className="mono" style={{fontSize:32,fontWeight:700,color:'var(--grB)',marginBottom:2}}>{eurD(total)}</p>
        <p style={{fontSize:13,color:'var(--tx3)'}}>{accounts.length} comptes</p>
      </div>
      {accounts.map(a=>{
        const txs=getTxs(a.id);
        return(
          <div key={a.id} className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:12,height:12,borderRadius:'50%',background:a.color}}/>
                <span style={{fontSize:15,fontWeight:600}}>{a.name}</span>
              </div>
              <span className="mono" style={{fontSize:18,fontWeight:700,color:'var(--grB)'}}>{eurD(a.cur)}</span>
            </div>
            {a.monthly>0&&<p style={{fontSize:12,color:'var(--tx3)',marginBottom:10}}>+{eur(a.monthly)}/mois prévu</p>}
            <div style={{display:'flex',gap:8,marginBottom:txs.length?12:0}}>
              <button className="btn btn-s btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>setModal({id:a.id,type:'credit'})}><Ico d={IC.up} s={13}/> Versement</button>
              <button className="btn btn-d btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>setModal({id:a.id,type:'debit'})}><Ico d={IC.dn} s={13}/> Dépense</button>
            </div>
            {txs.length>0&&(
              <>
                <div className="sep"/>
                {txs.map(t=>(
                  <div key={t.id} style={{display:'flex',justifyContent:'space-between',padding:'4px 0'}}>
                    <span style={{fontSize:12,color:'var(--tx2)'}}>{t.label}</span>
                    <span className="mono" style={{fontSize:12,fontWeight:500,color:t.amt>0?'var(--grB)':'var(--rd)'}}>{t.amt>0?'+':''}{eurD(t.amt)}</span>
                  </div>
                ))}
              </>
            )}
          </div>
        );
      })}
      <Modal open={!!modal} close={()=>setModal(null)} title={modal?.type==='debit'?'Enregistrer une dépense':'Enregistrer un versement'}>
        {modal&&(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <p style={{fontSize:14,color:'var(--tx2)'}}>Compte : <strong style={{color:'var(--tx)'}}>{accounts.find(a=>a.id===modal.id)?.name}</strong></p>
            <div><label style={{fontSize:13,color:'var(--tx2)',display:'block',marginBottom:6}}>Montant</label><NI val={txAmt} onChange={setTxAmt} step="0.01"/></div>
            <div><label style={{fontSize:13,color:'var(--tx2)',display:'block',marginBottom:6}}>Description</label><input className="ifield" placeholder="Ex: Vacances mai 2026" value={txLbl} onChange={e=>setTxLbl(e.target.value)}/></div>
            <button className="btn btn-p" style={{justifyContent:'center'}} onClick={doTx}>Confirmer</button>
          </div>
        )}
      </Modal>
    </div>
  );
};

              <div><p style={{fontSize:11,color:'var(--tx3)',marginBottom:2}}>Mensualité</p><p className="mono" style={{fontSize:13,fontWeight:600}}>{eurD(c.mens)}</p></div>

            </div>
            <p style={{fontSize:11,color:'var(--tx3)',marginTop:8}}>Fin : {new Date(c.fin+'T00:00:00').toLocaleDateString('fr-FR')} · {p}% remboursé</p>

              </div>

                <div key={c.id} style={{padding:'12px',background:'var(--surf2)',borderRadius:10,marginBottom:8}}>
                  <div style={{display:'flex',gap:8,marginBottom:8}}>
                    <input className="ifield" value={c.name} placeholder="Nom" onChange={e=>updS(st=>({...st,credits:st.credits.map(x=>x.id===c.id?{...x,name:e.target.value}:x)}))}/>
                    <button className="btn btn-g" style={{padding:'4px 6px',color:'var(--rd)',flexShrink:0}} onClick={()=>updS(st=>({...st,credits:st.credits.filter(x=>x.id!==c.id)}))}>
                      <Ico d={IC.trash} s={14}/>
                    </button>
                  </div>
                  <input className="ifield" value={c.org} placeholder="Organisme" style={{marginBottom:8}} onChange={e=>updS(st=>({...st,credits:st.credits.map(x=>x.id===c.id?{...x,org:e.target.value}:x)}))}/>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {[{k:'mens',l:'Mensualité'},{k:'ass',l:'Assurance'},{k:'cap',l:'Capital restant'}].map(f=>(
                      <div key={f.k}>
                        <label style={{fontSize:11,color:'var(--tx3)',display:'block',marginBottom:3}}>{f.l}</label>
                        <NI val={c[f.k]} step="0.01" onChange={v=>updS(st=>({...st,credits:st.credits.map(x=>x.id===c.id?{...x,[f.k]:v}:x)}))} w="100px"/>
                      </div>
                    ))}
                    <div>
                      <label style={{fontSize:11,color:'var(--tx3)',display:'block',marginBottom:3}}>Date de fin</label>
                      <input type="date" className="ifield" style={{width:'auto'}} value={c.fin} onChange={e=>updS(st=>({...st,credits:st.credits.map(x=>x.id===c.id?{...x,fin:e.target.value}:x)}))}/>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
const NAV_MAIN=[{id:'dashboard',l:'Accueil',i:'🏠'},{id:'budget',l:'Budget',i:'📅'},{id:'suivi',l:'Suivi',i:'📊'},{id:'epargne',l:'Épargne',i:'🏦'},{id:'credits',l:'Crédits',i:'💳'}];
const NAV_MORE=[{id:'periscolaire',l:'Périscolaire',i:'🎒'},{id:'vacances',l:'Vacances',i:'🌴'},{id:'salaires',l:'Salaires',i:'📈'},{id:'parametrage',l:'Paramétrage',i:'⚙️'},{id:'aide',l:'Aide',i:'❓'}];
const ALL_NAV=[...NAV_MAIN,...NAV_MORE];

  const[mod,setMod]=useState('dashboard');
  const[toast,setToast]=useState(null);
  const[sideOpen,setSideOpen]=useState(false);
  const s=appData.settings;
  const showToast=(msg,type='success')=>setToast({msg,type});
  const isDesk=window.innerWidth>=1024;
  const cur=ALL_NAV.find(x=>x.id===mod)||NAV_MAIN[0];
  const props={D:appData,setD:setAppData,settings:s,showToast};

  const renderMod=()=>{
    switch(mod){
      case 'dashboard': return <Dashboard D={appData} onNav={setMod}/>;
      case 'budget':    return <BudgetMensuel {...props}/>;
      case 'suivi':     return <SuiviMois {...props}/>;
      case 'epargne':   return <Epargne {...props}/>;
      case 'credits':   return <Credits settings={s}/>;
      case 'parametrage': return <Parametrage {...props}/>;
      case 'aide':      return <Aide/>;
      default: return <ComingSoon icon={cur.i} label={cur.l}/>;

    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar desktop */}
      {isDesk&&(
        <div style={{width:220,background:'var(--surf)',borderRight:'1px solid var(--brd)',display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{padding:'20px 16px 16px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:26}}>💰</span>
            <div><p style={{fontSize:14,fontWeight:700,letterSpacing:'-0.01em'}}>Le Compte</p><p style={{fontSize:11,color:'var(--tx3)'}}>Est Bon</p></div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'0 8px'}}>
            {ALL_NAV.map(x=>(
              <div key={x.id} className="pill" style={{background:mod===x.id?'var(--blBg)':'transparent',color:mod===x.id?'var(--bl)':'var(--tx2)',marginBottom:2}} onClick={()=>setMod(x.id)}>
                <span style={{fontSize:16}}>{x.i}</span>
                <span style={{fontSize:14,fontWeight:mod===x.id?500:400}}>{x.l}</span>
              </div>
            ))}
          </div>
          <div style={{padding:'12px 8px',borderTop:'1px solid var(--brd2)'}}>
            <button className="btn btn-g" style={{width:'100%',justifyContent:'flex-start',gap:8}} onClick={onSync} disabled={syncing}>
              {syncing?<Spin s={14}/>:<Ico d={IC.ref} s={14}/>}
              <span style={{fontSize:13}}>{syncing?'Synchro...':'Synchroniser Drive'}</span>
            </button>
          </div>
        </div>
      )}

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Top bar */}
        <div style={{background:'var(--surf)',borderBottom:'1px solid var(--brd)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,paddingTop:'max(12px,env(safe-area-inset-top))'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {!isDesk&&<span style={{fontSize:20}}>{cur.i}</span>}
            <h1 style={{fontSize:17,fontWeight:700}}>{isDesk?'':cur.l}</h1>

          <div style={{display:'flex',alignItems:'center',gap:4}}>
            {!isDesk&&NAV_MORE.some(x=>x.id===mod)&&(
              <span style={{fontSize:12,color:'var(--tx3)',marginRight:4}}>{cur.l}</span>

              {syncing?<Spin s={14}/>:<Ico d={IC.ref} s={14}/>}

        </div>

        {/* Bottom nav mobile */}

          <div style={{background:'var(--surf)',borderTop:'1px solid var(--brd)',display:'flex',justifyContent:'space-around',alignItems:'center',padding:'6px 0',paddingBottom:'max(6px,env(safe-area-inset-bottom))',flexShrink:0}}>

              <button key={x.id} onClick={()=>setMod(x.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:mod===x.id?'var(--bl)':'var(--tx3)',fontFamily:'DM Sans,sans-serif',minWidth:52,transition:'color .15s'}}>

            <button onClick={()=>setMod(NAV_MORE.some(x=>x.id===mod)?mod:'parametrage')} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:NAV_MORE.some(x=>x.id===mod)?'var(--bl)':'var(--tx3)',fontFamily:'DM Sans,sans-serif',minWidth:52}}>
              <span style={{fontSize:20}}>⋯</span>
              <span style={{fontSize:10}}>Plus</span>
            </button>
          </div>
        )}

        {/* More menu overlay (mobile) */}
        {!isDesk&&NAV_MORE.some(x=>x.id===mod)&&(
          <div style={{position:'fixed',bottom:70,left:0,right:0,background:'var(--surf)',borderTop:'1px solid var(--brd)',padding:'8px',zIndex:50,display:'flex',flexWrap:'wrap',gap:4}}>
            {NAV_MORE.map(x=>(

                <span>{x.i}</span><span>{x.l}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {toast&&<Toast msg={toast.msg} type={toast.type} close={()=>setToast(null)}/>}
    </div>
  );
};

/* ═══════════════════════════════════════
   ROOT APP
═══════════════════════════════════════ */
const App=()=>{
  const[auth,setAuth]=useState('loading'); // loading|ready|authed
  const[appData,setAppDataRaw]=useState(DEF_DATA);
  const[syncing,setSyncing]=useState(false);
  const saveTimer=useRef(null);

  const setAppData=useCallback(fn=>{
    setAppDataRaw(prev=>{
      const next=typeof fn==='function'?fn(prev):fn;
      if(gToken){
        if(saveTimer.current)clearTimeout(saveTimer.current);
        saveTimer.current=setTimeout(()=>gSave(next).catch(console.error),2000);
      }
      return next;
    });
  },[]);

  const loadData=async()=>{
    setSyncing(true);
    try{
      const data=await gLoad();
      if(data){
        setAppDataRaw(prev=>({
          ...DEF_DATA,...data,
          settings:{...DEF_SETTINGS,...data.settings,
            maison_items:data.settings?.maison_items||DEF_SETTINGS.maison_items,
            savings:data.settings?.savings||DEF_SETTINGS.savings,
            credits:data.settings?.credits||DEF_SETTINGS.credits,
          },
          balances:{...prev.balances,...(data.balances||{})},
          txs:data.txs||[],
        }));
      }else{await gSave(DEF_DATA);}
      setAuth('authed');
    }catch(e){console.error(e);setAuth('authed');}
    finally{setSyncing(false);}
  };

  useEffect(()=>{
    initGIS(ready=>{
      if(ready===null)setAuth('ready');
      else if(ready===true)loadData();
    });
  },[]);

  const handleAuth=()=>{
    if(!gClient)return;
    gClient.callback=async r=>{if(r.access_token){gToken=r.access_token;await loadData();}};
    gClient.requestAccessToken();
    setSyncing(true);
  };

  const handleSync=async()=>{
    if(!gToken)return;
    setSyncing(true);
    try{await gSave(appData);}catch(e){console.error(e);}
    finally{setSyncing(false);}
  };

  if(auth==='loading') return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12,color:'var(--tx3)'}}>
      <Spin s={24}/> Initialisation...
    </div>
  );
  if(auth==='ready') return <LoginScreen onAuth={handleAuth} loading={syncing}/>;
  return <AppShell appData={appData} setAppData={setAppData} onSync={handleSync} syncing={syncing}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
