/* ═══════════════════════════════════════════════════════
   EXPORT EXCEL V5 — multi-onglets avec SheetJS
═══════════════════════════════════════════════════════ */
const ExportModule=({D:appData,setD:setAppData,settings,showToast})=>{
  const[exporting,setExporting]=useState(false);
  const[expYm,setExpYm]=useState(curYM());

  const exportExcel=()=>{
    const m=appData.months[expYm];
    if(!m){showToast('Aucun budget pour ce mois','warn');return;}
    setExporting(true);
    try{
      const effS=m.settingsSnapshot?{...settings,...m.settingsSnapshot}:settings;
      const calc=calcMonth(m,effS);
      const p1=effS.identity.person1, p2=effS.identity.person2, ch=effS.identity.child;
      const bals=appData.balances||{};
      const accs=effS.savings||[];
      const credits=effS.credits||[];
      const tgt=effS.targetReste||550;
      const periTotal=calc.periTotal;

      const H=(v,bold=false)=>({v,t:'s',s:{font:{bold},fill:{fgColor:{rgb:'1E2D45'}}}});
      const nb=v=>({v:v||0,t:'n',z:'#,##0.00 "€"'});
      const pct=v=>({v:(v||0)/100,t:'n',z:'0%'});
      const str=v=>({v:v||'',t:'s'});
      const hdr=(txt)=>({v:txt,t:'s',s:{font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'0D1F3C'}}}});

      const wb=XLSX.utils.book_new();

      /* ── Sheet 1: Résumé ── */
      const ws1_data=[
        ['LE COMPTE EST BON','','Rapport mensuel',mFull(expYm)],
        ['','','Statut',m.statut==='cloture'?'Clôturé':'En cours'],
        [],
        ['RÉSUMÉ DU MOIS','','',''],
        ['Indicateur','Montant','',''],
        ['Charges maison totales',calc.maisonTotal,'',''],
        ['Delta rééquilibrage',calc.delta,'',''],
        [`Part charges ${p1}`,calc.aShare,'',''],
        [`Part charges ${p2}`,calc.sShare,'',''],
        [],
        ['VIREMENTS À EFFECTUER','','',''],
        [`${p1} → Compte commun`,calc.vAhmed,'',''],
        [`${p2} → Compte commun`,calc.vSophieCommun,'',''],
        ...(calc.vSophiePeri>0?[[`${p2} → Périscolaire`,calc.vSophiePeri,'','']]:[] ),
        ...(calc.vSophieCam>0?[[`${p2} → Livret A ${ch}`,calc.vSophieCam,'','']]:[] ),
        [],
        ['ARGENT DE POCHE','','',''],
        [`Reste ${p1}`,calc.aReste,calc.aReste>=tgt?'✓ Objectif atteint':'⚠ Sous objectif',''],
        [`Reste ${p2}`,calc.sReste,calc.sReste>=tgt?'✓ Objectif atteint':'⚠ Sous objectif',''],
        ['Objectif',tgt,'',''],
        [],
        ...(m.peri&&periTotal>0?[
          ['PÉRISCOLAIRE','','',''],
          ['Total estimé',periTotal,'',''],
          ...(m.peri.facture?[['Montant facturé',m.peri.facture,'','']]:[] ),
          ['Statut',m.peri.status||'estimation','',''],
        ]:[]),
      ];
      const ws1=XLSX.utils.aoa_to_sheet(ws1_data);
      ws1['!cols']=[{wch:35},{wch:16},{wch:24},{wch:16}];
      XLSX.utils.book_append_sheet(wb,ws1,'Résumé');

      /* ── Sheet 2: Charges Maison ── */
      const ws2_data=[
        [`CHARGES MAISON — ${mFull(expYm)}`,'','',''],
        [],
        ['Poste','Nature','Montant','Assurance'],
        ...(m.maison?.items||[]).filter(it=>!it.calc).map(it=>[
          it.label, it.nature||'—', (it.val||0)+(it.ass||0), it.ass||0
        ]),
        ...(periTotal>0?[['Périscolaire (auto)','entretien',periTotal,0]]:[] ),
        ...(m.maison?.extra||[]).map(e=>[e.label+' (ponct.)',e.nature||'—',e.amount||0,0]),
        [],
        ['TOTAL','',(calc.maisonTotal||0),''],
      ];
      const ws2=XLSX.utils.aoa_to_sheet(ws2_data);
      ws2['!cols']=[{wch:32},{wch:14},{wch:16},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws2,'Charges Maison');

      /* ── Sheet 3: Personnes ── */
      const ws3_data=[
        [`BUDGET PERSONNEL — ${mFull(expYm)}`,'',''],
        [],
        ['',p1,p2],
        ['Salaire net',m.ahmed?.sal||0,m.sophie?.sal||0],
        ['Part charges',calc.aShare,calc.sShare],
        ['Courses alimentaires',m.ahmed?.courses||0,m.sophie?.courses||0],
        ['Épargne personnelle',m.ahmed?.savings||0,m.sophie?.savings||0],
        ['Argent de poche',calc.aReste,calc.sReste],
        ['Objectif poche',tgt,tgt],
        ['Objectif atteint?',calc.aReste>=tgt?'Oui':'Non',calc.sReste>=tgt?'Oui':'Non'],
        [],
        ['Virement total',calc.vAhmed,calc.vSophie],
      ];
      const ws3=XLSX.utils.aoa_to_sheet(ws3_data);
      ws3['!cols']=[{wch:28},{wch:16},{wch:16}];
      XLSX.utils.book_append_sheet(wb,ws3,'Personnes');

      /* ── Sheet 4: Épargne ── */
      const totEpargne=accs.reduce((a,acc)=>a+(bals[acc.id]!=null?bals[acc.id]:acc.bal),0);
      const ws4_data=[
        [`ÉTAT ÉPARGNE — ${mFull(expYm)}`,'',''],
        [],
        ['Compte','Solde actuel','% du total'],
        ...accs.map(acc=>{
          const bal=bals[acc.id]!=null?bals[acc.id]:acc.bal;
          return[acc.name,bal,totEpargne>0?Math.round(bal/totEpargne*100)/100:0];
        }),
        [],
        ['TOTAL ÉPARGNE',totEpargne,''],
      ];
      const ws4=XLSX.utils.aoa_to_sheet(ws4_data);
      ws4['!cols']=[{wch:28},{wch:16},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws4,'Épargne');

      /* ── Sheet 5: Crédits ── */
      const totCap=credits.reduce((a,c)=>a+(c.cap||0),0);
      const totMens=credits.reduce((a,c)=>a+(c.mens||0)+(c.ass||0),0);
      const ws5_data=[
        [`CRÉDITS ACTIFS — ${mFull(expYm)}`,'','','',''],
        [],
        ['Crédit','Organisme','Mensualité+Ass.','Capital restant','Fin'],
        ...credits.map(c=>[c.name,c.org||'',c.mens+(c.ass||0),c.cap||0,c.fin||'']),
        [],
        ['TOTAUX','',totMens,totCap,''],
      ];
      const ws5=XLSX.utils.aoa_to_sheet(ws5_data);
      ws5['!cols']=[{wch:26},{wch:18},{wch:18},{wch:16},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws5,'Crédits');

      /* ── Sheet 6: Vacances actives ── */
      const potsActifs=(settings.vacances||[]).filter(v=>v.statut!=='cloture');
      if(potsActifs.length>0){
        const ws6_data=[
          [`VACANCES — ${mFull(expYm)}`,'',''],
          [],
          ['Projet','Budget estimé','Solde compte lié','% atteint'],
          ...potsActifs.map(pot=>{

/* ═══════════════════════════════════════════════════════
   AREA CHART SVG — style trading (remplace LineChartSVG)
═══════════════════════════════════════════════════════ */
const AreaChartSVG=({series,labels,height=150,colors,showFill=true})=>{
  if(!labels||!labels.length)return null;
  const W=360,H=height,pad={t:20,r:12,b:26,l:46};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const allVals=series.flat().filter(v=>v!=null&&v>0);
  const maxV=allVals.length?Math.max(...allVals)*1.08:1;
  const xs=(i)=>pad.l+(i/(Math.max(labels.length-1,1)))*iW;
  const ys=(v)=>v==null?null:pad.t+(1-(v/maxV))*iH;
  const mkSmooth=pts=>{
    if(!pts.length)return '';
    const valid=pts.filter(p=>p[1]!=null);
    if(!valid.length)return '';
    let d='M'+valid[0][0]+','+valid[0][1];
    for(let i=1;i<valid.length;i++){
      const x0=valid[i-1][0],y0=valid[i-1][1];
      const x1=valid[i][0],y1=valid[i][1];
      const cx=(x0+x1)/2;
      d+=' C'+cx+','+y0+' '+cx+','+y1+' '+x1+','+y1;
    }
    return d;
  };
  const yTicks=[0,Math.round(maxV*0.33),Math.round(maxV*0.67),Math.round(maxV)];
  return(
    <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height,overflow:'visible'}}>
      <defs>
        {series.map((_,si)=>{
          const col=colors&&colors[si]?colors[si]:'var(--accent)';
          const rawCol=col.startsWith('var(')?'#4F8EF7':col;
          return(
            <linearGradient key={'g'+si} id={'area_grad_'+si} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={rawCol} stopOpacity="0.28"/>
              <stop offset="100%" stopColor={rawCol} stopOpacity="0.02"/>
            </linearGradient>
          );
        })}
      </defs>
      {/* Grid lines */}
      {yTicks.map((v,i)=>{
        const y=ys(v);
        if(y==null)return null;
        return(
          <g key={i}>
            <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="var(--brd2)" strokeWidth="1" strokeDasharray="3,4"/>
            <text x={pad.l-6} y={y+4} textAnchor="end" fontSize="9" fill="var(--tx3)" fontFamily="var(--mono)">{v>=1000?Math.round(v/1000)+'k':v}</text>
          </g>
        );
      })}
      {/* Bottom axis */}
      <line x1={pad.l} y1={H-pad.b} x2={W-pad.r} y2={H-pad.b} stroke="var(--brd)" strokeWidth="1"/>
      {/* Series */}
      {series.map((vals,si)=>{
        const col=(colors&&colors[si])||'var(--accent)';
        const pts=vals.map((v,i)=>[xs(i),ys(v)]);
        const linePath=mkSmooth(pts);
        const bottomY=H-pad.b;
        const validPts=pts.filter(p=>p[1]!=null);
        const areaPath=linePath+(validPts.length?(' L'+validPts[validPts.length-1][0]+','+bottomY+' L'+validPts[0][0]+','+bottomY+' Z'):'');
        return(
          <g key={si}>
            {showFill&&<path d={areaPath} fill={'url(#area_grad_'+si+')'}/>}
            <path d={linePath} fill="none" stroke={col} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            {pts.map(([x,y],i)=>y!=null&&vals[i]>0&&(
              <circle key={i} cx={x} cy={y} r="3" fill={col} stroke="var(--surf)" strokeWidth="1.5"/>
            ))}
          </g>
        );
      })}
      {/* X labels */}
      {labels.map((l,i)=>(
        <text key={i} x={xs(i)} y={H-6} textAnchor="middle" fontSize="8" fill="var(--tx3)" fontFamily="var(--mono)">{l}</text>
      ))}
    </svg>
  );
};

  const avgS=withS.length?Math.round(withS.reduce((s,x)=>s+x.s,0)/withS.length):0;
  const maxA=withA.length?Math.max(...withA.map(x=>x.a)):0;
  const minA=withA.length?Math.min(...withA.filter(x=>x.a>0).map(x=>x.a)):0;
  const maxS=withS.length?Math.max(...withS.map(x=>x.s)):0;
  const totalA=withA.reduce((s,x)=>s+x.a,0);
  const totalS=withS.reduce((s,x)=>s+x.s,0);
  const totalFoyer=totalA+totalS;

  // Delta mensuel
  const deltasA=monthsA.map((m,i)=>i===0?0:m.a-(monthsA[i-1].a||0));
  const deltasS=monthsA.map((m,i)=>i===0?0:m.s-(monthsA[i-1].s||0));

  // Cumul annuel par année
  const cumulsParAnnee=availYears.map(y=>{
    const data=allYearData[y]||[];
    return{
      y,
      totalA:data.reduce((s,m)=>s+m.a,0),
      totalS:data.reduce((s,m)=>s+m.s,0),
      mois:data.length,
    };
  });

  const chartLabels=monthsA.map(m=>mShort(m.ym));

  const seriesS=monthsA.map(m=>m.s||null);

  return(

  const[editPot,setEditPot]=useState(null);
  const[viewAnnee,setViewAnnee]=useState(new Date().getFullYear());
  const[pForm,setPForm]=useState({name:'',color:'#4F8EF7',emoji:'🌴',linkedSavingsId:'',dateVacances:'',objectif:0});
  const pots=settings.vacances||[];
  const txs=appData.vacancesTxs||[];
  const bals=appData.balances||{};
  const accs=settings.savings||[];
  const allTxs=appData.txs||[];

  // Même formule que le module Épargne : acc.bal + mouvements enregistrés dans txs
  // Garanti cohérent quelque soit l'état de appData.balances (qui peut avoir divergé suite à des bugs)
  const getDisplayBal=useCallback((accId)=>{
    const acc=accs.find(a=>a.id===accId);
    if(!acc)return 0;
    const mvt=allTxs.filter(t=>t.accId===accId).reduce((s,t)=>s+(t.montant||0),0);
    return Math.round((acc.bal+mvt)*100)/100;
  },[accs,allTxs]);

  const addPot=()=>{
    if(!pForm.name)return;
    const id='pot_'+Date.now();
    const pot={id,name:pForm.name,emoji:pForm.emoji||'🌴',color:pForm.color||'#4F8EF7',linkedSavingsId:pForm.linkedSavingsId||null,dateVacances:pForm.dateVacances||null,objectif:pForm.objectif||0,activities:[],depensesReelles:[],statut:'en_preparation',cloture:false,clotureYm:null,createdAt:new Date().toISOString()};
    setAppData(p=>({...p,settings:{...p.settings,vacances:[...(p.settings.vacances||[]),pot]}}));
    setNewPot(false);setPForm({name:'',color:'#4F8EF7',emoji:'🌴',linkedSavingsId:'',dateVacances:'',objectif:0});
    showToast('Pot créé ✓','success');
  };

  const delPot=id=>{
    setAppData(p=>{
      const pot=(p.settings.vacances||[]).find(x=>x.id===id);
      const potTxs=(p.vacancesTxs||[]).filter(t=>t.potId===id);
      // Revert all balance changes made by this pot's transactions
      const newBals={...p.balances};
      if(pot?.linkedSavingsId){
        const totalDebited=potTxs.reduce((s,t)=>s+(t.montant||0),0);
        newBals[pot.linkedSavingsId]=Math.round(((newBals[pot.linkedSavingsId]||0)+totalDebited)*100)/100;
      }
      return{
        ...p,
        settings:{...p.settings,vacances:(p.settings.vacances||[]).filter(x=>x.id!==id)},
        vacancesTxs:(p.vacancesTxs||[]).filter(t=>t.potId!==id),
        balances:newBals,
      };
    });
    showToast('Pot supprimé — épargne restaurée','info');
  };

  const changeStatut=(id,newStatut)=>{
    const today=new Date().toISOString().split('T')[0];
    const curYm=today.slice(0,7);
    setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(pot=>{
      if(pot.id!==id)return pot;
      return{...pot,statut:newStatut,cloture:newStatut==='cloture',clotureYm:newStatut==='cloture'?curYm:(pot.clotureYm||null)};
    })}}));
    const labels={en_preparation:'Repassé en préparation',en_cours:'Voyage démarré ✓',cloture:'Pot clôturé ✓'};
    showToast(labels[newStatut]||'Statut mis à jour','success');
  };

  // Validate an activity → generates savings movement
  const validateActivity=(potId,actId,montant)=>{
    setAppData(p=>{
      const today=new Date().toISOString().split('T')[0];
      const pot=(p.settings.vacances||[]).find(x=>x.id===potId);
      const linkedId=pot?.linkedSavingsId;
      const newPots=(p.settings.vacances||[]).map(pot=>{
        if(pot.id!==potId)return pot;
        return{...pot,activities:(pot.activities||[]).map(a=>a.id===actId?{...a,validated:true,validatedDate:today,validatedMontant:montant}:a)};
      });
      const newTxs=[...(p.vacancesTxs||[]),{id:'vtx_'+Date.now(),potId,actId,date:today,ym:today.slice(0,7),type:'validation',montant,label:(pot?.activities||[]).find(a=>a.id===actId)?.name||'Dépense vacances'}];
      const newBals={...p.balances};
      if(linkedId){newBals[linkedId]=((newBals[linkedId]!=null?newBals[linkedId]:0))- montant;}
      return{...p,settings:{...p.settings,vacances:newPots},vacancesTxs:newTxs,balances:newBals};
    });
    showToast('Dépense validée — compte épargne débité ✓','success');
  };

  // Add real expense (en cours mode)
  const addDepenseReelle=(potId,dep)=>{
    setAppData(p=>{
      const today=new Date().toISOString().split('T')[0];
      const pot=(p.settings.vacances||[]).find(x=>x.id===potId);
      const linkedId=pot?.linkedSavingsId;
      const newDep={id:'dr_'+Date.now(),...dep,date:dep.date||today,ym:(dep.date||today).slice(0,7)};
      const newPots=(p.settings.vacances||[]).map(x=>{
        if(x.id!==potId)return x;
        return{...x,depensesReelles:[...(x.depensesReelles||[]),newDep]};
      });
      const newTxs=[...(p.vacancesTxs||[]),{id:'vtx_r_'+Date.now(),potId,date:dep.date||today,ym:(dep.date||today).slice(0,7),type:'reel',montant:dep.montant,label:dep.label||'Dépense en cours'}];
      const newBals={...p.balances};
      if(linkedId){newBals[linkedId]=((newBals[linkedId]!=null?newBals[linkedId]:0))-dep.montant;}
      return{...p,settings:{...p.settings,vacances:newPots},vacancesTxs:newTxs,balances:newBals};
    });
    showToast('Dépense ajoutée ✓','success');
  };

  const delDepenseReelle=(potId,depId)=>{
    setAppData(p=>{
      const pot=(p.settings.vacances||[]).find(x=>x.id===potId);
      const dep=(pot?.depensesReelles||[]).find(d=>d.id===depId);
      const linkedId=pot?.linkedSavingsId;
      const newPots=(p.settings.vacances||[]).map(x=>{
        if(x.id!==potId)return x;
        return{...x,depensesReelles:(x.depensesReelles||[]).filter(d=>d.id!==depId)};
      });
      const newBals={...p.balances};
      if(linkedId&&dep){
        newBals[linkedId]=Math.round(((newBals[linkedId]!=null?newBals[linkedId]:0)+(dep.montant||0))*100)/100;
      }
      // Supprimer le tx correspondant (cherche par depId dans le label ou par correspondance exacte)
      const newTxs=(p.vacancesTxs||[]).filter(t=>!(t.potId===potId&&t.type==='reel'&&t.date===dep?.date&&Math.abs((t.montant||0)-(dep?.montant||0))<0.01));
      return{...p,settings:{...p.settings,vacances:newPots},vacancesTxs:newTxs,balances:newBals};
    });
    showToast('Dépense supprimée — épargne restaurée','info');
  };

  const activePots=pots.filter(p=>p.statut!=='cloture');
  const closedPots=pots.filter(p=>p.statut==='cloture');
  const availYears=[...new Set(closedPots.map(p=>p.clotureYm?p.clotureYm.split('-')[0]:null).filter(Boolean))].sort().reverse();

  const PotCard=({pot})=>{
    const[subTab,setSubTab]=useState('estimatif');
    const[depForm,setDepForm]=useState({label:'',montant:0,date:new Date().toISOString().split('T')[0]});
    const[editActId,setEditActId]=useState(null);
    const[editName,setEditName]=useState('');
    const[editAmt,setEditAmt]=useState(0);
    const isEditing=editPot===pot.id;
    const budgetPrevisionnel=pot.objectif||(pot.activities||[]).reduce((s,a)=>s+a.amount,0);
    const linkedAcc=accs.find(a=>a.id===pot.linkedSavingsId);
    const linkedBal=linkedAcc?getDisplayBal(linkedAcc.id):null;
    const pct=budgetPrevisionnel>0?Math.min(100,Math.round((linkedBal!=null?linkedBal:0)/budgetPrevisionnel*100)):0;
    const deficit=budgetPrevisionnel>0&&linkedBal!=null?linkedBal-budgetPrevisionnel:null;
    const moisRestants=pot.dateVacances?monthsUntil(pot.dateVacances):null;
    const manque=linkedBal!=null&&budgetPrevisionnel>0?Math.max(0,budgetPrevisionnel-linkedBal):null;
    const mensuelNecessaire=manque!=null&&moisRestants!=null&&moisRestants>0?Math.ceil(manque/moisRestants):null;
    const depensesReelles=pot.depensesReelles||[];
    const totalReel=depensesReelles.reduce((s,d)=>s+(d.montant||0),0);
    const totalValidated=(pot.activities||[]).filter(a=>a.validated).reduce((s,a)=>s+(a.validatedMontant||a.amount||0),0);
    const statutInfo=VAC_STATUT[pot.statut||'en_preparation'];

    const startEdit=act=>{setEditActId(act.id);setEditName(act.name);setEditAmt(act.amount);};
    const saveEdit=()=>{
      if(!editName||!editAmt)return;
      setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(x=>{
        if(x.id!==pot.id)return x;
        const acts=(x.activities||[]).map(a=>a.id===editActId?{...a,name:editName,amount:editAmt}:a);
        return{...x,activities:acts,objectif:acts.reduce((s,a)=>s+a.amount,0)};
      })}}));
      setEditActId(null);
      showToast('Modifié ✓','success');
    };
    const addActivity=(act)=>{
      setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(x=>{
        if(x.id!==pot.id)return x;
        const acts=[...(x.activities||[]),{id:'act_'+Date.now(),...act,validated:false,validatedDate:null,validatedMontant:null}];
        return{...x,activities:acts,objectif:acts.reduce((s,a)=>s+a.amount,0)};
      })}}));
      showToast('Activité ajoutée ✓','success');
    };
    const delActivity=(actId)=>{
      setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(x=>{
        if(x.id!==pot.id)return x;
        const acts=(x.activities||[]).filter(a=>a.id!==actId);
        return{...x,activities:acts,objectif:acts.reduce((s,a)=>s+a.amount,0)};
      })}}));
    };

    return(
      <div className="card" style={{marginBottom:16,borderLeft:'4px solid '+pot.color}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <span style={{fontSize:22}}>{pot.emoji}</span>
              <p style={{fontSize:17,fontWeight:800,letterSpacing:'-.02em'}}>{pot.name}</p>
              <span className={'badge '+statutInfo.cl}>{statutInfo.l}</span>
            </div>
            {pot.dateVacances&&(
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <Ico d={IC.flag} s={12} c="var(--tx3)"/>
                <span style={{fontSize:12,color:'var(--tx3)'}}>Départ : {mFull(pot.dateVacances)}</span>
                {moisRestants!=null&&moisRestants>0&&<span className="badge bb" style={{fontSize:10}}>{moisRestants} mois</span>}
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:4,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
            {pot.statut==='en_preparation'&&<button className="btn btn-s btn-xs" onClick={()=>changeStatut(pot.id,'en_cours')}><Ico d={IC.arrowR} s={11}/> Démarrer</button>}
            {pot.statut==='en_cours'&&<button className="btn btn-gr btn-xs" onClick={()=>changeStatut(pot.id,'cloture')}><Ico d={IC.chk} s={11}/> Clôturer</button>}
            {pot.statut==='cloture'&&<button className="btn btn-s btn-xs" onClick={()=>changeStatut(pot.id,'en_preparation')}><Ico d={IC.ref} s={11}/> Réouvrir</button>}
            {pot.statut!=='cloture'&&<button className="btn btn-d btn-icon" style={{padding:5}} onClick={()=>delPot(pot.id)}><Ico d={IC.trash} s={13}/></button>}
          </div>
        </div>

        {/* Compte lié */}
        {linkedAcc&&(
          <div style={{padding:'8px 12px',background:'var(--accentBg)',borderRadius:8,border:'1px solid var(--accentBrd)',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}><Ico d={IC.link} s={12} c="var(--accent)"/><span style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{linkedAcc.name}</span></div>
            <span className="mono" style={{fontWeight:700,fontSize:14,color:'var(--accent)'}}>{eur(linkedBal)}</span>
          </div>
        )}

        {/* Budget progression */}
        {budgetPrevisionnel>0&&(
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
              <span style={{fontSize:13,fontWeight:600,color:'var(--tx2)'}}>Budget estimé</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="mono" style={{fontSize:17,fontWeight:800,color:pot.color}}>{eur(budgetPrevisionnel)}</span>
                <span className={pct>=100?'badge bg':pct>=50?'badge ba':'badge br'}>{pct}%</span>
              </div>
            </div>
            <div className="pbar" style={{height:6}}><div className="pbar-fill" style={{width:pct+'%',background:pot.color}}/></div>
            {deficit!=null&&(
              <div style={{marginTop:6,padding:'6px 10px',borderRadius:7,background:deficit>=0?'var(--grBg)':'var(--rdBg)',border:'1px solid '+(deficit>=0?'var(--grBrd)':'var(--rdBrd)'),display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:600,color:deficit>=0?'var(--grB)':'var(--rd)'}}>{deficit>=0?'Budget couvert ✓':'Manque à couvrir'}</span>
                <span className="mono" style={{fontWeight:700,color:deficit>=0?'var(--grB)':'var(--rd)',fontSize:13}}>{deficit>=0?'+':''}{eur(deficit)}</span>
              </div>
            )}
          </div>
        )}

        {mensuelNecessaire!=null&&moisRestants>0&&pot.statut==='en_preparation'&&(
          <div style={{padding:'8px 12px',background:'var(--amBg)',borderRadius:8,border:'1px solid var(--amBrd)',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><p style={{fontSize:11,fontWeight:700,color:'var(--am)'}}>À épargner / mois</p><p style={{fontSize:10,color:'var(--tx3)'}}>pour atteindre l objectif en {moisRestants} mois</p></div>
            <span className="mono" style={{fontWeight:800,color:'var(--am)',fontSize:18}}>{eur(mensuelNecessaire)}/m</span>
          </div>
        )}

        {/* ── Statut EN PRÉPARATION : activités + validation ── */}
        {pot.statut==='en_preparation'&&(
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em'}}>Budget par activité</p>
              <button className="btn btn-g btn-icon" onClick={()=>setEditPot(isEditing?null:pot.id)}><Ico d={IC.activity} s={14} c={isEditing?'var(--accent)':'var(--tx3)'}/></button>
            </div>
            {(pot.activities||[]).length===0&&!isEditing&&<p style={{fontSize:12,color:'var(--tx3)',marginBottom:8}}>Aucune activité budgétisée.</p>}
            {(pot.activities||[]).map(act=>(
              <div key={act.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:act.validated?'var(--grBg)':'var(--surf2)',borderRadius:8,marginBottom:4,border:'1px solid '+(act.validated?'var(--grBrd)':'var(--brd)')}}>
                {act.validated&&<Ico d={IC.chk} s={13} c="var(--grB)"/>}
                {editActId===act.id&&isEditing?(
                  <div style={{display:'flex',gap:6,flex:1}}>
                    <input className="ifield" value={editName} onChange={e=>setEditName(e.target.value)} style={{flex:1,fontSize:12}} autoFocus/>
                    <NI val={editAmt} onChange={v=>setEditAmt(v)} w="72px"/>
                    <button className="btn btn-p btn-icon" style={{padding:5}} onClick={saveEdit}><Ico d={IC.chk} s={12}/></button>
                    <button className="btn btn-s btn-icon" style={{padding:5}} onClick={()=>setEditActId(null)}><Ico d={IC.x} s={12}/></button>
                  </div>
                ):(
                  <>
                    <span style={{flex:1,fontSize:13,fontWeight:500,textDecoration:act.validated?'line-through':'none',color:act.validated?'var(--tx3)':'var(--tx)'}}>{act.name}</span>
                    <span className="mono" style={{fontSize:12,fontWeight:700,color:act.validated?'var(--grB)':pot.color}}>{eur(act.validated?act.validatedMontant||act.amount:act.amount)}</span>
                    {!act.validated&&isEditing&&<button className="btn btn-g btn-icon" style={{padding:4}} onClick={()=>startEdit(act)}><Ico d={IC.pen} s={11}/></button>}
                    {!act.validated&&isEditing&&<button className="btn btn-d btn-icon" style={{padding:4}} onClick={()=>delActivity(act.id)}><Ico d={IC.x} s={11}/></button>}
                    {!act.validated&&!isEditing&&(
                      <button className="btn btn-gr btn-xs" onClick={()=>validateActivity(pot.id,act.id,act.amount)} style={{fontSize:10,padding:'3px 8px'}}>
                        Payer {eur(act.amount)}
                      </button>
                    )}
                  </>
                )}
              </div>
            ))}
            {isEditing&&<ActivityInputRow onAdd={addActivity}/>}
            {totalValidated>0&&(
              <div style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'var(--grBg)',borderRadius:8,marginTop:6}}>
                <span style={{fontSize:12,color:'var(--grB)',fontWeight:700}}>Déjà payé</span>
                <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--grB)'}}>{eur(totalValidated)}</span>
              </div>
            )}
          </div>
        )}

        {/* ── Statut EN COURS : estimatif + suivi réel ── */}
        {pot.statut==='en_cours'&&(
          <div>
            <div style={{overflowX:'auto',display:'flex',gap:6,marginBottom:12}}>
              {[{id:'estimatif',l:'Estimatif'},{id:'reel',l:'Suivi réel'}].map(t=>(
                <button key={t.id} className={'tabbtn '+(subTab===t.id?'tabbtn-a':'tabbtn-i')} style={{fontSize:12}} onClick={()=>setSubTab(t.id)}>{t.l}</button>
              ))}
            </div>

            {subTab==='estimatif'&&(
              <div>
                <p style={{fontSize:11,color:'var(--tx3)',marginBottom:8}}>Dépenses planifiées avant le départ</p>
                {(pot.activities||[]).map(act=>(
                  <div key={act.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:act.validated?'var(--grBg)':'var(--surf2)',borderRadius:8,marginBottom:4,border:'1px solid '+(act.validated?'var(--grBrd)':'var(--brd)')}}>
                    {act.validated?<Ico d={IC.chk} s={13} c="var(--grB)"/>:<div style={{width:13,height:13,borderRadius:4,border:'1.5px solid var(--brd)'}}/>}
                    <span style={{flex:1,fontSize:13,fontWeight:500,textDecoration:act.validated?'line-through':'none',color:act.validated?'var(--tx3)':'var(--tx)'}}>{act.name}</span>
                    <span className="mono" style={{fontSize:12,fontWeight:700,color:act.validated?'var(--grB)':pot.color}}>{eur(act.validated?act.validatedMontant||act.amount:act.amount)}</span>
                    {!act.validated&&<button className="btn btn-gr btn-xs" onClick={()=>validateActivity(pot.id,act.id,act.amount)} style={{fontSize:10,padding:'3px 8px'}}>Payer</button>}
                  </div>
                ))}
                {totalValidated>0&&(
                  <div style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'var(--grBg)',borderRadius:8,marginTop:6}}>
                    <span style={{fontSize:12,color:'var(--grB)',fontWeight:700}}>Total payé avant départ</span>
                    <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--grB)'}}>{eur(totalValidated)}</span>
                  </div>
                )}
              </div>
            )}

            {subTab==='reel'&&(
              <div>
                <p style={{fontSize:11,color:'var(--tx3)',marginBottom:10}}>Dépenses réelles pendant le voyage — chaque saisie débite le compte épargne lié</p>
                {/* Résumé */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
                  <div style={{background:'var(--surf2)',borderRadius:8,padding:'10px 12px'}}>
                    <p style={{fontSize:9,color:'var(--tx3)',fontWeight:700,marginBottom:4}}>Budget estimé</p>
                    <p className="mono" style={{fontSize:14,fontWeight:700,color:pot.color}}>{eur(budgetPrevisionnel)}</p>
                  </div>
                  <div style={{background:'var(--surf2)',borderRadius:8,padding:'10px 12px'}}>
                    <p style={{fontSize:9,color:'var(--tx3)',fontWeight:700,marginBottom:4}}>Dépensé</p>
                    <p className="mono" style={{fontSize:14,fontWeight:700,color:totalReel>budgetPrevisionnel?'var(--rd)':'var(--tx)'}}>{eur(totalReel+totalValidated)}</p>
                  </div>
                  <div style={{background:'var(--surf2)',borderRadius:8,padding:'10px 12px'}}>
                    <p style={{fontSize:9,color:'var(--tx3)',fontWeight:700,marginBottom:4}}>Solde épargne</p>
                    <p className="mono" style={{fontSize:14,fontWeight:700,color:linkedBal!=null&&linkedBal<0?'var(--rd)':'var(--grB)'}}>{eur(linkedBal)}</p>
                  </div>
                </div>
                {budgetPrevisionnel>0&&(
                  <div className="pbar" style={{height:5,marginBottom:12}}>
                    <div className="pbar-fill" style={{width:Math.min(100,(totalReel+totalValidated)/budgetPrevisionnel*100)+'%',background:totalReel+totalValidated>budgetPrevisionnel?'var(--rd)':pot.color}}/>
                  </div>
                )}
                {/* Formulaire ajout dépense réelle */}
                <div style={{padding:'10px 12px',background:'var(--surf2)',borderRadius:10,marginBottom:10,border:'1px solid var(--brd)'}}>
                  <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',marginBottom:8}}>Nouvelle dépense</p>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
                    <input className="ifield" value={depForm.label} onChange={e=>setDepForm(f=>({...f,label:e.target.value}))} placeholder="Courses, restaurant, activité..." style={{flex:1,minWidth:120}}/>
                    <NI val={depForm.montant} onChange={v=>setDepForm(f=>({...f,montant:v}))} w="90px"/>
                    <input type="date" className="ifield" value={depForm.date} onChange={e=>setDepForm(f=>({...f,date:e.target.value}))} style={{width:'auto'}}/>
                  </div>
                  <button className="btn btn-p btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>{if(!depForm.label||!depForm.montant)return;addDepenseReelle(pot.id,depForm);setDepForm({label:'',montant:0,date:new Date().toISOString().split('T')[0]});}} disabled={!depForm.label||!depForm.montant}>
                    <Ico d={IC.plus} s={13}/> Enregistrer
                  </button>
                </div>
                {/* Liste dépenses réelles */}
                {depensesReelles.length===0&&<p style={{fontSize:12,color:'var(--tx3)',textAlign:'center',padding:12}}>Aucune dépense enregistrée</p>}
                {[...depensesReelles].reverse().map(dep=>(
                  <div key={dep.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--surf)',borderRadius:8,marginBottom:4,border:'1px solid var(--brd)'}}>
                    <div style={{flex:1}}>
                      <p style={{fontSize:13,fontWeight:500}}>{dep.label}</p>
                      <p style={{fontSize:10,color:'var(--tx3)'}}>{dep.date}</p>
                    </div>
                    <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--rd)'}}>−{eur(dep.montant)}</span>
                    <button className="btn btn-d btn-icon" style={{padding:4}} onClick={()=>delDepenseReelle(pot.id,dep.id)}><Ico d={IC.trash} s={12}/></button>
                  </div>
                ))}
                {depensesReelles.length>0&&(
                  <div style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'var(--rdBg)',borderRadius:8,marginTop:6}}>
                    <span style={{fontSize:12,color:'var(--rd)',fontWeight:700}}>Total dépenses sur place</span>
                    <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--rd)'}}>{eur(totalReel)}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── Statut CLÔTURÉ : bilan readonly ── */}
        {pot.statut==='cloture'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div style={{background:'var(--surf2)',borderRadius:8,padding:'10px 12px'}}>
                <p style={{fontSize:10,color:'var(--tx3)',fontWeight:700,marginBottom:4}}>Budget estimé</p>
                <p className="mono" style={{fontSize:15,fontWeight:700,color:pot.color}}>{eur(budgetPrevisionnel)}</p>
              </div>
              <div style={{background:'var(--surf2)',borderRadius:8,padding:'10px 12px'}}>
                <p style={{fontSize:10,color:'var(--tx3)',fontWeight:700,marginBottom:4}}>Total dépensé</p>
                <p className="mono" style={{fontSize:15,fontWeight:700,color:totalReel+totalValidated>budgetPrevisionnel?'var(--rd)':'var(--grB)'}}>{eur(totalReel+totalValidated)}</p>
              </div>
            </div>
            {(pot.activities||[]).filter(a=>a.validated).length>0&&(
              <p style={{fontSize:11,color:'var(--tx3)',marginBottom:4}}>{(pot.activities||[]).filter(a=>a.validated).length} dépenses pré-voyage validées · {depensesReelles.length} dépenses sur place</p>
            )}
            {pot.clotureYm&&<p style={{fontSize:11,color:'var(--tx3)'}}>Clôturé en {mFull(pot.clotureYm)}</p>}
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.beach} title="Vacances"
        subtitle={activePots.length+' actif'+( activePots.length>1?'s':'')+' · '+closedPots.length+' clôturé'+(closedPots.length>1?'s':'')}
        action={<button className="btn btn-p btn-sm" onClick={()=>setNewPot(true)}><Ico d={IC.plus} s={13}/> Nouveau</button>}
      />
      <div style={{padding:'14px 16px 0'}}>
        {activePots.length===0&&closedPots.length===0&&(
          <div style={{textAlign:'center',padding:'48px 24px',background:'var(--surf)',border:'2px dashed var(--brd)',borderRadius:16}}>
            <div style={{width:72,height:72,borderRadius:20,background:'var(--orBg)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}><Ico d={IC.beach} s={32} c="var(--or)"/></div>
            <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun pot vacances</p>
            <p style={{fontSize:13,color:'var(--tx3)',marginBottom:20}}>Créez des pots par destination et liez-les à un compte épargne.</p>
            <button className="btn btn-p" onClick={()=>setNewPot(true)}><Ico d={IC.plus} s={14}/> Créer un pot</button>
          </div>
        )}

        {/* Pots actifs */}
        {activePots.map(pot=><PotCard key={pot.id} pot={pot}/>)}

        {/* Pots clôturés */}
        {closedPots.length>0&&(
          <div style={{marginTop:8}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.07em'}}>Clôturés</p>
              {availYears.length>1&&(
                <div style={{display:'flex',gap:4}}>
                  {availYears.map(y=><button key={y} onClick={()=>setViewAnnee(Number(y))} className={'tabbtn '+(Number(y)===viewAnnee?'tabbtn-a':'tabbtn-i')} style={{fontSize:11,padding:'3px 10px'}}>{y}</button>)}
                </div>
              )}
            </div>
            {closedPots.filter(p=>!availYears.length||!p.clotureYm||p.clotureYm.startsWith(String(viewAnnee))).map(pot=><PotCard key={pot.id} pot={pot}/>)}
          </div>
        )}
      </div>
      <Modal open={newPot} close={()=>setNewPot(false)} title="Nouveau pot vacances">
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Nom du projet</label>
            <input className="ifield" value={pForm.name} placeholder="Ex: Grèce Été 2026" onChange={e=>setPForm(p=>({...p,name:e.target.value}))}/></div>
          <div style={{display:'flex',gap:12}}>
            <div style={{flex:1}}><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Emoji</label>
              <input className="ifield" value={pForm.emoji} style={{width:70}} onChange={e=>setPForm(p=>({...p,emoji:e.target.value}))}/></div>
            <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Couleur</label>
              <input type="color" value={pForm.color} onChange={e=>setPForm(p=>({...p,color:e.target.value}))} style={{width:48,height:38,borderRadius:8,border:'none',cursor:'pointer',display:'block'}}/></div>
          </div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Compte épargne lié</label>
            <select className="ifield" value={pForm.linkedSavingsId} onChange={e=>setPForm(p=>({...p,linkedSavingsId:e.target.value}))} style={{fontFamily:'var(--font)'}}>
              <option value="">— Aucun —</option>
              {accs.map(a=><option key={a.id} value={a.id}>{a.name} ({eur(getDisplayBal(a.id))})</option>)}
            </select></div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Date des vacances (mois cible)</label>
            <input type="month" className="ifield" value={pForm.dateVacances||''} onChange={e=>setPForm(p=>({...p,dateVacances:e.target.value}))} style={{width:'auto'}}/></div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Objectif budgétaire (€) — optionnel</label>
            <NI val={pForm.objectif} onChange={v=>setPForm(p=>({...p,objectif:v}))}/></div>
          <button className="btn btn-p" style={{justifyContent:'center',marginTop:4}} onClick={addPot} disabled={!pForm.name}>
            <Ico d={IC.beach} s={14}/> Créer le pot
          </button>
        </div>
      </Modal>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   INDICATEURS V5 — Area charts + loyer annexe
═══════════════════════════════════════════════════════ */
const Indicateurs=({D:appData,settings})=>{
  const[tab,setTab]=useState('mensuel');
  const availYears=useMemo(()=>getAvailableYears(appData.months),[appData.months]);
  const[annee,setAnnee]=useState(()=>new Date().getFullYear());

  // Carte nature robuste : agrège TOUS les snapshots + settings courants
  // Clé = id OU label normalisé → nature. Résiste aux reconstructions d'items dans Paramétrage.
  const natureMap=useMemo(()=>{
    const map={byId:{},byLabel:{}};
    const register=(id,label,nature)=>{
      if(!nature||!NATURE_TAGS.includes(nature))return;
      if(id)map.byId[id]=nature;
      if(label){
        const k=label.trim().toLowerCase();
        if(!map.byLabel[k])map.byLabel[k]=nature; // premier trouvé gagne
      }
    };
    // 1. Settings courants (priorité max — ce que l'utilisateur a configuré)
    (settings.maison_items||[]).forEach(it=>register(it.id,it.label,it.nature));
    // 2. Snapshots de tous les mois (toutes années) — retrouve les anciens IDs
    Object.values(appData.months||{}).forEach(m=>{
      const snap=m.settingsSnapshot;
      if(!snap?.maison_items)return;
      snap.maison_items.forEach(it=>register(it.id,it.label,it.nature));
    });
    return map;
  },[settings.maison_items,appData.months]);

  const resolveNature=useCallback((it)=>{
    // 1. Nature directe sur l'item (mois créés après l'ajout du champ)
    if(it.nature&&NATURE_TAGS.includes(it.nature))return it.nature;
    // 2. Lookup par ID dans la carte agrégée
    if(it.id&&natureMap.byId[it.id])return natureMap.byId[it.id];
    // 3. Lookup par label normalisé (résiste aux IDs changés suite à suppression/recréation)
    if(it.label){
      const k=it.label.trim().toLowerCase();
      if(natureMap.byLabel[k])return natureMap.byLabel[k];
    }
    return 'entretien';
  },[natureMap]);

  const{byNature,totalCharges,monthlyData}=useMemo(()=>{
    const monthsAnnee=Object.entries(appData.months||{})
      .filter(([ym])=>ym.startsWith(String(annee)))
      .sort(([a],[b])=>a.localeCompare(b));
    const byN={};NATURE_TAGS.forEach(n=>{byN[n]=0;});
    let tot=0;
    const mData=monthsAnnee.map(([ym,m])=>{
      const effS=m.settingsSnapshot?{...settings,...m.settingsSnapshot}:settings;
      const nat={};NATURE_TAGS.forEach(n=>{nat[n]=0;});
      (m.maison?.items||[]).forEach(it=>{
        if(it.calc)return;
        const v=(it.val||0)+(it.ass||0);
        if(!v)return;
        const n=resolveNature(it);
        nat[n]=(nat[n]||0)+v;
        byN[n]=(byN[n]||0)+v;
      });
      // Extra items ponctuels
      (m.maison?.extra||[]).forEach(e=>{
        const n=e.nature&&NATURE_TAGS.includes(e.nature)?e.nature:'entretien';
        nat[n]=(nat[n]||0)+(e.amount||0);
        byN[n]=(byN[n]||0)+(e.amount||0);
      });
      const periTot=calcPeri(m.peri,effS.peri_rates);
      if(periTot>0){nat['entretien']=(nat['entretien']||0)+periTot;byN['entretien']=(byN['entretien']||0)+periTot;}
      tot+=Object.values(nat).reduce((s,v)=>s+v,0);
      return{ym,nat};
    });
    return{byNature:byN,totalCharges:tot,monthlyData:mData};
  },[appData.months,annee,settings,resolveNature]);

  const monthsAnnee=useMemo(()=>Object.entries(appData.months||{}).filter(([ym])=>ym.startsWith(String(annee))).sort(([a],[b])=>a.localeCompare(b)),[appData.months,annee]);
  const natureRanked=NATURE_TAGS.map(n=>({n,v:byNature[n]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const maxNature=natureRanked.length?natureRanked[0].v:1;

  const avgSalA=monthsAnnee.length?Math.round(monthsAnnee.reduce((s,[,m])=>s+(m.ahmed?.sal||0),0)/Math.max(1,monthsAnnee.filter(([,m])=>m.ahmed?.sal>0).length)):0;
  const avgSalS=monthsAnnee.length?Math.round(monthsAnnee.reduce((s,[,m])=>s+(m.sophie?.sal||0),0)/Math.max(1,monthsAnnee.filter(([,m])=>m.sophie?.sal>0).length)):0;
  const totalMensualites=(settings.credits||[]).reduce((a,c)=>a+c.mens+(c.ass||0),0);
  const totalCapital=(settings.credits||[]).reduce((a,c)=>a+(c.cap||0),0);
  const totalEpargne=(settings.savings||[]).reduce((a,s)=>a+((appData.balances||{})[s.id]||s.bal),0);
  const loyerAnnexe=settings.loyerAnnexe!=null?settings.loyerAnnexe:400;
  const revenuMoyenTotal=avgSalA+avgSalS+loyerAnnexe;
  const tauxEndettement=revenuMoyenTotal>0?Math.round((totalMensualites/revenuMoyenTotal)*100):0;
  const avgCharges=monthsAnnee.length?Math.round(totalCharges/monthsAnnee.length):0;
  // avgCharges intègre déjà les mensualités crédit (présentes dans les postes maison)
  // → on ne les déduit PAS une seconde fois, ce qui évite le double-comptage
  const capaciteEpargne=revenuMoyenTotal>0?Math.max(0,revenuMoyenTotal-avgCharges):0;
  const hasData=monthsAnnee.length>0;

  // Monthly totals for area chart
  const monthLabels=monthlyData.map(d=>mShort(d.ym));
  const monthTotals=monthlyData.map(d=>Object.values(d.nat).reduce((s,v)=>s+v,0));
  // Top 3 natures for area chart
  const topNatures=natureRanked.slice(0,3);

  // Simple donut SVG for répartition
  const DonutChart=({data,total})=>{
    const R=60,cx=80,cy=80,stroke=14;
    let cumul=0;
    const arcs=data.map(({n,v})=>{
      const pct=total>0?v/total:0;
      const start=cumul;
      cumul+=pct;
      const a0=start*Math.PI*2-Math.PI/2;
      const a1=cumul*Math.PI*2-Math.PI/2;
      const x0=cx+R*Math.cos(a0),y0=cy+R*Math.sin(a0);
      const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
      const large=pct>0.5?1:0;
      const d='M'+x0+','+y0+' A'+R+','+R+' 0 '+large+',1 '+x1+','+y1;
      return{d,color:NATURE_COLORS[n]||'var(--accent)',pct,n};
    });
    return(
      <svg viewBox="0 0 160 160" style={{width:140,height:140,flexShrink:0}}>
        {arcs.map((a,i)=>(
          <path key={i} d={a.d} fill="none" stroke={a.color} strokeWidth={stroke} strokeLinecap="round"/>
        ))}
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="10" fill="var(--tx3)" fontFamily="var(--font)">Total</text>
        <text x={cx} y={cy+10} textAnchor="middle" fontSize="12" fontWeight="700" fill="var(--tx)" fontFamily="var(--mono)">{eur(total)}</text>
      </svg>
    );
  };

  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.barChart} title="Indicateurs" subtitle={'Analyse '+annee}/>
      {availYears.length>1&&(
        <div style={{padding:'0 16px 4px',display:'flex',gap:6,overflowX:'auto'}}>
          {availYears.map(y=>(
            <button key={y} onClick={()=>setAnnee(Number(y))} className={'tabbtn '+(Number(y)===annee?'tabbtn-a':'tabbtn-i')} style={{fontSize:13}}>{y}</button>
          ))}
        </div>
      )}
      <div style={{overflowX:'auto',padding:'8px 16px 14px',display:'flex',gap:6}}>
        {[
          {id:'mensuel',l:'Par mois',ic:IC.trendUp},
          {id:'repartition',l:'Répartition',ic:IC.pieChart},
          {id:'bilan',l:'Bilan',ic:IC.activity},
        ].map(t=>(
          <button key={t.id} className={'tabbtn '+(tab===t.id?'tabbtn-a':'tabbtn-i')} onClick={()=>setTab(t.id)}>
            <Ico d={t.ic} s={13}/> {t.l}
          </button>
        ))}
      </div>
      <div style={{padding:'0 16px'}}>
        {!hasData&&(
          <div style={{textAlign:'center',padding:'48px 24px',background:'var(--surf)',border:'1.5px solid var(--brd)',borderRadius:16}}>
            <Ico d={IC.barChart} s={28} c="var(--cy)"/>
            <p style={{fontSize:15,fontWeight:700,marginTop:12,marginBottom:8}}>Aucune donnée pour {annee}</p>
            <p style={{fontSize:13,color:'var(--tx3)'}}>Créez des budgets mensuels pour voir les indicateurs</p>
          </div>
        )}

        {/* ── TAB PAR MOIS — area charts ── */}
        {hasData&&tab==='mensuel'&&(
          <div className="fade">
            {/* Total charges area chart */}
            {monthlyData.length>1&&(
              <div className="card" style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <p style={{fontSize:13,fontWeight:700}}>Charges mensuelles {annee}</p>
                  <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--cy)'}}>{eur(avgCharges)}/mois moy.</span>
                </div>
                <AreaChartSVG series={[monthTotals]} labels={monthLabels} colors={['var(--cy)']} height={140}/>
              </div>
            )}
            {/* Top 3 natures area charts */}
            {topNatures.length>0&&monthlyData.length>1&&(
              <div className="card" style={{marginBottom:14}}>
                <p style={{fontSize:13,fontWeight:700,marginBottom:12}}>Évolution par nature (top 3)</p>
                <AreaChartSVG
                  series={topNatures.map(({n})=>monthlyData.map(d=>d.nat[n]||0))}
                  labels={monthLabels}
                  colors={topNatures.map(({n})=>NATURE_COLORS[n]||'var(--accent)')}
                  height={150}
                  showFill={false}
                />
                <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:10}}>
                  {topNatures.map(({n})=>(
                    <div key={n} style={{display:'flex',alignItems:'center',gap:4}}>
                      <div style={{width:10,height:3,borderRadius:2,background:NATURE_COLORS[n]||'var(--accent)'}}/>
                      <span style={{fontSize:10,color:'var(--tx3)',textTransform:'capitalize'}}>{n}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {/* Tableau détail par mois */}
            <div className="card" style={{overflowX:'auto'}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:12}}>Détail par mois</p>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--tx3)',fontWeight:700,borderBottom:'1px solid var(--brd2)'}}>Nature</th>
                    {monthlyData.map(({ym})=>(
                      <th key={ym} style={{textAlign:'right',padding:'6px 8px',color:'var(--tx3)',fontWeight:700,borderBottom:'1px solid var(--brd2)',minWidth:56}}>{mShort(ym)}</th>
                    ))}
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--cy)',fontWeight:700,borderBottom:'1px solid var(--brd2)',minWidth:66}}>Total</th>
                  </tr>
                </thead>
                <tbody>
                  {NATURE_TAGS.filter(n=>(byNature[n]||0)>0).map(n=>(
                    <tr key={n}>
                      <td style={{padding:'6px 8px',fontWeight:500,textTransform:'capitalize',color:'var(--tx2)',whiteSpace:'nowrap'}}>
                        <div style={{display:'flex',alignItems:'center',gap:5}}>
                          <div style={{width:7,height:7,borderRadius:2,background:NATURE_COLORS[n],flexShrink:0}}/>
                          {n}
                        </div>
                      </td>
                      {monthlyData.map(({ym,nat})=>(
                        <td key={ym} className="mono" style={{textAlign:'right',padding:'6px 8px',fontSize:11,color:(nat[n]||0)>0?'var(--tx)':'var(--tx3)'}}>{(nat[n]||0)>0?eur(nat[n]):'—'}</td>
                      ))}
                      <td className="mono" style={{textAlign:'right',padding:'6px 8px',fontWeight:700,color:NATURE_COLORS[n]}}>{eur(byNature[n])}</td>
                    </tr>
                  ))}
                  <tr style={{borderTop:'2px solid var(--brd)'}}>
                    <td style={{padding:'8px',fontWeight:700,color:'var(--cy)'}}>Total</td>
                    {monthlyData.map(({ym,nat})=>{
                      const tot=Object.values(nat).reduce((s,v)=>s+v,0);
                      return<td key={ym} className="mono" style={{textAlign:'right',padding:'8px',fontWeight:700,color:'var(--cy)'}}>{eur(tot)}</td>;
                    })}
                    <td className="mono" style={{textAlign:'right',padding:'8px',fontWeight:700,color:'var(--cy)'}}>{eur(totalCharges)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── TAB RÉPARTITION — donut ── */}
        {hasData&&tab==='repartition'&&(
          <div className="fade">
            <div className="card" style={{marginBottom:14}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:14}}>Dépenses par catégorie — {annee}</p>
              <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
                <DonutChart data={natureRanked} total={totalCharges}/>
                <div style={{flex:1,minWidth:160}}>
                  {natureRanked.map(({n,v})=>{
                    const pct=Math.round((v/Math.max(totalCharges,1))*100);
                    const color=NATURE_COLORS[n]||'var(--accent)';
                    return(
                      <div key={n} style={{marginBottom:8}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            <div style={{width:8,height:8,borderRadius:2,background:color,flexShrink:0}}/>
                            <span style={{fontSize:12,fontWeight:500,textTransform:'capitalize'}}>{n}</span>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span className="mono" style={{fontSize:12,fontWeight:700,color}}>{eur(v)}</span>
                            <span className="badge bc" style={{fontSize:9,minWidth:30,justifyContent:'center'}}>{pct}%</span>
                          </div>
                        </div>
                        <div className="pbar" style={{height:4}}>
                          <div className="pbar-fill" style={{width:Math.round((v/maxNature)*100)+'%',background:color}}/>
                        </div>
                      </div>
                    );
                  })}
                  {totalCharges>0&&(
                    <div style={{marginTop:10,padding:'10px 12px',background:'var(--surf2)',borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:12,fontWeight:700}}>Total {annee}</span>
                      <span className="mono" style={{fontSize:16,fontWeight:700,color:'var(--cy)'}}>{eur(totalCharges)}</span>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── TAB BILAN — loyer annexe inclus ── */}
        {hasData&&tab==='bilan'&&(
          <div className="fade" style={{display:'flex',flexDirection:'column',gap:12}}>
            {/* Taux d'endettement */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                <div style={{width:34,height:34,borderRadius:9,background:tauxEndettement>33?'var(--rdBg)':tauxEndettement>25?'var(--amBg)':'var(--grBg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ico d={IC.card} s={16} c={tauxEndettement>33?'var(--rd)':tauxEndettement>25?'var(--am)':'var(--grB)'}/>
                </div>
                <div>
                  <p style={{fontSize:15,fontWeight:700}}>Taux d endettement</p>
                  <p style={{fontSize:11,color:'var(--tx3)'}}>Mensualités / revenus totaux (salaires + loyer annexe)</p>
                </div>
                <div style={{marginLeft:'auto',textAlign:'right'}}>
                  <p className="mono" style={{fontSize:28,fontWeight:800,color:tauxEndettement>33?'var(--rd)':tauxEndettement>25?'var(--am)':'var(--grB)'}}>{tauxEndettement}%</p>
                  <span className={tauxEndettement>33?'badge br':tauxEndettement>25?'badge ba':'badge bg'}>{tauxEndettement>33?'Élevé':tauxEndettement>25?'Modéré':'Raisonnable'}</span>
                </div>
              </div>
              <div className="pbar" style={{height:8}}>
                <div className="pbar-fill" style={{width:Math.min(tauxEndettement,50)*2+'%',background:tauxEndettement>33?'var(--rd)':tauxEndettement>25?'var(--am)':'var(--gr)'}}/>
              </div>
            </div>

            {/* Revenus */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <Ico d={IC.trendUp} s={15} c="var(--grB)"/>
                <p style={{fontSize:15,fontWeight:700}}>Revenus mensuels moyens</p>
              </div>
              <Row l={'Salaire moy. '+settings.identity.person1} v={eur(avgSalA)} c="var(--accent)"/>
              <Row l={'Salaire moy. '+settings.identity.person2} v={eur(avgSalS)} c="var(--pu)"/>
              <Row l="Loyer annexe (mensuel)" v={eur(loyerAnnexe)} c="var(--grB)"/>
              <div className="sep"/>
              <Row l="Total revenus foyer" v={eur(revenuMoyenTotal)} c="var(--grB)" bold/>
              <p style={{fontSize:10,color:'var(--tx3)',marginTop:6}}>Loyer annexe configurable dans Paramétrage → Rééquilibrage</p>
            </div>

            {/* Capacité d'épargne */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <Ico d={IC.trendUp} s={15} c="var(--grB)"/>
                <p style={{fontSize:15,fontWeight:700}}>Capacité d épargne</p>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div style={{background:'var(--surf2)',borderRadius:10,padding:'12px'}}>
                  <p style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Revenus moy.</p>
                  <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--grB)'}}>{eur(revenuMoyenTotal)}</p>
                </div>
                <div style={{background:'var(--surf2)',borderRadius:10,padding:'12px'}}>
                  <p style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Charges moy./mois</p>
                  <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--am)'}}>{eur(avgCharges)}</p>
                </div>
              </div>
              <div style={{padding:'14px 16px',background:'var(--grBg)',borderRadius:12,border:'1px solid var(--grBrd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <p style={{fontSize:11,fontWeight:700,color:'var(--grB)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>Marge nette mensuelle</p>
                  <p style={{fontSize:11,color:'var(--tx3)'}}>Revenus − charges maison moyennes (mensualités crédit incluses)</p>
                </div>
                <p className="mono" style={{fontSize:26,fontWeight:800,color:'var(--grB)'}}>{eur(capaciteEpargne)}</p>
              </div>
            </div>

            {/* Top postes */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <Ico d={IC.target} s={15} c="var(--accent)"/>
                <p style={{fontSize:15,fontWeight:700}}>Top postes de dépenses</p>
              </div>
              {natureRanked.slice(0,4).map(({n,v},i)=>{
                const pct=Math.round((v/Math.max(totalCharges,1))*100);
                return(
                  <div key={n} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<3?'1px solid var(--brd2)':'none'}}>
                    <div style={{width:28,height:28,borderRadius:7,background:NATURE_COLORS[n]+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <span style={{fontSize:12,fontWeight:700,color:NATURE_COLORS[n]}}>{i+1}</span>
                    </div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:14,fontWeight:600,textTransform:'capitalize',marginBottom:3}}>{n}</p>
                      <div className="pbar" style={{height:4}}>
                        <div className="pbar-fill" style={{width:pct+'%',background:NATURE_COLORS[n]}}/>
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <p className="mono" style={{fontSize:14,fontWeight:700}}>{eur(v)}</p>
                      <p style={{fontSize:10,color:'var(--tx3)'}}>{pct}%</p>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Épargne totale */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <Ico d={IC.piggy} s={15} c="var(--grB)"/>
                <p style={{fontSize:15,fontWeight:700}}>Patrimoine épargne</p>
              </div>
              {(settings.savings||[]).map(acc=>{
                const bal=(appData.balances||{})[acc.id]!=null?(appData.balances||{})[acc.id]:acc.bal;
                const pct=totalEpargne>0?Math.round((bal/totalEpargne)*100):0;
                return(
                  <div key={acc.id} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:500}}>{acc.name}</span>
                      <span className="mono" style={{fontSize:13,fontWeight:700,color:acc.color||'var(--grB)'}}>{eur(bal)}</span>
                    </div>
                    <div className="pbar" style={{height:5}}>
                      <div className="pbar-fill" style={{width:pct+'%',background:acc.color||'var(--gr)'}}/>
                    </div>
                  </div>
                );
              })}
              <div className="sep" style={{margin:'12px 0'}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:14,fontWeight:700}}>Total épargne</span>
                <span className="mono" style={{fontSize:22,fontWeight:800,color:'var(--grB)'}}>{eur(totalEpargne)}</span>
              </div>
            </div>

            {/* Capital dû */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <Ico d={IC.card} s={15} c="var(--rd)"/>
                <p style={{fontSize:15,fontWeight:700}}>Capital restant dû</p>
              </div>
              {(settings.credits||[]).map(c=>(
                <div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--brd2)'}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:500}}>{c.name}</p>
                    <p style={{fontSize:11,color:'var(--tx3)'}}>{eur(c.mens+(c.ass||0))}/mois — fin {new Date(c.fin+'T00:00:00').toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}</p>
                  </div>
                  <span className="mono" style={{fontSize:14,fontWeight:700,color:'var(--rd)'}}>{eur(c.cap)}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}}>
                <span style={{fontSize:14,fontWeight:700}}>Total capital dû</span>
                <span className="mono" style={{fontSize:22,fontWeight:800,color:'var(--rd)'}}>{eur(totalCapital)}</span>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const Aide=({settings})=>{
  const[guide,setGuide]=useState('budget');
  const[step,setStep]=useState(0);
  const p1=settings.identity.person1,p2=settings.identity.person2,ch=settings.identity.child;
  const tgt=eur(settings.targetReste||550);
  const GUIDES={
    budget:{l:'Budget mensuel',ic:IC.cal,steps:[
      {t:'Créer le mois',d:`Dans Budget, naviguez jusqu'au mois en cours et cliquez "Créer le budget". Les valeurs par défaut du Paramétrage sont pré-remplies et capturées en snapshot — elles ne changeront plus pour ce mois.`,ic:IC.cal},
      {t:'Onglet Maison',d:`Vérifiez les charges variables du mois : eau, EDF, AMEX différé, dépenses ponctuelles. Le périscolaire se calcule automatiquement. Chaque poste est tagué par nature (assurance, crédit, énergie...) pour les Indicateurs.`,ic:IC.house},
      {t:`Onglets ${p1} / ${p2}`,d:`Renseignez vos salaires nets. Ajustez l'épargne personnelle jusqu'à ce que le "Reste" soit ≥ ${tgt}. L'épargne est la variable d'ajustement.`,ic:IC.wallet},
      {t:'Périscolaire',d:`Saisissez les prestations du mois (matin, midi, soir, journée). Le total est calculé et intégré dans la part de ${p2}.`,ic:IC.school},
      {t:'Virements',d:`Vérifiez les 2 virements de ${p1} et les 3 virements de ${p2} (commun + périscolaire + Livret A ${ch}). Ces montants sont prêts à saisir dans votre banque.`,ic:IC.send},
    ]},
    suivi:{l:'Suivi en cours de mois',ic:IC.chart,steps:[
      {t:'Saisir le solde bancaire',d:`Dans Suivi, saisissez le solde réel de votre compte commun observé sur votre app bancaire. Le delta indique si le solde couvre les dépenses restantes.`,ic:IC.wallet2},
      {t:'Pointer les dépenses',d:`Cliquez sur chaque dépense quand elle est prélevée. Une modale s'ouvre avec le montant prévu — validez tel quel ou ajustez le montant réel débité.`,ic:IC.chk},
      {t:'Validation partielle',d:`Si le montant débité diffère du prévu (ex: 62,50€ au lieu de 125€), saisissez le montant réel. L'item apparaît comme "partiellement débité" avec une couleur distincte.`,ic:IC.halfCheck},
      {t:'Acquittements épargne',d:`Cocher un item épargne crédite automatiquement le bon compte dans le module Épargne et enregistre un mouvement daté. Vous tracez ainsi l'historique de chaque versement.`,ic:IC.piggy},
      {t:'Réinitialiser',d:`En cas d'erreur, "Réinitialiser le suivi" efface tous les pointages et annule proprement tous les mouvements d'épargne générés pour ce mois.`,ic:IC.ref},
    ]},
    epargne:{l:'Gérer l\'épargne',ic:IC.piggy,steps:[
      {t:'Soldes de référence',d:`Les soldes initiaux dans Paramétrage → Épargne correspondent à la situation de ${mShort(FROZEN_MONTH)} (référence figée). Les mouvements s'accumulent par-dessus.`,ic:IC.lock},
      {t:'Ajouter ou retirer',d:`Cliquez "Ajouter" pour un versement ou "Retirer" pour un prélèvement. Saisissez le montant du mouvement — le nouveau solde est prévisualisé avant confirmation.`,ic:IC.up},
      {t:'Mouvements automatiques',d:`Chaque acquittement dans le Suivi génère un mouvement visible dans l'historique du compte concerné. Vous voyez toujours l'origine de chaque variation.`,ic:IC.activity},
      {t:'Pots Vacances',d:`Créez des pots dans le module Vacances. Liez chaque pot à un compte épargne et renseignez les activités prévues. L'app calcule le montant mensuel à épargner pour atteindre l'objectif.`,ic:IC.beach},
    ]},
    indicateurs:{l:'Indicateurs',ic:IC.barChart,steps:[
      {t:'Répartition par nature',d:`L'onglet Répartition montre vos dépenses annuelles organisées par nature (assurance, crédit, énergie...). La nature de chaque poste maison est configurée dans Paramétrage → Maison.`,ic:IC.pieChart},
      {t:'Vue par mois',d:`L'onglet Par mois affiche des barres empilées colorées par nature pour visualiser l'évolution mois par mois. Le tableau détaillé donne les montants exacts.`,ic:IC.barChart},
      {t:'Bilan macro',d:`L'onglet Bilan calcule votre taux d'endettement, le top de vos postes, votre marge nette mensuelle et l'état de votre patrimoine épargne.`,ic:IC.trendUp},
    ]},
    setup:{l:'Premier paramétrage',ic:IC.gear,steps:[
      {t:'Identité du foyer',d:`Commencez par Paramétrage → Identité pour renseigner vos prénoms. Ces noms apparaissent partout dans l'app.`,ic:IC.home},
      {t:'Delta de rééquilibrage',d:`Le delta compense les écarts de salaires. Avec ${eur(settings.delta||800)} : ${p1} paie ½+${eur(settings.delta||800)} et ${p2} paie ½−${eur(settings.delta||800)} des charges.`,ic:IC.activity},
      {t:'Nature des postes maison',d:`Dans Paramétrage → Maison, assignez une nature à chaque poste (assurance, crédit, énergie...). Ces tags alimentent le module Indicateurs pour l'analyse annuelle.`,ic:IC.tag},
      {t:'Comptes épargne',d:`Dans Paramétrage → Épargne, ajustez les soldes initiaux de ${mShort(FROZEN_MONTH)}. Ce sont vos soldes de référence figés. Les mouvements futurs s'accumulent par-dessus.`,ic:IC.piggy},
    ]},
  };
  const g=GUIDES[guide];
  const sd=g.steps[step];
  return(
    <div style={{padding:'16px 16px 32px'}}>
      <ModuleHeader icon={IC.help} title="Aide" subtitle="Guides pratiques interactifs"/>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:16,marginBottom:20}}>
        {Object.entries(GUIDES).map(([id,g])=>(
          <button key={id} onClick={()=>{setGuide(id);setStep(0);}} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderRadius:14,background:guide===id?'var(--accentBg)':'var(--surf)',border:`1.5px solid ${guide===id?'var(--accentBrd)':'var(--brd)'}`,color:guide===id?'var(--accent)':'var(--tx)',cursor:'pointer',fontFamily:'var(--font)',transition:'all var(--tr)',textAlign:'left'}}>
            <div style={{width:32,height:32,borderRadius:8,background:guide===id?'var(--accentBg)':'var(--surf2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ico d={g.ic} s={16} c={guide===id?'var(--accent)':'var(--tx3)'}/>
            </div>
            <span style={{fontSize:14,fontWeight:guide===id?700:500}}>{g.l}</span>
            <span style={{marginLeft:'auto',fontSize:11,color:guide===id?'var(--accent)':'var(--tx3)'}}>{g.steps.length} étapes</span>
          </button>
        ))}
      </div>
      <div className="card fade" style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:12,fontWeight:700,color:'var(--tx3)'}}>Étape {step+1}/{g.steps.length}</span>
          <div className="pbar" style={{flex:1,margin:'0 12px'}}>
            <div className="pbar-fill" style={{width:`${((step+1)/g.steps.length)*100}%`,background:'var(--accent)'}}/>
          </div>
          <span style={{fontSize:12,color:'var(--accent)',fontWeight:700}}>{Math.round(((step+1)/g.steps.length)*100)}%</span>
        </div>
        <div style={{textAlign:'center',padding:'14px 0'}}>
          <div style={{width:68,height:68,borderRadius:20,background:'var(--accentBg)',border:'1.5px solid var(--accentBrd)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
            <Ico d={sd.ic||g.ic} s={28} c="var(--accent)"/>
          </div>
          <h3 style={{fontSize:17,fontWeight:700,letterSpacing:'-.03em',marginBottom:12}}>{sd.t}</h3>
          <p style={{fontSize:14,color:'var(--tx2)',lineHeight:1.75,textAlign:'left'}}>{sd.d}</p>
        </div>
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}><Ico d={IC.chL} s={14}/> Précédent</button>
          <button className="btn btn-p" style={{flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>Math.min(g.steps.length-1,s+1))} disabled={step===g.steps.length-1}>Suivant <Ico d={IC.chR} s={14}/></button>
        </div>
      </div>
      {g.steps.map((st,i)=>(
        <div key={i} onClick={()=>setStep(i)} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,marginBottom:6,cursor:'pointer',background:i===step?'var(--accentBg)':'var(--surf)',border:`1.5px solid ${i===step?'var(--accentBrd)':'var(--brd)'}`,transition:'all var(--tr)'}}>
          <div style={{width:24,height:24,borderRadius:'50%',background:i<step?'var(--gr)':i===step?'var(--accent)':'var(--surf3)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
            {i<step?<Ico d={IC.chk} s={11} c="#fff" sw={2.5}/>:i+1}
          </div>
          <span style={{fontSize:13,fontWeight:i===step?700:400,color:i===step?'var(--accent)':'var(--tx2)'}}>{st.t}</span>
        </div>
      ))}
    </div>
  );
};
