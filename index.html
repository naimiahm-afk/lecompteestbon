<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
const CLIENT_ID   = '513501796130-68m295si4jcklt653n0rg1k51lhkomn0.apps.googleusercontent.com';

/* ═══════════════════════════════════════════════════════

    {id:'lv_ahmed', name:'Livret Ahmed',    bal:10,      monthly:0,  color:'#4F8EF7'},
    {id:'la_ahmed', name:'Livret A Ahmed',  bal:1489.20, monthly:0,  color:'#10B981'},
    {id:'lv_sophie',name:'Livret Sophie',   bal:299,     monthly:0,  color:'#A78BFA'},
    {id:'la_sophie',name:'Livret A Sophie', bal:404,     monthly:0,  color:'#FB923C'},
    {id:'la_cam',   name:'Livret A Camélia',bal:816.50,  monthly:50, color:'#F59E0B'},
  ],
  credits:[
    {id:'immo', name:'Crédit Immobilier',org:'Crédit du Nord',init:450000,mens:1868,   ass:76,debut:'2021-07-15',fin:'2043-07-05',cap:358481},
    {id:'trav', name:'Crédit Travaux',   org:'CréditLift',   init:110456,mens:1014.87, ass:15,debut:'2025-06-05',fin:'2040-05-05',cap:107979},
    {id:'conso',name:'Crédit Conso',     org:'BoursoBank',   init:17000, mens:316.24,  ass:0, debut:'2025-08-29',fin:'2030-08-29',cap:14943},
    {id:'phone',name:'Crédit iPhone',    org:'Cetelem',      init:1843,  mens:76.79,   ass:0, debut:'2025-11-22',fin:'2027-12-05',cap:1536},
  ],

const mkDefaultBalances = () => DEF_SETTINGS.savings.reduce((a,s)=>({...a,[s.id]:s.bal}),{});

const DEF_DATA = {
  version:APP_VER,
  settings:DEF_SETTINGS,
  months:{},

  balances:mkDefaultBalances(),
  vacancesTxs:[],
  balanceAdjusts:[],

/* ═══════════════════════════════════════════════════════
   CALCULATION ENGINE V3
═══════════════════════════════════════════════════════ */
const calcPeri = (p,r) => {
  if(!p||!r) return 0;
  return Math.round(((p.matin||0)*r.matin+(p.midi||0)*r.midi+(p.soir||0)*r.soir+(p.journee||0)*r.journee)*100)/100;
};

// s = effective settings (may be m.settingsSnapshot || globalSettings)
const calcMonth = (m,s) => {
  const periTotal = calcPeri(m.peri, s.peri_rates);
  // epargCam : champ dédié du mois (m.epargCam) en priorité,
  // sinon fallback sur l'item maison par id ou label
  let epargCam = 0;
  if(m.epargCam!=null) {
    epargCam = m.epargCam;
  } else {
    const it = (m.maison.items||[]).find(x=>x.id==='eparg_cam') ||
               (m.maison.items||[]).find(x=>x.label&&x.label.toLowerCase().includes('cam')&&x.nature==='épargne');
    epargCam = it?(it.val||0):0;
  }
  const extraCommun = (m.maison.extra||[]).filter(e=>e.account==='commun').reduce((a,e)=>a+(e.amount||0),0);
  const extraAhmed  = (m.maison.extra||[]).filter(e=>e.account==='ahmed').reduce((a,e)=>a+(e.amount||0),0);
  const extraSophie = (m.maison.extra||[]).filter(e=>e.account==='sophie').reduce((a,e)=>a+(e.amount||0),0);
  const maisonBase  = Math.round(m.maison.items.reduce((sum,it)=>{
    if(it.calc) return sum+periTotal;
    return sum+(it.val||0)+(it.ass||0);
  },0));
  const maisonTotal = maisonBase + extraCommun;
  const half = Math.round(maisonTotal/2);
  const delta = s.deltaAuto&&m.ahmed.sal&&m.sophie.sal
    ? Math.round((m.ahmed.sal-m.sophie.sal)/2) : (s.delta||800);
  const aShare = half+delta;
  const sShare = half-delta;
  const aReste  = (m.ahmed.sal||0)-aShare-(m.ahmed.courses||0)-(m.ahmed.savings||0)-extraAhmed;
  const sReste  = (m.sophie.sal||0)-sShare-(m.sophie.courses||0)-(m.sophie.savings||0)-extraSophie;
  const vAhmed  = aShare+(m.ahmed.courses||0)+(m.ahmed.savings||0);
  const vSophieTot = sShare+(m.sophie.courses||0)+(m.sophie.savings||0);
  const vSophieCommun = vSophieTot-periTotal-epargCam;
  return {
    maisonTotal,half,periTotal,epargCam,delta,aShare,sShare,aReste,sReste,
    vAhmed, vSophie:vSophieTot, vSophieCommun,
    vSophiePeri:periTotal, vSophieCam:epargCam,
    extraCommun,extraAhmed,extraSophie,
  };
};

const mkMonth = (ym,s) => ({
  id:ym, createdAt:new Date().toISOString(), statut:'en_cours',
  settingsSnapshot:{
    maison_items:s.maison_items.map(it=>({...it})),
    peri_rates:{...s.peri_rates},
    delta:s.delta, deltaAuto:s.deltaAuto, targetReste:s.targetReste,
    identity:{...s.identity},
  },
  maison:{items:s.maison_items.map(it=>({...it,val:it.def})), extra:[]},
  epargCam: s.defEpargCam!=null?s.defEpargCam:50,
  ahmed: {sal:0, courses:s.defCourses1!=null?s.defCourses1:250, savings:s.defSavings1||0},
  sophie:{sal:0, courses:s.defCourses2!=null?s.defCourses2:250, savings:s.defSavings2||0},
  compteCommun:{loyer:null, loyerOk:false, soldeReel:null},
  peri: {matin:0,midi:0,soir:0,journee:0,status:'estimation',facture:null},
  track:{states:{},soldeReel:null},
});

/* ═══════════════════════════════════════════════════════
   DATA MIGRATION V2 → V3
═══════════════════════════════════════════════════════ */
const migrateData = (data) => {
  if(!data) return DEF_DATA;
  if(data.version===APP_VER) return data;

  // V1 → V2 migration (compte commun)
  const months = {};
  Object.entries(data.months||{}).forEach(([ym,m])=>{
    const cc = {loyer:null,loyerOk:false,soldeReel:null};
    const ahmed = {...(m.ahmed||{})};
    if(ahmed.loyer!==undefined){ cc.loyer=ahmed.loyer; delete ahmed.loyer; }
    if(ahmed.loyerOk!==undefined){ cc.loyerOk=ahmed.loyerOk; delete ahmed.loyerOk; }
    // Add settingsSnapshot if missing
    const existingSettings = data.settings||DEF_SETTINGS;
    const settingsSnapshot = m.settingsSnapshot || {
      maison_items:(m.maison&&m.maison.items?m.maison.items:[]).map(it=>({...it,nature:it.nature||(existingSettings.maison_items||[]).find(x=>x.id===it.id)?.nature||'entretien'})),
      peri_rates:{...(existingSettings.peri_rates||DEF_SETTINGS.peri_rates)},
      delta:existingSettings.delta||800, deltaAuto:existingSettings.deltaAuto||false,
      targetReste:existingSettings.targetReste||550,
      identity:{...(existingSettings.identity||DEF_SETTINGS.identity)},
    };
    // Remove versions (V3 has no versioning)
    const {versions:_,...mRest} = m;
    months[ym]={
      ...mRest, ahmed, compteCommun:m.compteCommun||cc,
      statut:m.statut||'en_cours', settingsSnapshot,
      track:m.track||{states:{},soldeReel:null},
      maison:{...(m.maison||{}), items:(m.maison?.items||[]), extra:(m.maison?.extra||[])},
      epargCam: m.epargCam!=null ? m.epargCam : (()=>{
        const it=(m.maison?.items||[]).find(x=>x.id==='eparg_cam')||
                 (m.maison?.items||[]).find(x=>x.label&&x.label.toLowerCase().includes('cam')&&x.nature==='épargne');
        return it?(it.val||0):(oldSettings.defEpargCam!=null?oldSettings.defEpargCam:50);
      })(),
    };
  });

  // Merge settings with defaults + add nature to maison_items
  const oldSettings = data.settings||{};
  const newMaisonItems = (oldSettings.maison_items||DEF_SETTINGS.maison_items).map(it=>{
    const def = DEF_SETTINGS.maison_items.find(d=>d.id===it.id);
    return {...it, nature: it.nature || def?.nature || 'entretien'};
  });

   GOOGLE DRIVE
═══════════════════════════════════════════════════════ */
let gClient=null, gToken=null, gFileId=null;
const initGIS = cb => {
  const t=setInterval(()=>{
    if(window.google&&window.google.accounts){
      clearInterval(t);
      gClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID, scope:SCOPES,
        callback:r=>{ if(r.access_token){gToken=r.access_token;cb(true);}else cb(false); }
      });
      cb(null);
    }
  },250);
};
const gReq=(url,opts={})=>fetch(url,{...opts,headers:{Authorization:'Bearer '+gToken,...(opts.headers||{})}});
const gLoad=async()=>{
  const r=await gReq(`https://www.googleapis.com/drive/v3/files?q=name%3D'${FILE_NAME}'%20and%20trashed%3Dfalse&fields=files(id)`);
  const d=await r.json();
  if(d.files&&d.files.length){
    gFileId=d.files[0].id;
    const res=await gReq(`https://www.googleapis.com/drive/v3/files/${gFileId}?alt=media`);
    return res.json();
  }
  return null;
};
const gSave=async data=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME,mimeType:'application/json'})],{type:'application/json'}));
  form.append('file',blob);
  if(gFileId){
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gFileId}?uploadType=multipart`,{method:'PATCH',headers:{Authorization:'Bearer '+gToken},body:form});
  }else{
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+gToken},body:form});
    gFileId=(await r.json()).id;
  }
};

const eur  = n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const eurD = n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);
const pN   = s=>parseFloat(String(s).replace(',','.'))||0;
const MO   = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MS   = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const mFull  = ym=>{ const[y,m]=ym.split('-'); return MO[+m-1]+' '+y; };
const mShort = ym=>{ const[y,m]=ym.split('-'); return MS[+m-1]+' '+y; };
const curYM  = ()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const mLeft  = fin=>{ const f=new Date(fin+'T00:00:00'),n=new Date(); return Math.max(0,(f.getFullYear()-n.getFullYear())*12+f.getMonth()-n.getMonth()); };
const pctOf  = (init,rem)=>init>0?Math.round(((init-rem)/init)*100):0;
const prevYM = ym=>{ const[y,m]=ym.split('-').map(Number); const d=new Date(y,m-2,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const nextYM = ym=>{ const[y,m]=ym.split('-').map(Number); const d=new Date(y,m,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const getAvailableYears = months => [...new Set(Object.keys(months||{}).map(ym=>ym.split('-')[0]))].sort().reverse();
const monthsUntil = ymTarget => {
  const[y,m]=ymTarget.split('-').map(Number);
  const now=new Date(); const nowM=now.getFullYear()*12+now.getMonth();
  return Math.max(0,(y*12+m-1)-nowM);
};

  const total=calcPeri(p,r);
  const updP=(f,v)=>updM(mo=>({...mo,peri:{...mo.peri,[f]:v}}));
  const statuses=[{id:'estimation',l:'Estimé',c:'var(--am)'},{id:'facture',l:'Facturé',c:'var(--accent)'},{id:'ecart',l:'Écart',c:'var(--or)'},{id:'paye',l:'Payé ✓',c:'var(--grB)'}];
  const rows=[{k:'matin',l:'Matin'},{k:'midi',l:'Midi'},{k:'soir',l:'Soir'},{k:'journee',l:'Journée'}];
  return(
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div className="card">
        <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Statut de la facture</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {statuses.map(st=>(
            <button key={st.id} onClick={()=>updP('status',st.id)} style={{padding:'7px 16px',borderRadius:20,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'var(--font)',background:p.status===st.id?st.c+'22':'var(--surf2)',color:p.status===st.id?st.c:'var(--tx3)',border:`1.5px solid ${p.status===st.id?st.c+'55':'var(--brd)'}`,transition:'all var(--tr)'}}>
              {st.l}
            </button>
          ))}
        </div>
      </div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
          <Ico d={IC.school} s={15} c="var(--am)"/>
          <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em'}}>Prestations du mois</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px',gap:6,padding:'4px 10px',marginBottom:6}}>
          {['Prestation','Nb.','Tarif','Total'].map(h=><span key={h} style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',textAlign:h==='Prestation'?'left':'right'}}>{h}</span>)}
        </div>
        {rows.map(row=>(
          <div key={row.k} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px',gap:6,alignItems:'center',padding:'9px 10px',borderRadius:10,background:'var(--surf2)',marginBottom:4}}>
            <span style={{fontSize:14,fontWeight:500}}>{row.l}</span>
            <NI val={p[row.k]||0} onChange={v=>updP(row.k,v)} min={0} max={31} w="68px"/>
            <span className="mono" style={{fontSize:12,color:'var(--tx3)',textAlign:'right'}}>{eurD(r[row.k])}</span>
            <span className="mono" style={{fontSize:13,fontWeight:700,textAlign:'right',color:(p[row.k]||0)>0?'var(--tx)':'var(--tx3)'}}>{eurD((p[row.k]||0)*r[row.k])}</span>
          </div>
        ))}
        <div className="sep"/>
        <div style={{display:'flex',justifyContent:'space-between',padding:'8px 10px'}}>
          <span style={{fontWeight:700,letterSpacing:'-.01em'}}>Total estimé</span>
          <span className="mono" style={{fontWeight:700,fontSize:18,color:'var(--am)'}}>{eurD(total)}</span>
        </div>
      </div>
      {(p.status==='facture'||p.status==='ecart'||p.status==='paye')&&(
        <div className="card">
          <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:14}}>Facture réelle</p>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <label style={{fontSize:14,color:'var(--tx2)'}}>Montant facturé</label>
            <NI val={p.facture||0} onChange={v=>updP('facture',v)} step="0.01"/>
          </div>
          {(p.facture||0)>0&&(()=>{
            // V3: delta = provision - facture (positive = on a trop provisionné = bien)
            const delta = total - (p.facture||0);
            const isGood = delta >= 0;
            return(
              <div style={{padding:'11px 14px',borderRadius:10,background:isGood?'var(--grBg)':'var(--rdBg)',border:`1px solid ${isGood?'var(--grBrd)':'var(--rdBrd)'}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <span style={{fontSize:13,color:isGood?'var(--grB)':'var(--rd)',fontWeight:600}}>{isGood?'Économie réalisée':'Dépassement de provision'}</span>
                </div>
                <span className="mono" style={{fontWeight:700,color:isGood?'var(--grB)':'var(--rd)',fontSize:15}}>{isGood?'+':''}{eurD(delta)}</span>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   BUDGET MENSUEL V3
═══════════════════════════════════════════════════════ */
const BudgetMensuel=({D:appData,setD:setAppData,settings,showToast})=>{
  const[ym,setYm]=useState(curYM());
  const[tab,setTab]=useState('maison');
  const m=appData.months[ym];
  // Use settingsSnapshot for past months
  const effSettings=useMemo(()=>m&&m.settingsSnapshot?{...settings,...m.settingsSnapshot}:settings,[m,settings]);
  const calc=useMemo(()=>m?calcMonth(m,effSettings):null,[m,effSettings]);

  const[confirmDel,setConfirmDel]=useState(false);

  const createM=()=>setAppData(p=>({...p,months:{...p.months,[ym]:mkMonth(ym,p.settings)}}));
  const updM=fn=>setAppData(p=>({...p,months:{...p.months,[ym]:fn(p.months[ym])}}));

  const deleteM=()=>{
    setAppData(p=>{
      const newMonths=Object.assign({},p.months);
      delete newMonths[ym];
      return{...p,months:newMonths};
    });
    setConfirmDel(false);
    showToast('Budget supprimé — tu peux en créer un nouveau avec le paramétrage actuel','info');
  };

  const cloture=()=>{
    updM(mo=>({...mo,statut:mo.statut==='cloture'?'en_cours':'cloture'}));
    showToast(m.statut==='cloture'?'Mois réouvert ✓':'Mois clôturé ✓','success');
  };

  const TABS=[
    {id:'maison',l:'Maison',ic:IC.house},
    {id:'ahmed',l:effSettings.identity.person1,ic:IC.wallet},
    {id:'sophie',l:effSettings.identity.person2,ic:IC.wallet},
    {id:'commun',l:'Compte commun',ic:IC.piggy},
    {id:'virements',l:'Virements',ic:IC.send},
    {id:'peri',l:'Périscolaire',ic:IC.school},
  ];

  if(!m)return(
    <div style={{padding:'16px 16px 24px'}}>
      <MNav ym={ym} setYm={setYm}/>
      <div style={{textAlign:'center',padding:'64px 20px'}}>
        <div style={{width:80,height:80,borderRadius:24,background:'var(--accentBg)',border:'1.5px solid var(--accentBrd)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
          <Ico d={IC.cal} s={36} c="var(--accent)"/>
        </div>
        <h3 style={{fontSize:20,fontWeight:700,letterSpacing:'-.03em',marginBottom:8}}>{mFull(ym)}</h3>
        <p style={{color:'var(--tx2)',marginBottom:28,fontSize:14}}>Aucun budget créé pour ce mois</p>
        <button className="btn btn-p" onClick={createM}><Ico d={IC.plus} s={15}/> Créer le budget</button>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:32}}>
      <div style={{padding:'16px 16px 0'}}>
        <MNav ym={ym} setYm={setYm}/>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:14,flexWrap:'wrap'}}>
          <span className={m.statut==='cloture'?'badge bg':'badge bb'}>
            {m.statut==='cloture'?'✓ Clôturé':'En cours'}
          </span>
          {m.settingsSnapshot&&<span className="badge bw" style={{fontSize:10}}>Snapshot paramétrage</span>}
          <div style={{flex:1}}/>
          <button className={`btn btn-sm ${m.statut==='cloture'?'btn-s':'btn-s'}`} onClick={cloture} style={{borderColor:m.statut==='cloture'?'var(--am)':'var(--brd)',color:m.statut==='cloture'?'var(--am)':'var(--tx2)'}}>
            <Ico d={m.statut==='cloture'?IC.lock:IC.chk} s={13}/>
            {m.statut==='cloture'?'Réouvrir':'Clôturer'}
          </button>
          <button className="btn btn-d btn-sm" onClick={()=>setConfirmDel(true)} title="Supprimer ce budget et en recréer un avec le paramétrage actuel">
            <Ico d={IC.trash} s={13}/> Supprimer
          </button>
        </div>
      </div>
      <SummaryBar calc={calc} s={effSettings}/>
      <div style={{overflowX:'auto',padding:'12px 16px 0',display:'flex',gap:6}}>
        {TABS.map(t=>(
          <button key={t.id} className={`tabbtn ${tab===t.id?'tabbtn-a':'tabbtn-i'}`} onClick={()=>setTab(t.id)}>
            <Ico d={t.ic} s={13}/> {t.l}
          </button>
        ))}
      </div>
      <Modal open={confirmDel} close={()=>setConfirmDel(false)} title="Supprimer ce budget ?">
        <div style={{marginBottom:16}}>
          <div style={{padding:'12px 14px',background:'var(--rdBg)',border:'1px solid var(--rdBrd)',borderRadius:10,marginBottom:14}}>
            <p style={{fontSize:13,fontWeight:700,color:'var(--rd)',marginBottom:4}}>⚠ {mFull(ym)} sera supprimé</p>
            <p style={{fontSize:12,color:'var(--tx2)',lineHeight:1.6}}>Toutes les saisies de ce mois seront perdues. Tu pourras recréer un budget vierge avec le paramétrage actuel.</p>
          </div>
          <p style={{fontSize:12,color:'var(--tx3)'}}>Utilise cette action pour repartir sur le bon paramétrage après avoir mis à jour tes postes de dépenses.</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setConfirmDel(false)}>Annuler</button>
          <button className="btn btn-d" style={{flex:1,justifyContent:'center'}} onClick={deleteM}>
            <Ico d={IC.trash} s={14}/> Supprimer définitivement
          </button>
        </div>
      </Modal>
      <div style={{padding:'14px 16px 0'}}>
        {tab==='maison'&&<TabMaison m={m} calc={calc} updM={updM} s={effSettings}/>}
        {tab==='ahmed'&&<TabPersonne who="ahmed" m={m} calc={calc} updM={updM} s={effSettings}/>}
        {tab==='sophie'&&<TabPersonne who="sophie" m={m} calc={calc} updM={updM} s={effSettings}/>}
        {tab==='commun'&&<TabCompteCommun m={m} updM={updM} calc={calc} s={effSettings}/>}
        {tab==='virements'&&<TabVirements calc={calc} m={m} s={effSettings}/>}
        {tab==='peri'&&<TabPeri m={m} updM={updM} s={effSettings}/>}
      </div>
    </div>
  );
};

const Dashboard=({D:appData,setD:setAppData,settings,onNav,lastSync,showToast})=>{
  const ym=curYM();
  const m=appData.months[ym];
  const effS=m&&m.settingsSnapshot?{...settings,...m.settingsSnapshot}:settings;
  const calc=useMemo(()=>m?calcMonth(m,effS):null,[m,effS]);
  const tgt=settings.targetReste||550;
  const totEpargne=(settings.savings||[]).reduce((a,s)=>a+((appData.balances||{})[s.id]||s.bal),0);
  const totCap=(settings.credits||[]).reduce((a,c)=>a+(c.cap||0),0);
  const totMens=(settings.credits||[]).reduce((a,c)=>a+c.mens+(c.ass||0),0);

  return(
    <div style={{padding:'16px 16px 32px',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>

        {lastSync&&(

            <p style={{fontSize:10,color:'var(--tx3)',marginBottom:2}}>Synchro</p>

        <>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="card card-sm">
              <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Budget maison</p>
              <p className="mono" style={{fontSize:24,fontWeight:700,letterSpacing:'-.03em'}}>{eur(calc.maisonTotal)}</p>
              {calc.periTotal>0&&<p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>dont {eur(calc.periTotal)} périscolaire</p>}
            </div>
            <div className="card card-sm">
              <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Delta</p>
              <p className="mono" style={{fontSize:24,fontWeight:700,color:'var(--accent)',letterSpacing:'-.03em'}}>{eur(calc.delta)}</p>
              <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{settings.deltaAuto?'Auto (salaires)':'Fixe configuré'}</p>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="card card-sm" style={{borderColor:calc.aReste>=tgt?'var(--grBrd)':'var(--rdBrd)'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <Ico d={IC.wallet} s={12} c="var(--accent)"/>
                <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--accent)'}}>Reste {settings.identity.person1}</p>
              </div>
              <p className="mono" style={{fontSize:22,fontWeight:700,color:calc.aReste>=tgt?'var(--grB)':'var(--rd)',letterSpacing:'-.03em'}}>{eur(calc.aReste)}</p>
              <div className="pbar" style={{marginTop:8}}>
                <div className="pbar-fill" style={{width:`${Math.min(100,(calc.aReste/tgt)*100)}%`,background:calc.aReste>=tgt?'var(--gr)':'var(--rd)'}}/>
              </div>
            </div>
            <div className="card card-sm" style={{borderColor:calc.sReste>=tgt?'var(--grBrd)':'var(--rdBrd)'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <Ico d={IC.wallet} s={12} c="var(--pu)"/>
                <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--pu)'}}>Reste {settings.identity.person2}</p>
              </div>
              <p className="mono" style={{fontSize:22,fontWeight:700,color:calc.sReste>=tgt?'var(--grB)':'var(--rd)',letterSpacing:'-.03em'}}>{eur(calc.sReste)}</p>
              <div className="pbar" style={{marginTop:8}}>
                <div className="pbar-fill" style={{width:`${Math.min(100,(calc.sReste/tgt)*100)}%`,background:calc.sReste>=tgt?'var(--gr)':'var(--rd)'}}/>
              </div>
            </div>
          </div>
          <div className="card card-sm" style={{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}} onClick={()=>onNav('periscolaire')}>

              <div>
                <p style={{fontSize:13,fontWeight:600,marginBottom:3}}>Périscolaire {mShort(ym)}</p>
                <span className={m.peri.status==='paye'?'badge bg':m.peri.status==='facture'?'badge bb':'badge ba'}>
                  {m.peri.status==='paye'?'✓ Payé':m.peri.status==='facture'?'Facturé':'Estimation'}

            <div style={{textAlign:'right'}}>
              <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--am)'}}>{eur(calc.periTotal)}</p>

          </div>
          <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun budget pour {mShort(ym)}</p>
          <p style={{fontSize:13,color:'var(--tx2)',marginBottom:20}}>Créez le budget du mois pour commencer</p>
          <button className="btn btn-p" onClick={()=>onNav('budget')}><Ico d={IC.plus} s={14}/> Créer le budget</button>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="card card-sm" style={{cursor:'pointer'}} onClick={()=>onNav('epargne')}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
            <Ico d={IC.piggy} s={12} c="var(--grB)"/>
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em'}}>Épargne totale</p>
          </div>
          <p className="mono" style={{fontSize:20,fontWeight:700,color:'var(--grB)',letterSpacing:'-.03em'}}>{eur(totEpargne)}</p>
          <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{settings.savings.length} comptes</p>
        </div>
        <div className="card card-sm" style={{cursor:'pointer'}} onClick={()=>onNav('credits')}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
            <Ico d={IC.card} s={12} c="var(--rd)"/>
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em'}}>Capital restant</p>
          </div>
          <p className="mono" style={{fontSize:20,fontWeight:700,color:'var(--rd)',letterSpacing:'-.03em'}}>{eur(totCap)}</p>
          <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{eur(totMens)}/mois</p>
        </div>
      </div>

      <div className="card card-sm">
        <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Accès rapides</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {[
            {l:'Budget',ic:IC.cal,id:'budget',c:'var(--accent)'},
            {l:'Suivi',ic:IC.chart,id:'suivi',c:'var(--pu)'},
            {l:'Épargne',ic:IC.piggy,id:'epargne',c:'var(--grB)'},
            {l:'Crédits',ic:IC.card,id:'credits',c:'var(--rd)'},
            {l:'Périscolaire',ic:IC.school,id:'periscolaire',c:'var(--am)'},
            {l:'Indicateurs',ic:IC.barChart,id:'indicateurs',c:'var(--cy)'},
          ].map(x=>(
            <button key={x.id} onClick={()=>onNav(x.id)} style={{display:'flex',alignItems:'center',gap:7,padding:'8px 14px',borderRadius:20,background:'var(--surf2)',border:'1.5px solid var(--brd)',color:'var(--tx2)',cursor:'pointer',fontFamily:'var(--font)',fontSize:13,fontWeight:600,transition:'all var(--tr)'}}>
              <Ico d={x.ic} s={13} c={x.c}/>{x.l}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   CREDITS
═══════════════════════════════════════════════════════ */
const Credits=({D:appData,settings})=>{
  const crds=settings.credits||[];
  const totMens=crds.reduce((a,c)=>a+c.mens+(c.ass||0),0);
  const totCap=crds.reduce((a,c)=>a+(c.cap||0),0);
  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.card} title="Crédits" subtitle={`${crds.length} crédits actifs`}/>
      <div style={{padding:'14px 16px 0'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div className="card card-sm card-danger">
            <p style={{fontSize:10,fontWeight:700,color:'var(--rd)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Capital restant</p>
            <p className="mono" style={{fontSize:22,fontWeight:700,color:'var(--rd)',letterSpacing:'-.03em'}}>{eur(totCap)}</p>
          </div>
          <div className="card card-sm">
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Mensualités</p>
            <p className="mono" style={{fontSize:22,fontWeight:700,letterSpacing:'-.03em'}}>{eur(totMens)}</p>
            <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>assurances incluses</p>
          </div>
        </div>
        {crds.map(c=>{
          const left=mLeft(c.fin), p=pctOf(c.init,c.cap);
          return(
            <div key={c.id} className="card" style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div>
                  <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:2}}>{c.name}</p>
                  <p style={{fontSize:12,color:'var(--tx3)'}}>{c.org}</p>
                </div>
                <span className="badge bb">{left} mois</span>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:11,color:'var(--tx3)'}}>{p}% remboursé</span>
                  <span style={{fontSize:11,color:'var(--tx3)'}}>Fin: {new Date(c.fin+'T00:00:00').toLocaleDateString('fr-FR')}</span>
                </div>
                <div className="pbar">
                  <div className="pbar-fill" style={{width:`${p}%`,background:'linear-gradient(90deg,var(--gr),var(--grB))'}}/>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                <div style={{background:'var(--surf2)',borderRadius:8,padding:'10px 12px'}}>
                  <p style={{fontSize:10,color:'var(--tx3)',marginBottom:3,fontWeight:600}}>Mensualité</p>
                  <p className="mono" style={{fontSize:14,fontWeight:700}}>{eurD(c.mens)}</p>
                </div>
                {(c.ass||0)>0&&(
                  <div style={{background:'var(--surf2)',borderRadius:8,padding:'10px 12px'}}>
                    <p style={{fontSize:10,color:'var(--tx3)',marginBottom:3,fontWeight:600}}>Assurance</p>
                    <p className="mono" style={{fontSize:14,fontWeight:700}}>{eurD(c.ass)}</p>
                  </div>
                )}
                <div style={{background:'var(--rdBg)',borderRadius:8,padding:'10px 12px'}}>
                  <p style={{fontSize:10,color:'var(--rd)',marginBottom:3,fontWeight:600}}>Capital dû</p>
                  <p className="mono" style={{fontSize:14,fontWeight:700,color:'var(--rd)'}}>{eur(c.cap)}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   TRACK UTILITY
═══════════════════════════════════════════════════════ */
const CAT_COL={maison:'var(--accent)',peri:'var(--am)',courses:'var(--pu)',savings:'var(--gr)',income:'var(--grB)'};
const CAT_IC={maison:IC.house,peri:IC.school,courses:IC.wallet,savings:IC.piggy,income:IC.trendUp};
const CAT_LBL={maison:'Charges maison',peri:'Périscolaire',courses:'Courses alimentaires',savings:'Épargne',income:'Revenus locatifs'};

const getTrackItems=(m,s)=>{
  const peri=calcPeri(m.peri,s.peri_rates||DEF_SETTINGS.peri_rates);
  const it=[];
  m.maison.items.forEach(x=>{
    if(!x.calc&&(x.val||0)+(x.ass||0)>0)
      it.push({id:'m_'+x.id,label:x.label,planned:(x.val||0)+(x.ass||0),cat:'maison'});
  });
  if(peri>0)it.push({id:'peri',label:'Périscolaire',planned:peri,cat:'peri'});
  if((m.ahmed.courses||0)>0)it.push({id:'crs_a',label:`Courses ${s.identity.person1}`,planned:m.ahmed.courses||0,cat:'courses'});
  if((m.sophie.courses||0)>0)it.push({id:'crs_s',label:`Courses ${s.identity.person2}`,planned:m.sophie.courses||0,cat:'courses'});
  if((m.ahmed.savings||0)>0)it.push({id:'sav_a',label:`Épargne ${s.identity.person1}`,planned:m.ahmed.savings||0,cat:'savings',savingsId:'lv_ahmed'});
  if((m.sophie.savings||0)>0)it.push({id:'sav_s',label:`Épargne ${s.identity.person2}`,planned:m.sophie.savings||0,cat:'savings',savingsId:'lv_sophie'});
  // Épargne Camélia : champ dédié m.epargCam (fallback sur item maison pour mois anciens)
  const camVal = m.epargCam!=null ? m.epargCam :
    ((m.maison.items.find(x=>x.id==='eparg_cam')||(m.maison.items.find(x=>x.label&&x.label.toLowerCase().includes('cam')&&x.nature==='épargne'))||{}).val||0);
  if(camVal>0)it.push({id:'sav_cam',label:`Épargne ${s.identity.child}`,planned:camVal,cat:'savings',savingsId:'la_cam'});
  const cc=m.compteCommun||{};
  if(cc.loyerOk&&(cc.loyer||0)>0)it.push({id:'loyer_in',label:`Loyer → Livret A ${s.identity.person1}`,planned:cc.loyer||0,cat:'income',savingsId:'la_ahmed'});
  // Dépenses ponctuelles
  (m.maison.extra||[]).forEach(e=>{
    it.push({id:'ex_'+e.id,label:e.label+' (ponct.)',planned:e.amount||0,cat:'maison'});
  });
  return it;
};

/* ═══════════════════════════════════════════════════════
   SUIVI MOIS V3
═══════════════════════════════════════════════════════ */
const SuiviMois=({D:appData,setD:setAppData,settings,showToast})=>{
  const[ym,setYm]=useState(curYM());
  const[confirmReset,setConfirmReset]=useState(false);
  const[validModal,setValidModal]=useState(null); // {item, amount}
  const m=appData.months[ym];
  const effS=m&&m.settingsSnapshot?{...settings,...m.settingsSnapshot}:settings;
  const calc=useMemo(()=>m?calcMonth(m,effS):null,[m,effS]);
  const trackItems=useMemo(()=>m?getTrackItems(m,effS):[],[m,effS]);
  const states=m?(m.track&&m.track.states?m.track.states:{}):{};
  const soldeReel=m&&m.track?m.track.soldeReel:null;

  // Click on item: if pending → open modal; if done/partial → undo
  const clickItem=useCallback(item=>{
    const st=(states[item.id]||{status:'pending'}).status;
    if(st==='done'||st==='partial'){
      // Undo: revert to pending
      const actual=(states[item.id]||{}).actual||item.planned;
      setAppData(p=>{
        const mo=p.months[ym]; if(!mo) return p;
        const newSt={...mo.track.states,[item.id]:{status:'pending',actual:null}};
        let newBal={...p.balances};
        let newTxs=[...p.txs];
        if(item.savingsId){
          newBal[item.savingsId]=(newBal[item.savingsId]||0)-actual;
          newTxs=newTxs.filter(t=>t.id!==ym+'_'+item.id);
        }
        return{...p,months:{...p.months,[ym]:{...mo,track:{...mo.track,states:newSt}}},balances:newBal,txs:newTxs};
      });
    } else {
      // Open validation modal with pre-filled planned amount
      setValidModal({item, amount:item.planned});
    }
  },[ym,states,setAppData]);

  const confirmItem=useCallback(()=>{
    if(!validModal) return;
    const{item,amount}=validModal;
    const isPartial=Math.abs(amount-item.planned)>0.01;
    const status=isPartial?'partial':'done';
    const txId=ym+'_'+item.id;
    setAppData(p=>{
      const mo=p.months[ym]; if(!mo) return p;
      const newSt={...mo.track.states,[item.id]:{status,actual:amount}};
      let newBal={...p.balances};
      let newTxs=[...p.txs];
      if(item.savingsId){
        newBal[item.savingsId]=(newBal[item.savingsId]||0)+amount;
        newTxs=newTxs.filter(t=>t.id!==txId);
        newTxs.push({id:txId,ym,date:new Date().toISOString().split('T')[0],accId:item.savingsId,montant:amount,label:item.label,type:'acquittement'});
      }
      return{...p,months:{...p.months,[ym]:{...mo,track:{...mo.track,states:newSt}}},balances:newBal,txs:newTxs};
    });
    setValidModal(null);
  },[validModal,ym,setAppData]);

  const setSoldeReel=useCallback(v=>{
    setAppData(p=>{
      const mo=p.months[ym]; if(!mo) return p;
      return{...p,months:{...p.months,[ym]:{...mo,track:{...mo.track,soldeReel:v}}}};
    });
  },[ym,setAppData]);

  const doReset=()=>{
    const rmTxs=[];
    const balDeltas={};
    trackItems.forEach(item=>{
      const st=states[item.id]||{status:'pending'};
      if((st.status==='done'||st.status==='partial')&&item.savingsId){
        balDeltas[item.savingsId]=(balDeltas[item.savingsId]||0)-(st.actual||item.planned);
        rmTxs.push(ym+'_'+item.id);
      }
    });
    setAppData(p=>{
      const mo=p.months[ym];if(!mo)return p;
      const newBal={...p.balances};
      Object.entries(balDeltas).forEach(([k,v])=>{newBal[k]=(newBal[k]||0)+v;});
      return{...p,months:{...p.months,[ym]:{...mo,track:{states:{},soldeReel:null}}},balances:newBal,txs:p.txs.filter(t=>!rmTxs.includes(t.id))};
    });
    setConfirmReset(false);
    showToast('Suivi réinitialisé','info');
  };

  if(!m)return(
    <div style={{padding:'16px 16px 24px'}}>
      <MNav ym={ym} setYm={setYm}/>
      <div style={{textAlign:'center',padding:'64px 20px'}}>
        <div style={{width:64,height:64,borderRadius:18,background:'var(--accentBg)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
          <Ico d={IC.chart} s={28} c="var(--accent)"/>
        </div>
        <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun budget pour {mFull(ym)}</p>
        <p style={{fontSize:13,color:'var(--tx3)'}}>Créez d'abord le budget dans l'onglet Budget</p>
      </div>
    </div>
  );

  const cats=[...new Set(trackItems.map(x=>x.cat))];
  const doneItems=trackItems.filter(x=>{ const s=states[x.id]||{status:'pending'}; return s.status==='done'||s.status==='partial'; });
  const totalPointe=doneItems.reduce((a,x)=>a+((states[x.id]||{}).actual||x.planned||0),0);
  const totalPrevu=trackItems.reduce((a,x)=>a+(x.planned||0),0);
  const pct=totalPrevu>0?Math.round((totalPointe/totalPrevu)*100):0;
  // V3: restePrevus = sum of pending items
  const pendingItems=trackItems.filter(x=>{ const s=states[x.id]||{status:'pending'}; return s.status==='pending'; });
  const restePrevus=pendingItems.reduce((a,x)=>a+(x.planned||0),0);
  const deltaCompte=soldeReel!=null?(soldeReel-restePrevus):null;

  return(
    <div style={{paddingBottom:32}}>
      <div style={{padding:'16px 16px 14px'}}>
        <MNav ym={ym} setYm={setYm}/>
        {/* Progress bar */}
        <div style={{marginTop:14,padding:'14px 16px',background:'var(--surf)',border:'1.5px solid var(--brd)',borderRadius:14,display:'flex',alignItems:'center',gap:14}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:700,color:'var(--tx2)'}}>{doneItems.length}/{trackItems.length} pointés</span>
              <span style={{fontSize:12,fontWeight:700,color:pct===100?'var(--grB)':'var(--accent)'}}>{pct}%</span>
            </div>
            <div className="pbar" style={{height:7}}>
              <div className="pbar-fill" style={{width:`${pct}%`,background:pct===100?'var(--gr)':'var(--accent)'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
              <span style={{fontSize:11,color:'var(--tx3)'}}>Pointé : {eur(totalPointe)}</span>
              <span style={{fontSize:11,color:'var(--tx3)'}}>Prévu : {eur(totalPrevu)}</span>
            </div>
          </div>
          {pct===100&&<Ico d={IC.check2} s={28} c="var(--grB)"/>}
        </div>
      </div>

      {/* V3: Solde compte commun — nouvelle logique */}
      <div style={{padding:'0 16px',marginBottom:14}}>
        <div className="card card-sm">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <div style={{width:32,height:32,borderRadius:8,background:'var(--accentBg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Ico d={IC.wallet2} s={15} c="var(--accent)"/>
            </div>
            <div>
              <p style={{fontSize:14,fontWeight:700}}>Solde compte commun</p>
              <p style={{fontSize:11,color:'var(--tx3)'}}>Montant réel vu sur votre app bancaire maintenant</p>
            </div>
          </div>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-end',marginBottom:14}}>
            <div style={{flex:1}}>
              <p style={{fontSize:10,color:'var(--tx3)',marginBottom:6,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}>Solde réel (€)</p>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <NI val={soldeReel||0} onChange={v=>setSoldeReel(v||null)} step="1" w="140px" placeholder="Solde bancaire"/>
              </div>
            </div>
            <div>
              <p style={{fontSize:10,color:'var(--tx3)',marginBottom:6,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}>Reste à prélever</p>
              <p className="mono" style={{fontSize:20,fontWeight:700,color:'var(--am)'}}>{eur(restePrevus)}</p>
            </div>
          </div>
          {deltaCompte!=null&&(
            <div style={{padding:'12px 14px',borderRadius:10,background:deltaCompte>=0?'var(--grBg)':'var(--rdBg)',border:`1px solid ${deltaCompte>=0?'var(--grBrd)':'var(--rdBrd)'}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <p style={{fontSize:13,fontWeight:700,color:deltaCompte>=0?'var(--grB)':'var(--rd)'}}>
                  {deltaCompte>=0?'✓ Le compte couvre les dépenses restantes':'⚠ Solde insuffisant pour couvrir le reste'}
                </p>
                <p style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>Solde réel − Reste à prélever</p>
              </div>
              <span className="mono" style={{fontWeight:700,color:deltaCompte>=0?'var(--grB)':'var(--rd)',fontSize:16,flexShrink:0}}>{deltaCompte>=0?'+':''}{eur(deltaCompte)}</span>
            </div>
          )}
        </div>
      </div>

      {/* Items par catégorie */}
      <div style={{padding:'0 16px'}}>
        {cats.map(cat=>{
          const catItems=trackItems.filter(x=>x.cat===cat);
          const catColor=CAT_COL[cat]||'var(--accent)';
          const catLabel=CAT_LBL[cat]||cat;
          const catDone=catItems.filter(x=>{ const s=states[x.id]||{status:'pending'}; return s.status==='done'||s.status==='partial'; }).length;
          return(
            <div key={cat} style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 2px',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <Ico d={CAT_IC[cat]||IC.wallet} s={13} c={catColor}/>
                  <p style={{fontSize:11,fontWeight:700,color:catColor,textTransform:'uppercase',letterSpacing:'.07em'}}>{catLabel}</p>
                </div>
                <span style={{fontSize:11,color:'var(--tx3)',fontWeight:600}}>{catDone}/{catItems.length}</span>
              </div>
              {catItems.map(item=>{
                const st=states[item.id]||{status:'pending'};
                const isDone=st.status==='done';
                const isPartial=st.status==='partial';
                const isActive=isDone||isPartial;
                const actualAmt=st.actual||item.planned;
                return(
                  <div key={item.id} onClick={()=>clickItem(item)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--surf)',border:`1.5px solid ${isActive?catColor+'55':'var(--brd)'}`,borderRadius:12,marginBottom:6,cursor:'pointer',transition:'all var(--tr)',borderLeftWidth:4,borderLeftColor:isActive?catColor:'var(--brd2)'}}>
                    <div style={{width:22,height:22,borderRadius:7,border:`2px solid ${isActive?catColor:'var(--brd)'}`,background:isDone?catColor:isPartial?catColor+'55':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all var(--tr)'}}>
                      {isDone&&<Ico d={IC.chk} s={12} c="#fff" sw={2.5}/>}
                      {isPartial&&<Ico d={IC.halfCheck} s={12} c={catColor} sw={2.5}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:14,fontWeight:isActive?600:500,color:isActive?'var(--tx)':'var(--tx2)',textDecoration:isDone?'line-through':'none'}}>{item.label}</p>
                      {isPartial&&<p style={{fontSize:11,color:catColor,marginTop:2,fontWeight:600}}>Partiellement débité — {eur(actualAmt)} / {eur(item.planned)}</p>}
                      {isDone&&item.savingsId&&<p style={{fontSize:11,color:catColor,marginTop:2}}>✓ Épargne créditée ({eur(actualAmt)})</p>}
                    </div>
                    <span className="mono" style={{fontSize:14,fontWeight:700,color:isActive?catColor:'var(--tx3)',flexShrink:0}}>{eur(item.planned)}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      <div style={{padding:'4px 16px 0',display:'flex',justifyContent:'center'}}>
        <button className="btn btn-d btn-sm" onClick={()=>setConfirmReset(true)}>
          <Ico d={IC.ref} s={13}/> Réinitialiser le suivi
        </button>
      </div>

      {/* Modal validation montant */}
      <Modal open={!!validModal} close={()=>setValidModal(null)} title={validModal?`Valider — ${validModal.item.label}`:''}>
        {validModal&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{padding:'12px 16px',background:'var(--surf2)',borderRadius:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,color:'var(--tx2)'}}>Montant prévu</span>
              <span className="mono" style={{fontWeight:700,fontSize:16}}>{eur(validModal.item.planned)}</span>
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:8}}>Montant réellement débité (€)</label>
              <input type="number" className="ifield" step="0.01"
                value={validModal.amount||''}
                onChange={e=>setValidModal(v=>({...v,amount:parseFloat(e.target.value)||0}))}
                style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700,textAlign:'right'}}
                onFocus={e=>e.target.select()}/>
              {validModal.amount!==validModal.item.planned&&validModal.amount>0&&(
                <p style={{fontSize:12,marginTop:6,color:'var(--am)',fontWeight:600}}>
                  ⚠ Montant ajusté — sera marqué comme partiellement débité
                </p>
              )}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setValidModal(null)}>Annuler</button>
              <button className="btn btn-p" style={{flex:1,justifyContent:'center'}} onClick={confirmItem} disabled={!validModal.amount}>
                <Ico d={IC.chk} s={14}/> Confirmer
              </button>
            </div>
          </div>
        )}
      </Modal>

      <Modal open={confirmReset} close={()=>setConfirmReset(false)} title="Réinitialiser le suivi ?">
        <p style={{color:'var(--tx2)',marginBottom:20,fontSize:14,lineHeight:1.7}}>Tous les pointages de <strong>{mFull(ym)}</strong> seront effacés et les mouvements d'épargne annulés.</p>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setConfirmReset(false)}>Annuler</button>
          <button className="btn btn-d" style={{flex:1,justifyContent:'center'}} onClick={doReset}>Réinitialiser</button>
        </div>
      </Modal>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   ÉPARGNE V4 — navigation par mois + masquage clôturé
═══════════════════════════════════════════════════════ */
const Epargne=({D:appData,setD:setAppData,settings,showToast})=>{
  const[mvtAcc,setMvtAcc]=useState(null);
  const[mvtAmt,setMvtAmt]=useState('');
  const[mvtNote,setMvtNote]=useState('');
  const[viewYm,setViewYm]=useState(curYM());
  const s=settings;
  const accs=s.savings||[];
  const bals=appData.balances||{};

  // Navigation limitée à FROZEN_MONTH minimum
  const setViewYmClamped=ym=>{if(ym>=FROZEN_MONTH)setViewYm(ym);};

  // Calcule le solde d'un compte à la fin du mois viewYm
  const getBalAtMonth=(accId,initBal)=>{
    const cutoff=nextYM(viewYm);
    const movements=(appData.txs||[])
      .filter(t=>t.accId===accId&&t.date<cutoff)
      .reduce((sum,t)=>sum+(t.montant||0),0);
    return Math.round((initBal+movements)*100)/100;
  };

  // Est-ce que le mois consulté est clôturé ?
  const monthData=appData.months[viewYm];
  const isClosed=monthData?.statut==='cloture';
  // Mois courant = pas d'affichage historique
  const isCurrentMonth=viewYm===curYM();
  const isHistorical=viewYm<curYM();
  // Peut-on agir ? Seulement si mois courant ET non clôturé
  const canEdit=!isHistorical&&!isClosed;

  const totEpargne=accs.reduce((a,acc)=>{
    const initBal=acc.bal;
    return a+getBalAtMonth(acc.id,initBal);
  },0);

  const openMvt=(acc,dir)=>{ setMvtAcc({acc,dir}); setMvtAmt(''); setMvtNote(''); };

  const doMvt=()=>{
    const v=parseFloat(mvtAmt);
    if(isNaN(v)||v<=0||!mvtAcc) return;
    const{acc,dir}=mvtAcc;
    const delta=dir==='+'?v:-v;
    const oldBal=bals[acc.id]!=null?bals[acc.id]:acc.bal;
    const newBal=Math.round((oldBal+delta)*100)/100;
    setAppData(p=>({
      ...p,
      balances:{...p.balances,[acc.id]:newBal},
      balanceAdjusts:[...(p.balanceAdjusts||[]),{
        id:'adj_'+Date.now(),accId:acc.id,montant:delta,soldeResultat:newBal,
        date:new Date().toISOString().split('T')[0],note:mvtNote||(dir==='+'?'Versement':'Retrait')
      }],
      txs:[...(p.txs||[]),{
        id:'adj_tx_'+Date.now(),accId:acc.id,montant:delta,
        label:(dir==='+'?'Versement':'Retrait')+(mvtNote?' — '+mvtNote:''),
        date:new Date().toISOString().split('T')[0],type:'ajustement'
      }]
    }));
    showToast(`${dir==='+'?'+':'-'}${eur(v)} sur ${acc.name} ✓`,'success');
    setMvtAcc(null);
  };

  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.piggy} title="Épargne" subtitle={`${accs.length} comptes`}/>
      <div style={{padding:'14px 16px 0'}}>

        {/* Navigation mensuelle */}
        <div style={{marginBottom:14}}>
          <MNav ym={viewYm} setYm={setViewYmClamped}/>
          {isHistorical&&(
            <div style={{marginTop:8,padding:'8px 12px',background:'var(--accentBg)',border:'1px solid var(--accentBrd)',borderRadius:8,display:'flex',alignItems:'center',gap:6}}>
              <Ico d={IC.eye} s={13} c="var(--accent)"/>
              <span style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>Vue historique — soldes reconstitués au {mFull(viewYm)}</span>
            </div>
          )}
          {isClosed&&!isHistorical&&(
            <div style={{marginTop:8,padding:'8px 12px',background:'var(--amBg)',border:'1px solid var(--amBrd)',borderRadius:8,display:'flex',alignItems:'center',gap:6}}>
              <Ico d={IC.lock} s={13} c="var(--am)"/>
              <span style={{fontSize:12,color:'var(--am)',fontWeight:600}}>Mois clôturé — lecture seule</span>
            </div>
          )}
        </div>

        {/* Total épargne */}
        <div style={{padding:'22px 20px',background:'var(--surf)',border:'1.5px solid var(--brd)',borderRadius:18,marginBottom:16,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:-30,right:-30,width:140,height:140,borderRadius:'50%',background:'var(--grBg)',filter:'blur(30px)',pointerEvents:'none'}}/>
          <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Épargne totale</p>
          <p className="mono" style={{fontSize:38,fontWeight:800,color:'var(--grB)',letterSpacing:'-.05em',lineHeight:1}}>{eur(totEpargne)}</p>
          <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
            <span className="badge bg">{accs.length} compte{accs.length>1?'s':''}</span>
            <span className="badge bw">{isHistorical?`Vue au ${mShort(viewYm)}`:`Référence : ${mShort(FROZEN_MONTH)}`}</span>
          </div>
        </div>

        {accs.map(acc=>{
          const initBal=acc.bal;
          const bal=getBalAtMonth(acc.id,initBal);
          // Transactions du mois consulté uniquement (pour affichage)
          const cutoff=nextYM(viewYm);
          const monthStart=viewYm+'-01';
          const accTxsMonth=(appData.txs||[]).filter(t=>t.accId===acc.id&&t.date>=monthStart&&t.date<cutoff).slice(-5).reverse();
          const showMovements=!isClosed&&accTxsMonth.length>0;

          return(
            <div key={acc.id} className="card" style={{marginBottom:12,borderLeft:`4px solid ${acc.color||'var(--accent)'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
                <div>
                  <p style={{fontSize:16,fontWeight:700,letterSpacing:'-.02em',marginBottom:3}}>{acc.name}</p>
                  {acc.monthly>0&&<p style={{fontSize:12,color:'var(--tx3)'}}>Versement mensuel : {eur(acc.monthly)}</p>}
                </div>
                {canEdit&&(
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-gr btn-sm" onClick={()=>openMvt(acc,'+')}>
                      <Ico d={IC.plus} s={13}/> Ajouter
                    </button>
                    <button className="btn btn-d btn-sm" onClick={()=>openMvt(acc,'-')}>
                      <Ico d={IC.minus} s={13}/> Retirer
                    </button>
                  </div>
                )}
              </div>
              <div style={{padding:'16px',background:'var(--surf2)',borderRadius:12,marginBottom:showMovements?12:0}}>
                <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>
                  {isHistorical?`Solde estimé — ${mShort(viewYm)}`:'Solde actuel'}
                </p>
                <p className="mono" style={{fontSize:30,fontWeight:800,color:acc.color||'var(--grB)',letterSpacing:'-.04em'}}>{eur(bal)}</p>
              </div>
              {showMovements&&(
                <div>
                  <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Mouvements du mois</p>
                  {accTxsMonth.map(t=>(
                    <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'var(--surf2)',borderRadius:9,marginBottom:4}}>
                      <div>
                        <p style={{fontSize:13,fontWeight:500}}>{t.label}</p>
                        <p style={{fontSize:11,color:'var(--tx3)'}}>{t.date}</p>
                      </div>
                      <span className="mono" style={{fontSize:13,fontWeight:700,color:(t.montant||0)>=0?'var(--grB)':'var(--rd)'}}>{(t.montant||0)>=0?'+':''}{eur(t.montant)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Modal mouvement */}
      <Modal open={!!mvtAcc} close={()=>setMvtAcc(null)} title={mvtAcc?`${mvtAcc.dir==='+'?'Ajouter sur':'Retirer de'} ${mvtAcc.acc.name}`:''}>
        {mvtAcc&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{padding:'14px 16px',background:mvtAcc.dir==='+'?'var(--grBg)':'var(--rdBg)',borderRadius:12,border:`1px solid ${mvtAcc.dir==='+'?'var(--grBrd)':'var(--rdBrd)'}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <p style={{fontSize:11,color:'var(--tx3)',fontWeight:600,marginBottom:2}}>Solde actuel</p>
                <p className="mono" style={{fontSize:22,fontWeight:700,color:mvtAcc.acc.color||'var(--grB)'}}>{eur(bals[mvtAcc.acc.id]!=null?bals[mvtAcc.acc.id]:mvtAcc.acc.bal)}</p>
              </div>
              <div style={{width:38,height:38,borderRadius:10,background:mvtAcc.dir==='+'?'var(--grBg)':'var(--rdBg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Ico d={mvtAcc.dir==='+'?IC.up:IC.dn} s={20} c={mvtAcc.dir==='+'?'var(--grB)':'var(--rd)'}/>
              </div>
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:8}}>Montant du {mvtAcc.dir==='+'?'versement':'retrait'} (€)</label>
              <input type="number" className="ifield" step="0.01" min="0"
                value={mvtAmt} onChange={e=>setMvtAmt(e.target.value)}
                style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,textAlign:'right'}}
                onFocus={e=>e.target.select()} placeholder="0"/>
              {mvtAmt&&!isNaN(parseFloat(mvtAmt))&&(()=>{
                const old=bals[mvtAcc.acc.id]!=null?bals[mvtAcc.acc.id]:mvtAcc.acc.bal;
                const delta=mvtAcc.dir==='+'?parseFloat(mvtAmt):-parseFloat(mvtAmt);
                return<p style={{fontSize:12,marginTop:6,fontWeight:700,color:delta>=0?'var(--grB)':'var(--rd)'}}>Nouveau solde : {eur(old+delta)}</p>;
              })()}
            </div>
            <div>
              <label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:8}}>Motif (optionnel)</label>
              <input className="ifield" value={mvtNote} onChange={e=>setMvtNote(e.target.value)} placeholder="Ex: Virement mensuel, retrait vacances..."/>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setMvtAcc(null)}>Annuler</button>
              <button className={`btn ${mvtAcc.dir==='+'?'btn-gr':'btn-d'}`} style={{flex:1,justifyContent:'center'}} onClick={doMvt} disabled={!mvtAmt||isNaN(parseFloat(mvtAmt))||parseFloat(mvtAmt)<=0}>
                <Ico d={mvtAcc.dir==='+'?IC.up:IC.dn} s={14}/> Confirmer {mvtAcc.dir==='+'?'versement':'retrait'}
              </button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
};



/* ═══════════════════════════════════════════════════════
   PÉRISCOLAIRE V3
═══════════════════════════════════════════════════════ */
const Periscolaire=({D:appData,settings})=>{
  const availYears=useMemo(()=>getAvailableYears(appData.months),[appData.months]);
  const[anneePeri,setAnneePeri]=useState(()=>new Date().getFullYear());

  const mois=useMemo(()=>Object.entries(appData.months||{})
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([ym,m])=>{
      const effS=m.settingsSnapshot?{...settings,...m.settingsSnapshot}:settings;
      const total=calcPeri(m.peri,effS.peri_rates);
      return{ym,total,status:m.peri?.status||'estimation',facture:m.peri?.facture,peri:m.peri};
    })
    .filter(x=>x.total>0||x.facture>0),[appData.months,settings]);

  // Projection épargne périscolaire
  const periAcc = settings.periSavingsId ? (settings.savings||[]).find(a=>a.id===settings.periSavingsId) : null;
  const periBalance = periAcc ? ((appData.balances||{})[periAcc.id]!=null?(appData.balances||{})[periAcc.id]:periAcc.bal) : null;
  // Mois non payés = tout ce qui n'est pas au statut 'paye'
  // Pour le montant à payer : on utilise la facture réelle si > 0, sinon l'estimation
  const moisNonPayes = mois.filter(m=>m.status!=='paye');
  const totalNonPaye = moisNonPayes.reduce((a,m)=>{
    const montant = (m.facture!=null && m.facture>0) ? m.facture : m.total;
    return a + montant;
  }, 0);
  const soldeProjecte = periBalance!=null ? periBalance - totalNonPaye : null;

  if(!mois.length)return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.school} title="Périscolaire" subtitle="Suivi des frais de garde"/>
      <div style={{textAlign:'center',padding:'64px 24px'}}>
        <div style={{width:64,height:64,borderRadius:18,background:'var(--amBg)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
          <Ico d={IC.school} s={28} c="var(--am)"/>
        </div>
        <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucune donnée périscolaire</p>
        <p style={{fontSize:13,color:'var(--tx3)'}}>Renseignez les prestations dans Budget → Périscolaire</p>
      </div>
    </div>
  );

  const moisAnnee=mois.filter(m=>m.ym.startsWith(String(anneePeri)));
  const ST={estimation:{l:'Estimation',cl:'ba'},facture:{l:'Facturé',cl:'bb'},ecart:{l:'Écart',cl:'ba'},paye:{l:'Payé ✓',cl:'bg'}};

  // Cumul des deltas (provision - facture) sur les mois où on a la facture
  const moisAvecFacture=moisAnnee.filter(m=>m.facture!=null);
  const cumulDelta=moisAvecFacture.reduce((a,m)=>a+(m.total-(m.facture||0)),0);
  const totEstimAnnee=moisAnnee.reduce((a,m)=>a+m.total,0);
  const totPayeAnnee=moisAnnee.reduce((a,m)=>a+(m.facture||m.total),0);
  const totDeltaAnnee=moisAnnee.reduce((a,m)=>{
    if(m.facture!=null) return a+(m.total-m.facture);
    return a;
  },0);

  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.school} title="Périscolaire" subtitle="Suivi des frais de garde"/>
      {availYears.length>1&&(
        <div style={{padding:'12px 16px 0',display:'flex',gap:6,overflowX:'auto'}}>
          {availYears.map(y=>(
            <button key={y} onClick={()=>setAnneePeri(Number(y))} className={`tabbtn ${Number(y)===anneePeri?'tabbtn-a':'tabbtn-i'}`} style={{fontSize:13}}>{y}</button>
          ))}
        </div>
      )}
      <div style={{padding:'14px 16px 0'}}>

        {/* KPIs annuels */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div className="card card-sm">
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Total {anneePeri}</p>
            <p className="mono" style={{fontSize:22,fontWeight:700,color:'var(--am)'}}>{eur(totPayeAnnee)}</p>
            <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>{moisAnnee.length} mois</p>
          </div>
          <div className="card card-sm">
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Tarifs actuels</p>
            {Object.entries(settings.peri_rates||{}).map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                <span style={{fontSize:11,color:'var(--tx3)',textTransform:'capitalize'}}>{k}</span>
                <span className="mono" style={{fontSize:11,color:'var(--am)',fontWeight:600}}>{v}€</span>
              </div>
            ))}
          </div>
        </div>

        {/* Projection solde compte périscolaire */}
        {periAcc&&(
          <div className="card card-sm" style={{marginBottom:14,borderColor:soldeProjecte!=null&&soldeProjecte>=0?'var(--grBrd)':'var(--rdBrd)',background:soldeProjecte!=null&&soldeProjecte>=0?'var(--grBg)':'var(--rdBg)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <Ico d={IC.piggy} s={14} c={soldeProjecte!=null&&soldeProjecte>=0?'var(--grB)':'var(--rd)'}/>
              <p style={{fontSize:12,fontWeight:700,color:soldeProjecte!=null&&soldeProjecte>=0?'var(--grB)':'var(--rd)',textTransform:'uppercase',letterSpacing:'.05em'}}>Projection — {periAcc.name}</p>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              <div style={{background:'var(--surf)',borderRadius:8,padding:'10px 12px'}}>
                <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600,marginBottom:4}}>Solde actuel</p>
                <p className="mono" style={{fontSize:15,fontWeight:700,color:'var(--accent)'}}>{eur(periBalance)}</p>
              </div>
              <div style={{background:'var(--surf)',borderRadius:8,padding:'10px 12px'}}>
                <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600,marginBottom:4}}>Reste à payer</p>
                <p className="mono" style={{fontSize:15,fontWeight:700,color:'var(--am)'}}>{eur(totalNonPaye)}</p>
                <p style={{fontSize:9,color:'var(--tx3)',marginTop:2}}>{moisNonPayes.length} mois</p>
              </div>
              <div style={{background:'var(--surf)',borderRadius:8,padding:'10px 12px'}}>
                <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600,marginBottom:4}}>Solde projeté</p>
                <p className="mono" style={{fontSize:15,fontWeight:700,color:soldeProjecte>=0?'var(--grB)':'var(--rd)'}}>{eur(soldeProjecte)}</p>
              </div>
            </div>
            <p style={{fontSize:11,color:'var(--tx3)',marginTop:8,lineHeight:1.5}}>
              {soldeProjecte>=0
                ?`✓ Le compte couvre tous les mois non payés avec ${eur(soldeProjecte)} de marge.`
                :`⚠ Il manque ${eur(Math.abs(soldeProjecte||0))} pour couvrir tous les mois non payés.`
              }
            </p>
          </div>
        )}
        {!periAcc&&(
          <div className="card card-sm" style={{marginBottom:14,background:'var(--amBg)',borderColor:'var(--amBrd)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <Ico d={IC.info} s={14} c="var(--am)"/>
              <p style={{fontSize:12,color:'var(--am)',fontWeight:600}}>Liez un compte épargne dans Paramétrage → Périscolaire pour voir la projection de solde.</p>
            </div>
          </div>
        )}

        {/* Cumul delta */}
        {moisAvecFacture.length>0&&(
          <div className="card card-sm" style={{marginBottom:14,borderColor:cumulDelta>=0?'var(--grBrd)':'var(--rdBrd)',background:cumulDelta>=0?'var(--grBg)':'var(--rdBg)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:cumulDelta>=0?'var(--grB)':'var(--rd)',marginBottom:4}}>
                  {cumulDelta>=0?'Économie cumulée':'Déficit cumulé'}
                </p>
                <p style={{fontSize:12,color:'var(--tx3)'}}>Provision − Factures ({moisAvecFacture.length} mois)</p>
              </div>
              <p className="mono" style={{fontSize:26,fontWeight:800,color:cumulDelta>=0?'var(--grB)':'var(--rd)'}}>{cumulDelta>=0?'+':''}{eur(cumulDelta)}</p>
            </div>
            <div className="sep" style={{marginTop:10,marginBottom:10}}/>
            <p style={{fontSize:12,color:'var(--tx2)'}}>
              {cumulDelta>=0
                ?`Vous avez over-provisionné. Ce solde peut couvrir les futures factures.`
                :`Vous avez sous-provisionné. Vérifiez la provision mensuelle.`
              }
            </p>
          </div>
        )}

        {/* Tableau annuel : Estimé / Payé / Delta */}
        {moisAnnee.length>0&&(
          <div className="card" style={{marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Ico d={IC.barChart} s={15} c="var(--am)"/>
              <p style={{fontSize:13,fontWeight:700}}>Bilan annuel {anneePeri}</p>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 80px',gap:4,marginBottom:8}}>
              {['Mois','Estimé','Payé','Delta'].map(h=>(
                <span key={h} style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',textAlign:h==='Mois'?'left':'right'}}>{h}</span>
              ))}
            </div>
            {moisAnnee.map(m=>{
              const delta=m.facture!=null?m.total-m.facture:null;
              const deltaColor=delta==null?'var(--tx3)':delta>=0?'var(--grB)':'var(--rd)';
              return(
                <div key={m.ym} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 80px',gap:4,padding:'8px 4px',borderBottom:'1px solid var(--brd2)',alignItems:'center'}}>
                  <span style={{fontSize:13,fontWeight:500}}>{mShort(m.ym)}</span>
                  <span className="mono" style={{fontSize:12,fontWeight:600,textAlign:'right',color:'var(--am)'}}>{eur(m.total)}</span>
                  <span className="mono" style={{fontSize:12,fontWeight:600,textAlign:'right'}}>{m.facture!=null?eur(m.facture):'—'}</span>
                  <span className="mono" style={{fontSize:12,fontWeight:700,textAlign:'right',color:deltaColor}}>{delta!=null?(delta>=0?'+':'')+eur(delta):'—'}</span>
                </div>
              );
            })}
            <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 80px',gap:4,padding:'10px 4px 2px',alignItems:'center'}}>
              <span style={{fontSize:12,fontWeight:700,color:'var(--tx3)'}}>Total</span>
              <span className="mono" style={{fontSize:13,fontWeight:700,textAlign:'right',color:'var(--am)'}}>{eur(totEstimAnnee)}</span>
              <span className="mono" style={{fontSize:13,fontWeight:700,textAlign:'right'}}>{eur(totPayeAnnee)}</span>
              <span className="mono" style={{fontSize:13,fontWeight:700,textAlign:'right',color:totDeltaAnnee>=0?'var(--grB)':'var(--rd)'}}>{totDeltaAnnee>=0?'+':''}{eur(totDeltaAnnee)}</span>
            </div>
          </div>
        )}

        {/* Historique mensuel */}
        <div className="card">
          <p style={{fontSize:13,fontWeight:700,letterSpacing:'-.02em',marginBottom:12}}>Historique mensuel</p>
          {[...mois].reverse().map(m=>{
            const st=ST[m.status]||ST.estimation;
            // V3: delta = provision - facture (positif = bien)
            const delta=m.facture!=null?(m.total-m.facture):null;
            return(
              <div key={m.ym} style={{padding:'12px 14px',background:'var(--surf2)',borderRadius:12,marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:14,fontWeight:700}}>{mFull(m.ym)}</span>
                    <span className={`badge ${st.cl}`}>{st.l}</span>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <p className="mono" style={{fontSize:15,fontWeight:700,color:'var(--am)'}}>{m.facture!=null?eur(m.facture):eur(m.total)}</p>
                    {m.facture!=null&&<p style={{fontSize:11,color:'var(--tx3)'}}>estimé: {eur(m.total)}</p>}
                  </div>
                </div>
                {delta!==null&&Math.abs(delta)>0.5&&(
                  <div style={{padding:'5px 10px',borderRadius:8,background:delta>=0?'var(--grBg)':'var(--rdBg)',fontSize:12,fontWeight:700,color:delta>=0?'var(--grB)':'var(--rd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span>{delta>=0?'Économie :':'Dépassement :'}</span>
                    <span>{delta>=0?'+':''}{eurD(delta)}</span>
                  </div>
                )}
                <div style={{display:'flex',gap:12,marginTop:8,flexWrap:'wrap'}}>
                  {[['matin',m.peri.matin||0],['midi',m.peri.midi||0],['soir',m.peri.soir||0],['journée',m.peri.journee||0]].filter(([,n])=>n>0).map(([l,n])=>(
                    <span key={l} style={{fontSize:11,color:'var(--tx3)',background:'var(--surf)',padding:'2px 8px',borderRadius:6}}>{l}: {n}×</span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   PARAMÉTRAGE V3
═══════════════════════════════════════════════════════ */
const Parametrage=({D:appData,setD:setAppData,showToast})=>{
  const[sec,setSec]=useState('identity');
  const s=appData.settings;
  const updS=fn=>setAppData(p=>({...p,settings:fn(p.settings)}));

  const SECS=[
    {id:'identity',l:'Identité',ic:IC.home},
    {id:'delta',l:'Rééquilibrage',ic:IC.activity},
    {id:'maison',l:'Maison',ic:IC.house},
    {id:'peri',l:'Périscolaire',ic:IC.school},
    {id:'savings',l:'Épargne',ic:IC.piggy},
    {id:'credits',l:'Crédits',ic:IC.card},
    {id:'vacances',l:'Vacances',ic:IC.beach},
  ];

  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.gear} title="Paramétrage" subtitle="Modifications applicables aux mois futurs"/>
      <div style={{overflowX:'auto',padding:'12px 16px 14px',display:'flex',gap:6}}>
        {SECS.map(x=>(
          <button key={x.id} className={`tabbtn ${sec===x.id?'tabbtn-a':'tabbtn-i'}`} onClick={()=>setSec(x.id)}>
            <Ico d={x.ic} s={13}/> {x.l}
          </button>
        ))}
      </div>
      <div style={{padding:'0 16px'}}>

        {sec==='identity'&&(
          <div className="card fade">
            <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:16}}>Identité du foyer</p>
            {[{k:'person1',l:'Personne 1'},{k:'person2',l:'Personne 2'},{k:'child',l:'Enfant'}].map(f=>(
              <div key={f.k} style={{marginBottom:14}}>
                <label style={{fontSize:13,color:'var(--tx2)',display:'block',marginBottom:6,fontWeight:500}}>{f.l}</label>
                <input className="ifield" value={s.identity[f.k]} onChange={e=>updS(st=>({...st,identity:{...st.identity,[f.k]:e.target.value}}))}/>
              </div>
            ))}
          </div>
        )}

        {sec==='delta'&&(
          <div className="card fade">
            <p style={{fontSize:15,fontWeight:700,letterSpacing:'-.02em',marginBottom:16}}>Rééquilibrage</p>
