/* ═══════════════════════════════════════════════════════
   VACANCES V4 — Fix focus + édition activités
═══════════════════════════════════════════════════════ */
// Composant isolé pour la saisie d'activité — évite la perte de focus lors du re-render parent
const ActivityInputRow=({onAdd})=>{
  const[name,setName]=useState('');
  const[amount,setAmount]=useState(0);
  const handleAdd=()=>{
    if(!name||!amount)return;
    onAdd({name,amount});
    setName('');
    setAmount(0);
  };
  return(
    <div style={{display:'flex',gap:8,marginTop:10}}>
      <input className="ifield" value={name} onChange={e=>setName(e.target.value)}
        placeholder="Nom (hôtel, vols, excursions...)"
        onKeyDown={e=>{if(e.key==='Enter'&&name&&amount)handleAdd();}}/>
      <NI val={amount} onChange={v=>setAmount(v)} w="90px" placeholder="€"/>
      <button className="btn btn-p btn-sm" onClick={handleAdd} disabled={!name||!amount}><Ico d={IC.plus} s={13}/></button>
    </div>
  );
};

const Vacances=({D:appData,setD:setAppData,settings,showToast})=>{
  const[newPot,setNewPot]=useState(false);
  const[editPot,setEditPot]=useState(null);
  const[pForm,setPForm]=useState({name:'',color:'#4F8EF7',emoji:'🌴',linkedSavingsId:'',dateVacances:'',objectif:0});
  const pots=settings.vacances||[];
  const txs=appData.vacancesTxs||[];
  const bals=appData.balances||{};
  const accs=settings.savings||[];

  const addPot=()=>{
    if(!pForm.name)return;
    const id='pot_'+Date.now();
    const pot={id,name:pForm.name,emoji:pForm.emoji||'🌴',color:pForm.color||'#4F8EF7',linkedSavingsId:pForm.linkedSavingsId||null,dateVacances:pForm.dateVacances||null,objectif:pForm.objectif||0,activities:[],cloture:false,createdAt:new Date().toISOString()};
    setAppData(p=>({...p,settings:{...p.settings,vacances:[...(p.settings.vacances||[]),pot]}}));
    setNewPot(false);
    setPForm({name:'',color:'#4F8EF7',emoji:'🌴',linkedSavingsId:'',dateVacances:'',objectif:0});
    showToast('Pot créé ✓','success');
  };

  const delPot=id=>{
    setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).filter(x=>x.id!==id)},vacancesTxs:(p.vacancesTxs||[]).filter(t=>t.potId!==id)}));
    showToast('Pot supprimé','info');
  };

  const toggleCloture=id=>{
    setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(pot=>pot.id===id?{...pot,cloture:!pot.cloture}:pot)}}));
    const pot=pots.find(x=>x.id===id);
    showToast(pot?.cloture?'Pot réouvert ✓':'Pot clôturé ✓','success');
  };

  const addActivity=(potId,act)=>{
    setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(pot=>{
      if(pot.id!==potId)return pot;
      const acts=[...(pot.activities||[]),{id:'act_'+Date.now(),...act}];
      return{...pot,activities:acts,objectif:acts.reduce((s,a)=>s+a.amount,0)};
    })}}));
    showToast('Activité ajoutée ✓','success');
  };

  const delActivity=(potId,actId)=>{
    setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(pot=>{
      if(pot.id!==potId)return pot;
      const acts=(pot.activities||[]).filter(a=>a.id!==actId);
      return{...pot,activities:acts,objectif:acts.reduce((s,a)=>s+a.amount,0)};
    })}}));
  };

  const updateActivity=(potId,actId,changes)=>{
    setAppData(p=>({...p,settings:{...p.settings,vacances:(p.settings.vacances||[]).map(pot=>{
      if(pot.id!==potId)return pot;
      const acts=(pot.activities||[]).map(a=>a.id===actId?{...a,...changes}:a);
      return{...pot,activities:acts,objectif:acts.reduce((s,a)=>s+a.amount,0)};
    })}}));
    showToast('Activité modifiée ✓','success');
  };

  const activePots=pots.filter(p=>!p.cloture);
  const closedPots=pots.filter(p=>p.cloture);

  const PotCard=({pot})=>{
    const[editActId,setEditActId]=useState(null);
    const[editName,setEditName]=useState('');
    const[editAmt,setEditAmt]=useState(0);
    const ptxs=txs.filter(t=>t.potId===pot.id).sort((a,b)=>b.date.localeCompare(a.date));
    const budgetPrevisionnel=pot.objectif||(pot.activities||[]).reduce((s,a)=>s+a.amount,0);
    const linkedAcc=accs.find(a=>a.id===pot.linkedSavingsId);
    const linkedBal=linkedAcc?(bals[linkedAcc.id]!=null?bals[linkedAcc.id]:linkedAcc.bal):null;
    const pct=budgetPrevisionnel>0?Math.min(100,Math.round((linkedBal!=null?linkedBal:0)/budgetPrevisionnel*100)):0;
    const deficit=budgetPrevisionnel>0&&linkedBal!=null?linkedBal-budgetPrevisionnel:null;
    const moisRestants=pot.dateVacances?monthsUntil(pot.dateVacances):null;
    const manque=linkedBal!=null&&budgetPrevisionnel>0?Math.max(0,budgetPrevisionnel-linkedBal):null;
    const mensuelNecessaire=manque!=null&&moisRestants!=null&&moisRestants>0?Math.ceil(manque/moisRestants):null;
    const isEditing=editPot===pot.id;

    const startEdit=act=>{setEditActId(act.id);setEditName(act.name);setEditAmt(act.amount);};
    const saveEdit=()=>{if(!editName||!editAmt)return;updateActivity(pot.id,editActId,{name:editName,amount:editAmt});setEditActId(null);};

    return(
      <div className="card" style={{marginBottom:16,borderLeft:`4px solid ${pot.color}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <span style={{fontSize:22}}>{pot.emoji}</span>
              <p style={{fontSize:17,fontWeight:800,letterSpacing:'-.02em'}}>{pot.name}</p>
              {pot.cloture&&<span className="badge bg">Clôturé</span>}
            </div>
            {pot.dateVacances&&(
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <Ico d={IC.flag} s={12} c="var(--tx3)"/>
                <span style={{fontSize:12,color:'var(--tx3)'}}>Vacances prévues : {mFull(pot.dateVacances)}</span>
                {moisRestants!=null&&<span className="badge bb" style={{fontSize:10}}>{moisRestants} mois</span>}
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            <button className="btn btn-g btn-icon" onClick={()=>setEditPot(isEditing?null:pot.id)} title="Activités">
              <Ico d={IC.activity} s={14} c={isEditing?'var(--accent)':'var(--tx3)'}/>
            </button>
            <button className="btn btn-g btn-icon" onClick={()=>toggleCloture(pot.id)}>
              <Ico d={pot.cloture?IC.lock:IC.chk} s={14}/>
            </button>
            {!pot.cloture&&<button className="btn btn-d btn-icon" onClick={()=>delPot(pot.id)}><Ico d={IC.trash} s={14}/></button>}
          </div>
        </div>

        {linkedAcc&&(
          <div style={{padding:'10px 14px',background:'var(--accentBg)',borderRadius:10,border:'1px solid var(--accentBrd)',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><Ico d={IC.link} s={13} c="var(--accent)"/><span style={{fontSize:13,color:'var(--accent)',fontWeight:600}}>{linkedAcc.name}</span></div>
            <span className="mono" style={{fontWeight:700,fontSize:15,color:'var(--accent)'}}>{eur(linkedBal)}</span>
          </div>
        )}

        {budgetPrevisionnel>0&&(
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:600,color:'var(--tx2)'}}>Budget prévisionnel</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="mono" style={{fontSize:18,fontWeight:800,color:pot.color}}>{eur(budgetPrevisionnel)}</span>
                <span className={pct>=100?'badge bg':pct>=50?'badge ba':'badge br'}>{pct}%</span>
              </div>
            </div>
            <div className="pbar" style={{height:8}}><div className="pbar-fill" style={{width:`${pct}%`,background:pot.color}}/></div>
            {deficit!=null&&(
              <div style={{marginTop:8,padding:'8px 12px',borderRadius:8,background:deficit>=0?'var(--grBg)':'var(--rdBg)',border:`1px solid ${deficit>=0?'var(--grBrd)':'var(--rdBrd)'}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:deficit>=0?'var(--grB)':'var(--rd)',fontWeight:600}}>{deficit>=0?'Budget disponible ✓':'Manque à couvrir'}</span>
                <span className="mono" style={{fontWeight:700,color:deficit>=0?'var(--grB)':'var(--rd)',fontSize:14}}>{deficit>=0?'+':''}{eur(deficit)}</span>
              </div>
            )}
          </div>
        )}

        {mensuelNecessaire!=null&&moisRestants>0&&(
          <div style={{padding:'10px 14px',background:'var(--amBg)',borderRadius:10,border:'1px solid var(--amBrd)',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><p style={{fontSize:12,fontWeight:700,color:'var(--am)'}}>À épargner par mois</p><p style={{fontSize:11,color:'var(--tx3)'}}>Pour atteindre l'objectif en {moisRestants} mois</p></div>
            <span className="mono" style={{fontWeight:800,color:'var(--am)',fontSize:20}}>{eur(mensuelNecessaire)}/mois</span>
          </div>
        )}

        {/* Panel activités — V4: composant isolé + édition inline */}
        {isEditing&&(
          <div style={{padding:'12px 14px',background:'var(--surf2)',borderRadius:12,marginBottom:12,border:'1.5px solid var(--accentBrd)'}}>
            <p style={{fontSize:12,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Budget par activité</p>
            {(pot.activities||[]).length===0&&<p style={{fontSize:12,color:'var(--tx3)',marginBottom:10}}>Aucune activité. Ajoutez des postes ci-dessous.</p>}
            {(pot.activities||[]).map(act=>(
              <div key={act.id} style={{marginBottom:4}}>
                {editActId===act.id?(
                  <div style={{display:'flex',gap:8,padding:'6px',background:'var(--accentBg)',borderRadius:8,border:'1px solid var(--accentBrd)'}}>
                    <input className="ifield" value={editName} onChange={e=>setEditName(e.target.value)} style={{flex:1,fontSize:13}} autoFocus/>
                    <NI val={editAmt} onChange={v=>setEditAmt(v)} w="80px"/>
                    <button className="btn btn-p btn-icon" style={{padding:6}} onClick={saveEdit}><Ico d={IC.chk} s={13}/></button>
                    <button className="btn btn-s btn-icon" style={{padding:6}} onClick={()=>setEditActId(null)}><Ico d={IC.x} s={13}/></button>
                  </div>
                ):(
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--surf)',borderRadius:8}}>
                    <span style={{fontSize:13,fontWeight:500}}>{act.name}</span>
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <span className="mono" style={{fontSize:13,fontWeight:700}}>{eur(act.amount)}</span>
                      <button className="btn btn-g btn-icon" style={{padding:4}} onClick={()=>startEdit(act)}><Ico d={IC.pen} s={12}/></button>
                      <button className="btn btn-d btn-icon" style={{padding:4}} onClick={()=>delActivity(pot.id,act.id)}><Ico d={IC.x} s={12}/></button>
                    </div>
                  </div>
                )}
              </div>
            ))}
            <ActivityInputRow onAdd={act=>addActivity(pot.id,act)}/>
          </div>
        )}

        {ptxs.length>0&&(
          <div>
            <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Mouvements</p>
            {ptxs.slice(0,3).map(t=>(
              <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--surf2)',borderRadius:8,marginBottom:4}}>
                <div><p style={{fontSize:13,fontWeight:500}}>{t.label||'Transaction'}</p><p style={{fontSize:11,color:'var(--tx3)'}}>{t.date}</p></div>
                <span className="mono" style={{fontSize:13,fontWeight:700,color:t.cat==='depense'?'var(--rd)':'var(--grB)'}}>{t.cat==='depense'?'−':'+' }{eur(t.montant)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.beach} title="Vacances"
        subtitle={`${activePots.length} projet${activePots.length>1?'s':''} actif${activePots.length>1?'s':''}`}
        action={<button className="btn btn-p btn-sm" onClick={()=>setNewPot(true)}><Ico d={IC.plus} s={13}/> Nouveau pot</button>}
      />
      <div style={{padding:'14px 16px 0'}}>
        {pots.length===0&&(
          <div style={{textAlign:'center',padding:'48px 24px',background:'var(--surf)',border:'2px dashed var(--brd)',borderRadius:16}}>
            <div style={{width:72,height:72,borderRadius:20,background:'var(--orBg)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}><Ico d={IC.beach} s={32} c="var(--or)"/></div>
            <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucun pot vacances</p>
            <p style={{fontSize:13,color:'var(--tx3)',marginBottom:20}}>Créez des pots par destination et liez-les à un compte épargne.</p>
            <button className="btn btn-p" onClick={()=>setNewPot(true)}><Ico d={IC.plus} s={14}/> Créer un pot</button>
          </div>
        )}
        {activePots.map(pot=><PotCard key={pot.id} pot={pot}/>)}
        {closedPots.length>0&&(
          <div style={{marginTop:8}}>
            <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10,paddingLeft:4}}>Projets clôturés</p>
            {closedPots.map(pot=><PotCard key={pot.id} pot={pot}/>)}
          </div>
        )}
      </div>
      <Modal open={newPot} close={()=>setNewPot(false)} title="Nouveau pot vacances">
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Nom du projet</label>
            <input className="ifield" value={pForm.name} placeholder="Ex: Grèce Été 2026" onChange={e=>setPForm(p=>({...p,name:e.target.value}))}/></div>
          <div style={{display:'flex',gap:12}}>
            <div style={{flex:1}}><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Emoji</label>
              <input className="ifield" value={pForm.emoji} style={{width:70}} onChange={e=>setPForm(p=>({...p,emoji:e.target.value}))}/></div>
            <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Couleur</label>
              <input type="color" value={pForm.color} onChange={e=>setPForm(p=>({...p,color:e.target.value}))} style={{width:48,height:38,borderRadius:8,border:'none',cursor:'pointer',display:'block'}}/></div>
          </div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Compte épargne lié</label>
            <select className="ifield" value={pForm.linkedSavingsId} onChange={e=>setPForm(p=>({...p,linkedSavingsId:e.target.value}))} style={{fontFamily:'var(--font)'}}>
              <option value="">— Aucun —</option>
              {accs.map(a=><option key={a.id} value={a.id}>{a.name} ({eur(bals[a.id]!=null?bals[a.id]:a.bal)})</option>)}
            </select></div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Date des vacances (mois cible)</label>
            <input type="month" className="ifield" value={pForm.dateVacances||''} onChange={e=>setPForm(p=>({...p,dateVacances:e.target.value}))} style={{width:'auto'}}/></div>
          <div><label style={{fontSize:13,fontWeight:600,color:'var(--tx2)',display:'block',marginBottom:6}}>Objectif budgétaire (€) — optionnel</label>
            <NI val={pForm.objectif} onChange={v=>setPForm(p=>({...p,objectif:v}))}/></div>
          <button className="btn btn-p" style={{justifyContent:'center',marginTop:4}} onClick={addPot} disabled={!pForm.name}>
            <Ico d={IC.beach} s={14}/> Créer le pot
          </button>
        </div>
      </Modal>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   INDICATEURS V4
═══════════════════════════════════════════════════════ */
const Indicateurs=({D:appData,settings})=>{
  const[tab,setTab]=useState('repartition');
  const availYears=useMemo(()=>getAvailableYears(appData.months),[appData.months]);
  const[annee,setAnnee]=useState(()=>new Date().getFullYear());

  // Helper: résoudre la nature d'un item (fallback vers snapshot puis settings globaux)
  const resolveNature=(it,effS)=>{
    if(it.nature) return it.nature;
    const snap=(effS.maison_items||[]).find(x=>x.id===it.id);
    if(snap?.nature) return snap.nature;
    const glob=(settings.maison_items||[]).find(x=>x.id===it.id);
    return glob?.nature||'entretien';
  };

  // Agréger les dépenses par nature — réactif sur appData.months et annee
  const{byNature,totalCharges,monthlyData}=useMemo(()=>{
    const monthsAnnee=Object.entries(appData.months||{})
      .filter(([ym])=>ym.startsWith(String(annee)))
      .sort(([a],[b])=>a.localeCompare(b));
    const byN={};NATURE_TAGS.forEach(n=>{byN[n]=0;});
    let tot=0;
    const mData=monthsAnnee.map(([ym,m])=>{
      const effS=m.settingsSnapshot?{...settings,...m.settingsSnapshot}:settings;
      const nat={};NATURE_TAGS.forEach(n=>{nat[n]=0;});
      (m.maison?.items||[]).forEach(it=>{
        if(it.calc)return;
        const v=(it.val||0)+(it.ass||0);
        const n=resolveNature(it,effS);
        nat[n]=(nat[n]||0)+v;
        byN[n]=(byN[n]||0)+v;
      });
      const periTot=calcPeri(m.peri,effS.peri_rates);
      if(periTot>0){nat['entretien']=(nat['entretien']||0)+periTot;byN['entretien']=(byN['entretien']||0)+periTot;}
      tot+=Object.values(nat).reduce((s,v)=>s+v,0);
      return{ym,nat};
    });
    return{byNature:byN,totalCharges:tot,monthlyData:mData};
  },[appData.months,annee,settings]);

  const monthsAnnee=useMemo(()=>Object.entries(appData.months||{}).filter(([ym])=>ym.startsWith(String(annee))).sort(([a],[b])=>a.localeCompare(b)),[appData.months,annee]);

  // Top nature categories (sorted by total desc)
  const natureRanked=NATURE_TAGS.map(n=>({n,v:byNature[n]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const maxNature=natureRanked.length?natureRanked[0].v:1;

  // Données macro
  const avgSalA=monthsAnnee.length?Math.round(monthsAnnee.reduce((s,[,m])=>s+(m.ahmed?.sal||0),0)/Math.max(1,monthsAnnee.filter(([,m])=>m.ahmed?.sal>0).length)):0;
  const avgSalS=monthsAnnee.length?Math.round(monthsAnnee.reduce((s,[,m])=>s+(m.sophie?.sal||0),0)/Math.max(1,monthsAnnee.filter(([,m])=>m.sophie?.sal>0).length)):0;
  const totalMensualites=(settings.credits||[]).reduce((a,c)=>a+c.mens+(c.ass||0),0);
  const totalCapital=(settings.credits||[]).reduce((a,c)=>a+(c.cap||0),0);
  const totalEpargne=(settings.savings||[]).reduce((a,s)=>a+((appData.balances||{})[s.id]||s.bal),0);
  const revenuMoyenTotal=avgSalA+avgSalS;
  const tauxEndettement=revenuMoyenTotal>0?Math.round((totalMensualites/revenuMoyenTotal)*100):0;
  const avgCharges=monthsAnnee.length?Math.round(totalCharges/monthsAnnee.length):0;
  const capaciteEpargne=revenuMoyenTotal>0?Math.max(0,revenuMoyenTotal-avgCharges-totalMensualites):0;

  // Max monthly for bar chart scale
  const maxMonthly=monthlyData.length>0?Math.max(...monthlyData.map(d=>Object.values(d.nat).reduce((s,v)=>s+v,0)),1):1;

  const hasData=monthsAnnee.length>0;

  return(
    <div style={{paddingBottom:32}}>
      <ModuleHeader icon={IC.barChart} title="Indicateurs" subtitle={`Analyse ${annee}`}/>
      {availYears.length>1&&(
        <div style={{padding:'0 16px 4px',display:'flex',gap:6,overflowX:'auto'}}>
          {availYears.map(y=>(
            <button key={y} onClick={()=>setAnnee(Number(y))} className={`tabbtn ${Number(y)===annee?'tabbtn-a':'tabbtn-i'}`} style={{fontSize:13}}>{y}</button>
          ))}
        </div>
      )}
      <div style={{overflowX:'auto',padding:'8px 16px 14px',display:'flex',gap:6}}>
        {[
          {id:'repartition',l:'Répartition',ic:IC.pieChart},
          {id:'mensuel',l:'Par mois',ic:IC.barChart},
          {id:'bilan',l:'Bilan',ic:IC.trendUp},
        ].map(t=>(
          <button key={t.id} className={`tabbtn ${tab===t.id?'tabbtn-a':'tabbtn-i'}`} onClick={()=>setTab(t.id)}>
            <Ico d={t.ic} s={13}/> {t.l}
          </button>
        ))}
      </div>
      <div style={{padding:'0 16px'}}>

        {!hasData&&(
          <div style={{textAlign:'center',padding:'48px 24px',background:'var(--surf)',border:'1.5px solid var(--brd)',borderRadius:16}}>
            <div style={{width:64,height:64,borderRadius:18,background:'var(--cyBg)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
              <Ico d={IC.barChart} s={28} c="var(--cy)"/>
            </div>
            <p style={{fontSize:15,fontWeight:700,marginBottom:8}}>Aucune donnée pour {annee}</p>
            <p style={{fontSize:13,color:'var(--tx3)'}}>Créez des budgets mensuels pour voir les indicateurs</p>
          </div>
        )}

        {/* TAB: Répartition annuelle par nature */}
        {hasData&&tab==='repartition'&&(
          <div className="fade">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Ico d={IC.pieChart} s={15} c="var(--cy)"/>
              <p style={{fontSize:13,fontWeight:700,color:'var(--tx2)'}}>Dépenses par catégorie — {annee}</p>
            </div>
            {natureRanked.map(({n,v})=>{
              const pct=Math.round((v/Math.max(totalCharges,1))*100);
              const color=NATURE_COLORS[n]||'var(--accent)';
              return(
                <div key={n} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:10,height:10,borderRadius:2,background:color,flexShrink:0}}/>
                      <span style={{fontSize:14,fontWeight:500,textTransform:'capitalize'}}>{n}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span className="mono" style={{fontSize:13,fontWeight:700,color}}>{eur(v)}</span>
                      <span className="badge bc" style={{fontSize:10,minWidth:36,justifyContent:'center'}}>{pct}%</span>
                    </div>
                  </div>
                  <div className="pbar" style={{height:7}}>
                    <div className="pbar-fill" style={{width:`${Math.round((v/maxNature)*100)}%`,background:color}}/>
                  </div>
                </div>
              );
            })}
            {totalCharges>0&&(
              <div style={{marginTop:16,padding:'14px 16px',background:'var(--surf2)',borderRadius:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13,fontWeight:700,color:'var(--tx2)'}}>Total charges {annee}</span>
                <span className="mono" style={{fontSize:18,fontWeight:700,color:'var(--cy)'}}>{eur(totalCharges)}</span>
              </div>
            )}
          </div>
        )}

        {/* TAB: Par mois — stacked bars */}
        {hasData&&tab==='mensuel'&&(
          <div className="fade">
            <div className="card" style={{marginBottom:14}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:14}}>Charges mensuelles par catégorie</p>
              <div style={{overflowX:'auto'}}>
                <div style={{display:'flex',gap:6,alignItems:'flex-end',minHeight:160,paddingBottom:8}}>
                  {monthlyData.map(({ym,nat})=>{
                    const total=Object.values(nat).reduce((s,v)=>s+v,0);
                    const height=140;
                    return(
                      <div key={ym} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flexShrink:0,minWidth:44}}>
                        <span className="mono" style={{fontSize:9,color:'var(--tx3)',marginBottom:2}}>{eur(total)}</span>
                        <div style={{display:'flex',flexDirection:'column-reverse',width:28,borderRadius:'4px 4px 0 0',overflow:'hidden',height:Math.round((total/maxMonthly)*height)}}>
                          {NATURE_TAGS.filter(n=>(nat[n]||0)>0).map(n=>(
                            <div key={n} title={`${n}: ${eur(nat[n])}`} style={{height:`${Math.round((nat[n]/total)*100)}%`,background:NATURE_COLORS[n]||'var(--accent)',minHeight:2}}/>
                          ))}
                        </div>
                        <p style={{fontSize:9,color:'var(--tx3)',fontWeight:600,textAlign:'center',lineHeight:1.1}}>{mShort(ym)}</p>
                      </div>
                    );
                  })}
                </div>
              </div>
              {/* Légende */}
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:12}}>
                {NATURE_TAGS.filter(n=>(byNature[n]||0)>0).map(n=>(
                  <div key={n} style={{display:'flex',alignItems:'center',gap:4}}>
                    <div style={{width:8,height:8,borderRadius:2,background:NATURE_COLORS[n]||'var(--accent)'}}/>
                    <span style={{fontSize:10,color:'var(--tx3)',textTransform:'capitalize'}}>{n}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Tableau par nature × mois */}
            <div className="card" style={{overflowX:'auto'}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:12}}>Détail par mois</p>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr>
                    <th style={{textAlign:'left',padding:'6px 8px',color:'var(--tx3)',fontWeight:700,borderBottom:'1px solid var(--brd2)'}}>Nature</th>
                    {monthlyData.map(({ym})=>(
                      <th key={ym} style={{textAlign:'right',padding:'6px 8px',color:'var(--tx3)',fontWeight:700,borderBottom:'1px solid var(--brd2)',minWidth:60}}>{mShort(ym)}</th>
                    ))}
                    <th style={{textAlign:'right',padding:'6px 8px',color:'var(--cy)',fontWeight:700,borderBottom:'1px solid var(--brd2)',minWidth:70}}>Total</th>
                  </tr>
                </thead>
                <tbody>
                  {NATURE_TAGS.filter(n=>(byNature[n]||0)>0).map(n=>(
                    <tr key={n}>
                      <td style={{padding:'6px 8px',fontWeight:500,textTransform:'capitalize',color:'var(--tx2)',whiteSpace:'nowrap'}}>
                        <div style={{display:'flex',alignItems:'center',gap:5}}>
                          <div style={{width:7,height:7,borderRadius:2,background:NATURE_COLORS[n],flexShrink:0}}/>
                          {n}
                        </div>
                      </td>
                      {monthlyData.map(({ym,nat})=>(
                        <td key={ym} className="mono" style={{textAlign:'right',padding:'6px 8px',fontSize:11,color:(nat[n]||0)>0?'var(--tx)':'var(--tx3)'}}>{(nat[n]||0)>0?eur(nat[n]):'—'}</td>
                      ))}
                      <td className="mono" style={{textAlign:'right',padding:'6px 8px',fontWeight:700,color:NATURE_COLORS[n]}}>{eur(byNature[n])}</td>
                    </tr>
                  ))}
                  <tr style={{borderTop:'2px solid var(--brd)'}}>
                    <td style={{padding:'8px',fontWeight:700,color:'var(--cy)'}}>Total</td>
                    {monthlyData.map(({ym,nat})=>{
                      const tot=Object.values(nat).reduce((s,v)=>s+v,0);
                      return<td key={ym} className="mono" style={{textAlign:'right',padding:'8px',fontWeight:700,color:'var(--cy)'}}>{eur(tot)}</td>;
                    })}
                    <td className="mono" style={{textAlign:'right',padding:'8px',fontWeight:700,color:'var(--cy)'}}>{eur(totalCharges)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* TAB: Bilan macro */}
        {hasData&&tab==='bilan'&&(
          <div className="fade" style={{display:'flex',flexDirection:'column',gap:12}}>
            {/* Taux d'endettement */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                <div style={{width:34,height:34,borderRadius:9,background:tauxEndettement>33?'var(--rdBg)':tauxEndettement>25?'var(--amBg)':'var(--grBg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ico d={IC.card} s={16} c={tauxEndettement>33?'var(--rd)':tauxEndettement>25?'var(--am)':'var(--grB)'}/>
                </div>
                <div>
                  <p style={{fontSize:15,fontWeight:700}}>Taux d'endettement</p>
                  <p style={{fontSize:11,color:'var(--tx3)'}}>Mensualités / revenus moyens</p>
                </div>
                <div style={{marginLeft:'auto',textAlign:'right'}}>
                  <p className="mono" style={{fontSize:28,fontWeight:800,color:tauxEndettement>33?'var(--rd)':tauxEndettement>25?'var(--am)':'var(--grB)'}}>{tauxEndettement}%</p>
                  <span className={tauxEndettement>33?'badge br':tauxEndettement>25?'badge ba':'badge bg'}>{tauxEndettement>33?'Élevé':tauxEndettement>25?'Modéré':'Raisonnable'}</span>
                </div>
              </div>
              <div className="pbar" style={{height:8}}>
                <div className="pbar-fill" style={{width:`${Math.min(tauxEndettement,50)*2}%`,background:tauxEndettement>33?'var(--rd)':tauxEndettement>25?'var(--am)':'var(--gr)'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:10}}>
                <Row l="Mensualités totales" v={eur(totalMensualites)} c="var(--rd)"/>
                <Row l="Revenus moyens" v={eur(revenuMoyenTotal)} c="var(--grB)"/>
              </div>
            </div>

            {/* Top 3 postes */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <Ico d={IC.target} s={15} c="var(--accent)"/>
                <p style={{fontSize:15,fontWeight:700}}>Top postes de dépenses</p>
              </div>
              {natureRanked.slice(0,4).map(({n,v},i)=>{
                const pct=Math.round((v/Math.max(totalCharges,1))*100);
                return(
                  <div key={n} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<3?'1px solid var(--brd2)':'none'}}>
                    <div style={{width:28,height:28,borderRadius:7,background:NATURE_COLORS[n]+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <span style={{fontSize:12,fontWeight:700,color:NATURE_COLORS[n]}}>{i+1}</span>
                    </div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:14,fontWeight:600,textTransform:'capitalize',marginBottom:3}}>{n}</p>
                      <div className="pbar" style={{height:4}}>
                        <div className="pbar-fill" style={{width:`${pct}%`,background:NATURE_COLORS[n]}}/>
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <p className="mono" style={{fontSize:14,fontWeight:700}}>{eur(v)}</p>
                      <p style={{fontSize:10,color:'var(--tx3)'}}>{pct}%</p>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Capacité d'épargne */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <Ico d={IC.trendUp} s={15} c="var(--grB)"/>
                <p style={{fontSize:15,fontWeight:700}}>Capacité d'épargne</p>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div style={{background:'var(--surf2)',borderRadius:10,padding:'12px'}}>
                  <p style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Revenus moyens</p>
                  <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--grB)'}}>{eur(revenuMoyenTotal)}</p>
                </div>
                <div style={{background:'var(--surf2)',borderRadius:10,padding:'12px'}}>
                  <p style={{fontSize:10,color:'var(--tx3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>Charges moy./mois</p>
                  <p className="mono" style={{fontSize:18,fontWeight:700,color:'var(--am)'}}>{eur(avgCharges)}</p>
                </div>
              </div>
              <div style={{padding:'14px 16px',background:'var(--grBg)',borderRadius:12,border:'1px solid var(--grBrd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <p style={{fontSize:11,fontWeight:700,color:'var(--grB)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>Marge nette mensuelle</p>
                  <p style={{fontSize:11,color:'var(--tx3)'}}>Revenus − charges − mensualités</p>
                </div>
                <p className="mono" style={{fontSize:26,fontWeight:800,color:'var(--grB)'}}>{eur(capaciteEpargne)}</p>
              </div>
            </div>

            {/* Épargne totale */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <Ico d={IC.piggy} s={15} c="var(--grB)"/>
                <p style={{fontSize:15,fontWeight:700}}>Patrimoine épargne</p>
              </div>
              {(settings.savings||[]).map(acc=>{
                const bal=(appData.balances||{})[acc.id]!=null?(appData.balances||{})[acc.id]:acc.bal;
                const pct=totalEpargne>0?Math.round((bal/totalEpargne)*100):0;
                return(
                  <div key={acc.id} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:500}}>{acc.name}</span>
                      <span className="mono" style={{fontSize:13,fontWeight:700,color:acc.color||'var(--grB)'}}>{eur(bal)}</span>
                    </div>
                    <div className="pbar" style={{height:5}}>
                      <div className="pbar-fill" style={{width:`${pct}%`,background:acc.color||'var(--gr)'}}/>
                    </div>
                  </div>
                );
              })}
              <div className="sep" style={{margin:'12px 0'}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:14,fontWeight:700}}>Total épargne</span>
                <span className="mono" style={{fontSize:22,fontWeight:800,color:'var(--grB)'}}>{eur(totalEpargne)}</span>
              </div>
            </div>

            {/* Capital dû */}
            <div className="card">
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <Ico d={IC.card} s={15} c="var(--rd)"/>
                <p style={{fontSize:15,fontWeight:700}}>Capital restant dû</p>
              </div>
              {(settings.credits||[]).map(c=>(
                <div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--brd2)'}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:500}}>{c.name}</p>
                    <p style={{fontSize:11,color:'var(--tx3)'}}>{eur(c.mens+(c.ass||0))}/mois — fin {new Date(c.fin+'T00:00:00').toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}</p>
                  </div>
                  <span className="mono" style={{fontSize:14,fontWeight:700,color:'var(--rd)'}}>{eur(c.cap)}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}}>
                <span style={{fontSize:14,fontWeight:700}}>Total capital dû</span>
                <span className="mono" style={{fontSize:22,fontWeight:800,color:'var(--rd)'}}>{eur(totalCapital)}</span>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   AIDE V3
═══════════════════════════════════════════════════════ */
const Aide=({settings})=>{
  const[guide,setGuide]=useState('budget');
  const[step,setStep]=useState(0);
  const p1=settings.identity.person1,p2=settings.identity.person2,ch=settings.identity.child;
  const tgt=eur(settings.targetReste||550);
  const GUIDES={
    budget:{l:'Budget mensuel',ic:IC.cal,steps:[
      {t:'Créer le mois',d:`Dans Budget, naviguez jusqu'au mois en cours et cliquez "Créer le budget". Les valeurs par défaut du Paramétrage sont pré-remplies et capturées en snapshot — elles ne changeront plus pour ce mois.`,ic:IC.cal},
      {t:'Onglet Maison',d:`Vérifiez les charges variables du mois : eau, EDF, AMEX différé, dépenses ponctuelles. Le périscolaire se calcule automatiquement. Chaque poste est tagué par nature (assurance, crédit, énergie...) pour les Indicateurs.`,ic:IC.house},
      {t:`Onglets ${p1} / ${p2}`,d:`Renseignez vos salaires nets. Ajustez l'épargne personnelle jusqu'à ce que le "Reste" soit ≥ ${tgt}. L'épargne est la variable d'ajustement.`,ic:IC.wallet},
      {t:'Périscolaire',d:`Saisissez les prestations du mois (matin, midi, soir, journée). Le total est calculé et intégré dans la part de ${p2}.`,ic:IC.school},
      {t:'Virements',d:`Vérifiez les 2 virements de ${p1} et les 3 virements de ${p2} (commun + périscolaire + Livret A ${ch}). Ces montants sont prêts à saisir dans votre banque.`,ic:IC.send},
    ]},
    suivi:{l:'Suivi en cours de mois',ic:IC.chart,steps:[
      {t:'Saisir le solde bancaire',d:`Dans Suivi, saisissez le solde réel de votre compte commun observé sur votre app bancaire. Le delta indique si le solde couvre les dépenses restantes.`,ic:IC.wallet2},
      {t:'Pointer les dépenses',d:`Cliquez sur chaque dépense quand elle est prélevée. Une modale s'ouvre avec le montant prévu — validez tel quel ou ajustez le montant réel débité.`,ic:IC.chk},
      {t:'Validation partielle',d:`Si le montant débité diffère du prévu (ex: 62,50€ au lieu de 125€), saisissez le montant réel. L'item apparaît comme "partiellement débité" avec une couleur distincte.`,ic:IC.halfCheck},
      {t:'Acquittements épargne',d:`Cocher un item épargne crédite automatiquement le bon compte dans le module Épargne et enregistre un mouvement daté. Vous tracez ainsi l'historique de chaque versement.`,ic:IC.piggy},
      {t:'Réinitialiser',d:`En cas d'erreur, "Réinitialiser le suivi" efface tous les pointages et annule proprement tous les mouvements d'épargne générés pour ce mois.`,ic:IC.ref},
    ]},
    epargne:{l:'Gérer l\'épargne',ic:IC.piggy,steps:[
      {t:'Soldes de référence',d:`Les soldes initiaux dans Paramétrage → Épargne correspondent à la situation de ${mShort(FROZEN_MONTH)} (référence figée). Les mouvements s'accumulent par-dessus.`,ic:IC.lock},
      {t:'Ajouter ou retirer',d:`Cliquez "Ajouter" pour un versement ou "Retirer" pour un prélèvement. Saisissez le montant du mouvement — le nouveau solde est prévisualisé avant confirmation.`,ic:IC.up},
      {t:'Mouvements automatiques',d:`Chaque acquittement dans le Suivi génère un mouvement visible dans l'historique du compte concerné. Vous voyez toujours l'origine de chaque variation.`,ic:IC.activity},
      {t:'Pots Vacances',d:`Créez des pots dans le module Vacances. Liez chaque pot à un compte épargne et renseignez les activités prévues. L'app calcule le montant mensuel à épargner pour atteindre l'objectif.`,ic:IC.beach},
    ]},
    indicateurs:{l:'Indicateurs',ic:IC.barChart,steps:[
      {t:'Répartition par nature',d:`L'onglet Répartition montre vos dépenses annuelles organisées par nature (assurance, crédit, énergie...). La nature de chaque poste maison est configurée dans Paramétrage → Maison.`,ic:IC.pieChart},
      {t:'Vue par mois',d:`L'onglet Par mois affiche des barres empilées colorées par nature pour visualiser l'évolution mois par mois. Le tableau détaillé donne les montants exacts.`,ic:IC.barChart},
      {t:'Bilan macro',d:`L'onglet Bilan calcule votre taux d'endettement, le top de vos postes, votre marge nette mensuelle et l'état de votre patrimoine épargne.`,ic:IC.trendUp},
    ]},
    setup:{l:'Premier paramétrage',ic:IC.gear,steps:[
      {t:'Identité du foyer',d:`Commencez par Paramétrage → Identité pour renseigner vos prénoms. Ces noms apparaissent partout dans l'app.`,ic:IC.home},
      {t:'Delta de rééquilibrage',d:`Le delta compense les écarts de salaires. Avec ${eur(settings.delta||800)} : ${p1} paie ½+${eur(settings.delta||800)} et ${p2} paie ½−${eur(settings.delta||800)} des charges.`,ic:IC.activity},
      {t:'Nature des postes maison',d:`Dans Paramétrage → Maison, assignez une nature à chaque poste (assurance, crédit, énergie...). Ces tags alimentent le module Indicateurs pour l'analyse annuelle.`,ic:IC.tag},
      {t:'Comptes épargne',d:`Dans Paramétrage → Épargne, ajustez les soldes initiaux de ${mShort(FROZEN_MONTH)}. Ce sont vos soldes de référence figés. Les mouvements futurs s'accumulent par-dessus.`,ic:IC.piggy},
    ]},
  };
  const g=GUIDES[guide];
  const sd=g.steps[step];
  return(
    <div style={{padding:'16px 16px 32px'}}>
      <ModuleHeader icon={IC.help} title="Aide" subtitle="Guides pratiques interactifs"/>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:16,marginBottom:20}}>
        {Object.entries(GUIDES).map(([id,g])=>(
          <button key={id} onClick={()=>{setGuide(id);setStep(0);}} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderRadius:14,background:guide===id?'var(--accentBg)':'var(--surf)',border:`1.5px solid ${guide===id?'var(--accentBrd)':'var(--brd)'}`,color:guide===id?'var(--accent)':'var(--tx)',cursor:'pointer',fontFamily:'var(--font)',transition:'all var(--tr)',textAlign:'left'}}>
            <div style={{width:32,height:32,borderRadius:8,background:guide===id?'var(--accentBg)':'var(--surf2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ico d={g.ic} s={16} c={guide===id?'var(--accent)':'var(--tx3)'}/>
            </div>
            <span style={{fontSize:14,fontWeight:guide===id?700:500}}>{g.l}</span>
            <span style={{marginLeft:'auto',fontSize:11,color:guide===id?'var(--accent)':'var(--tx3)'}}>{g.steps.length} étapes</span>
          </button>
        ))}
      </div>
      <div className="card fade" style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:12,fontWeight:700,color:'var(--tx3)'}}>Étape {step+1}/{g.steps.length}</span>
          <div className="pbar" style={{flex:1,margin:'0 12px'}}>
            <div className="pbar-fill" style={{width:`${((step+1)/g.steps.length)*100}%`,background:'var(--accent)'}}/>
          </div>
          <span style={{fontSize:12,color:'var(--accent)',fontWeight:700}}>{Math.round(((step+1)/g.steps.length)*100)}%</span>
        </div>
        <div style={{textAlign:'center',padding:'14px 0'}}>
          <div style={{width:68,height:68,borderRadius:20,background:'var(--accentBg)',border:'1.5px solid var(--accentBrd)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
            <Ico d={sd.ic||g.ic} s={28} c="var(--accent)"/>
          </div>
          <h3 style={{fontSize:17,fontWeight:700,letterSpacing:'-.03em',marginBottom:12}}>{sd.t}</h3>
          <p style={{fontSize:14,color:'var(--tx2)',lineHeight:1.75,textAlign:'left'}}>{sd.d}</p>
        </div>
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button className="btn btn-s" style={{flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}><Ico d={IC.chL} s={14}/> Précédent</button>
          <button className="btn btn-p" style={{flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>Math.min(g.steps.length-1,s+1))} disabled={step===g.steps.length-1}>Suivant <Ico d={IC.chR} s={14}/></button>
        </div>
      </div>
      {g.steps.map((st,i)=>(
        <div key={i} onClick={()=>setStep(i)} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,marginBottom:6,cursor:'pointer',background:i===step?'var(--accentBg)':'var(--surf)',border:`1.5px solid ${i===step?'var(--accentBrd)':'var(--brd)'}`,transition:'all var(--tr)'}}>
          <div style={{width:24,height:24,borderRadius:'50%',background:i<step?'var(--gr)':i===step?'var(--accent)':'var(--surf3)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
            {i<step?<Ico d={IC.chk} s={11} c="#fff" sw={2.5}/>:i+1}
          </div>
          <span style={{fontSize:13,fontWeight:i===step?700:400,color:i===step?'var(--accent)':'var(--tx2)'}}>{st.t}</span>
        </div>
      ))}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   LOGIN SCREEN

/* ═══════════════════════════════════════════════════════
   APP SHELL V3
═══════════════════════════════════════════════════════ */
const NAV_MAIN=[
  {id:'dashboard',  l:'Accueil',     ic:IC.home},
  {id:'budget',     l:'Budget',      ic:IC.cal},
  {id:'suivi',      l:'Suivi',       ic:IC.chart},
  {id:'epargne',    l:'Épargne',     ic:IC.piggy},
  {id:'credits',    l:'Crédits',     ic:IC.card},
];
const NAV_MORE=[
  {id:'periscolaire',l:'Périscolaire', ic:IC.school},
  {id:'vacances',   l:'Vacances',     ic:IC.beach},
  {id:'salaires',   l:'Salaires',     ic:IC.salary},
  {id:'indicateurs',l:'Indicateurs',  ic:IC.barChart},
  {id:'export',     l:'Export PDF',   ic:IC.export},
  {id:'parametrage',l:'Paramétrage',  ic:IC.gear},
  {id:'aide',       l:'Aide',         ic:IC.help},
];
const ALL_NAV=[...NAV_MAIN,...NAV_MORE];

const AppShell=({appData,setAppData,onSync,syncing,lastSync})=>{
  const[mod,setMod]=useState('dashboard');
  const[toast,setToast]=useState(null);
  const[showMore,setShowMore]=useState(false);
  const w=useWindowWidth();
  const isDesk=w>=1024;
  const s=appData.settings;
  const cur=ALL_NAV.find(x=>x.id===mod)||NAV_MAIN[0];
  const showToast=(msg,type='success')=>setToast({msg,type});
  const theme=s.theme||'dark';

  const toggleTheme=()=>setAppData(p=>({...p,settings:{...p.settings,theme:p.settings.theme==='dark'?'light':'dark'}}));

  const props={D:appData,setD:setAppData,settings:s,showToast};

  const renderMod=()=>{
    switch(mod){
      case 'dashboard':    return <Dashboard {...props} onNav={n=>{setMod(n);setShowMore(false);}} lastSync={lastSync}/>;
      case 'budget':       return <BudgetMensuel {...props}/>;
      case 'suivi':        return <SuiviMois {...props}/>;
      case 'epargne':      return <Epargne {...props}/>;
      case 'credits':      return <Credits {...props}/>;
      case 'periscolaire': return <Periscolaire {...props}/>;
      case 'vacances':     return <Vacances {...props}/>;
      case 'salaires':     return <Salaires {...props}/>;
      case 'indicateurs':  return <Indicateurs {...props}/>;
      case 'export':       return <ExportModule {...props}/>;
      case 'parametrage':  return <Parametrage {...props}/>;
      case 'aide':         return <Aide settings={s}/>;
      default:             return null;
    }
  };

    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* ── Sidebar desktop ── */}
      {isDesk&&(
        <div style={{width:242,background:theme==='dark'?'#0A1220':'#FAFCFF',borderRight:'1.5px solid var(--brd)',display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{padding:'20px 16px 16px',background:'var(--sidebar-grad)',borderBottom:'1px solid var(--brd2)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#1a3a6e,#0d1f3c)',border:'1px solid var(--accentBrd)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:'var(--accent)'}}>LCB</span>
              </div>
              <div>
                <p style={{fontSize:13,fontWeight:800,letterSpacing:'-.03em',lineHeight:1.1}}>Le Compte</p>
                <p style={{fontSize:11,fontWeight:600,color:'var(--accent)',letterSpacing:'-.01em'}}>Est Bon</p>
              </div>
              <button className="btn btn-g btn-icon" style={{marginLeft:'auto',padding:6}} onClick={toggleTheme}>
                <Ico d={theme==='dark'?IC.sun:IC.moon} s={15}/>
              </button>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'12px 8px'}}>
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',padding:'4px 12px',marginBottom:6}}>Principal</p>
            {NAV_MAIN.map(x=>(
              <div key={x.id} className={`pill ${mod===x.id?'nav-active':''}`} style={{color:mod===x.id?'var(--accent)':'var(--tx2)',marginBottom:2}} onClick={()=>setMod(x.id)}>
                <Ico d={x.ic} s={16} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                <span style={{fontSize:14,fontWeight:mod===x.id?700:500}}>{x.l}</span>
              </div>
            ))}
            <p style={{fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',padding:'12px 12px 6px',marginTop:4}}>Plus</p>
            {NAV_MORE.map(x=>(
              <div key={x.id} className={`pill ${mod===x.id?'nav-active':''}`} style={{color:mod===x.id?'var(--accent)':'var(--tx2)',marginBottom:2}} onClick={()=>setMod(x.id)}>
                <Ico d={x.ic} s={16} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                <span style={{fontSize:14,fontWeight:mod===x.id?700:500}}>{x.l}</span>
              </div>
            ))}
          </div>
          <div style={{padding:'12px 8px',borderTop:'1px solid var(--brd2)'}}>
            {lastSync&&(
              <div style={{padding:'6px 12px',marginBottom:6}}>
                <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>Dernière synchro</p>
                <p style={{fontSize:11,color:'var(--tx3)'}}>{new Date(lastSync).toLocaleString('fr-FR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'})}</p>
              </div>
            )}
            <button className="btn btn-g" style={{width:'100%',justifyContent:'flex-start',gap:8}} onClick={onSync} disabled={syncing}>
              {syncing?<Spin s={14}/>:<Ico d={IC.ref} s={14}/>}
              <span style={{fontSize:13,fontWeight:600}}>{syncing?'Synchro...':'Synchroniser Drive'}</span>
            </button>
          </div>
        </div>
      )}

      {/* ── Main ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Top bar */}
        <div style={{background:'var(--surf)',borderBottom:'1.5px solid var(--brd)',padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,height:'max(52px,calc(52px + env(safe-area-inset-top)))',paddingTop:'env(safe-area-inset-top)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {!isDesk&&(
              <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#1a3a6e,#0d1f3c)',border:'1px solid var(--accentBrd)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--accent)'}}>LCB</span>
              </div>
            )}
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {!isDesk&&<Ico d={cur.ic} s={16} c="var(--accent)"/>}
              <h1 style={{fontSize:16,fontWeight:700,letterSpacing:'-.02em'}}>{cur.l}</h1>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <button className="btn btn-g btn-icon" onClick={toggleTheme}><Ico d={theme==='dark'?IC.sun:IC.moon} s={15}/></button>
            <button className="btn btn-g btn-icon" onClick={onSync} disabled={syncing}>
              {syncing?<Spin s={14}/>:<Ico d={IC.ref} s={14}/>}
            </button>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:'auto'}}>{renderMod()}</div>

        {/* Bottom nav mobile */}
        {!isDesk&&(
          <div style={{background:'var(--surf)',borderTop:'1.5px solid var(--brd)',display:'flex',justifyContent:'space-around',alignItems:'center',paddingBottom:'max(8px,env(safe-area-inset-bottom))',paddingTop:4,flexShrink:0}}>
            {NAV_MAIN.map(x=>(
              <button key={x.id} onClick={()=>{setMod(x.id);setShowMore(false);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:mod===x.id?'var(--accent)':'var(--tx3)',fontFamily:'var(--font)',minWidth:52,transition:'color var(--tr)',position:'relative'}}>
                {mod===x.id&&<div style={{position:'absolute',top:-4,width:4,height:4,borderRadius:'50%',background:'var(--accent)'}}/>}
                <Ico d={x.ic} s={20} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                <span style={{fontSize:10,fontWeight:mod===x.id?700:400}}>{x.l}</span>
              </button>
            ))}
            <button onClick={()=>setShowMore(v=>!v)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:NAV_MORE.some(x=>x.id===mod)?'var(--accent)':'var(--tx3)',fontFamily:'var(--font)',minWidth:52,position:'relative'}}>
              {NAV_MORE.some(x=>x.id===mod)&&<div style={{position:'absolute',top:-4,width:4,height:4,borderRadius:'50%',background:'var(--accent)'}}/>}
              <Ico d={IC.dots} s={20} c={NAV_MORE.some(x=>x.id===mod)?'var(--accent)':'var(--tx3)'}/>
              <span style={{fontSize:10,fontWeight:NAV_MORE.some(x=>x.id===mod)?700:400}}>Plus</span>
            </button>
          </div>
        )}
      </div>

      {/* Bottom sheet — Plus menu */}
      {!isDesk&&showMore&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)',zIndex:60}} onClick={()=>setShowMore(false)}>
          <div style={{position:'absolute',bottom:0,left:0,right:0,background:'var(--surf)',borderRadius:'20px 20px 0 0',padding:'16px 16px calc(16px + env(safe-area-inset-bottom))',animation:'sheetIn .25s cubic-bezier(.4,0,.2,1)'}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,background:'var(--brd)',borderRadius:2,margin:'0 auto 20px'}}/>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
              {NAV_MORE.map(x=>(
                <button key={x.id} onClick={()=>{setMod(x.id);setShowMore(false);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'14px 8px',borderRadius:14,background:mod===x.id?'var(--accentBg)':'var(--surf2)',color:mod===x.id?'var(--accent)':'var(--tx2)',border:`1.5px solid ${mod===x.id?'var(--accentBrd)':'var(--brd)'}`,cursor:'pointer',fontFamily:'var(--font)',transition:'all var(--tr)'}}>
                  <Ico d={x.ic} s={22} c={mod===x.id?'var(--accent)':'var(--tx3)'}/>
                  <span style={{fontSize:11,fontWeight:600}}>{x.l}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type} close={()=>setToast(null)}/>}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
const App=()=>{
  const[auth,setAuth]=useState('loading');
  const[appData,setAppDataRaw]=useState(DEF_DATA);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const saveTimer=useRef(null);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',appData.settings.theme||'dark');
  },[appData.settings.theme]);

  const setAppData=useCallback(fn=>{
    setAppDataRaw(prev=>{
      const next=typeof fn==='function'?fn(prev):fn;
      if(gToken){
        if(saveTimer.current)clearTimeout(saveTimer.current);
        saveTimer.current=setTimeout(()=>gSave(next).then(()=>setLastSync(new Date().toISOString())).catch(console.error),2000);
      }
      return next;
    });
  },[]);

  const loadData=async()=>{
    setSyncing(true);
    try{
      const raw=await gLoad();
      if(raw){
        const data=migrateData(raw);
        setAppDataRaw(prev=>({
          ...DEF_DATA,...data,
          settings:{...DEF_SETTINGS,...data.settings,
            maison_items:data.settings.maison_items||DEF_SETTINGS.maison_items,
            savings:data.settings.savings||DEF_SETTINGS.savings,
            credits:data.settings.credits||DEF_SETTINGS.credits,
            vacances:data.settings.vacances||[],
            theme:data.settings.theme||'dark',
          },
          balances:{...prev.balances,...(data.balances||{})},
          txs:data.txs||[],
          vacancesTxs:data.vacancesTxs||[],
          balanceAdjusts:data.balanceAdjusts||[],
        }));
      }else{await gSave(DEF_DATA);}
      setAuth('authed');
      setLastSync(new Date().toISOString());
    }catch(e){console.error(e);setAuth('authed');}
    finally{setSyncing(false);}
  };

  useEffect(()=>{
    initGIS(ready=>{
      if(ready===null) setAuth('ready');
      else if(ready===true) loadData();
    });
  },[]);

  const handleAuth=()=>{
    if(!gClient)return;
    gClient.callback=async r=>{if(r.access_token){gToken=r.access_token;await loadData();}};
    gClient.requestAccessToken();
    setSyncing(true);
  };

  const handleSync=async()=>{
    if(!gToken)return;
    setSyncing(true);
    try{await gSave(appData);setLastSync(new Date().toISOString());}catch(e){console.error(e);}
    finally{setSyncing(false);}
  };

  if(auth==='loading')return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12,color:'var(--tx3)',flexDirection:'column'}}>
      <div style={{width:48,height:48,borderRadius:14,background:'linear-gradient(135deg,#1a3a6e,#0d1f3c)',border:'1px solid var(--accentBrd)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:17,fontWeight:700,color:'var(--accent)'}}>LCB</span>
      </div>
      <Spin s={20}/>
    </div>
  );
  if(auth==='ready')return <LoginScreen onAuth={handleAuth} loading={syncing}/>;
  return <AppShell appData={appData} setAppData={setAppData} onSync={handleSync} syncing={syncing} lastSync={lastSync}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
